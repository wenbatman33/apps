<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Classic Sevens Slots</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}
body {
	color: white;
	background-color: #0d0815;
	overflow: hidden;
	touch-action: none;
}
#canvas { display: block; }
#canvas:focus { outline: none; }

#status {
	position: absolute;
	left: 0; right: 0; top: 0; bottom: 0;
	background: url('godot_project/assets/game_files/Loading/loading_back.jpg') center/cover no-repeat, #0a1628;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	z-index: 10;
}
#status-logo {
	width: min(50vw, 500px);
	height: auto;
	margin-bottom: 30px;
}
#status-text-img {
	width: min(18vw, 180px);
	height: auto;
	margin-bottom: 12px;
}
#status-progress {
	width: min(42vw, 460px);
	height: 32px;
	-webkit-appearance: none;
	appearance: none;
	border-radius: 8px;
	overflow: hidden;
	background: #3a2520;
	border: 2px solid #5a3a2a;
}
#status-progress::-webkit-progress-bar { background: #3a2520; border-radius: 8px; }
#status-progress::-webkit-progress-value { background: linear-gradient(135deg, #1a8aff, #4dabff, #1a8aff); border-radius: 6px; }
#status-progress::-moz-progress-bar { background: linear-gradient(135deg, #1a8aff, #4dabff, #1a8aff); border-radius: 6px; }

#status-notice {
	display: none;
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 1rem 2rem 0;
	padding: 1rem;
	text-align: center;
}
		</style>
	</head>
	<body>
		<canvas id="canvas">Your browser does not support the canvas tag.</canvas>
		<noscript>Your browser does not support JavaScript.</noscript>

		<div id="status">
			<img id="status-logo" src="godot_project/assets/game_files/Loading/loading_logo.png" alt="Classic Sevens Slots">
			<img id="status-text-img" src="godot_project/assets/game_files/Loading/loading_text.png" alt="Loading...">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {
	"args": [],
	"canvasResizePolicy": 2,
	"ensureCrossOriginIsolationHeaders": false,
	"executable": "index",
	"experimentalVK": false,
	"fileSizes": {},
	"focusCanvas": true,
	"gdextensionLibs": []
};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode === 'hidden') {
			statusOverlay.style.transition = 'opacity 0.5s';
			statusOverlay.style.opacity = '0';
			setTimeout(() => statusOverlay.remove(), 600);
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function displayFailureNotice(err) {
		console.error(err);
		const msg = err instanceof Error ? err.message : typeof err === 'string' ? err : 'An unknown error occurred.';
		while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		msg.split('\n').forEach(line => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
		statusNotice.style.display = 'block';
		statusProgress.style.display = 'none';
		statusOverlay.style.visibility = 'visible';
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length !== 0) {
		displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => setStatusMode('hidden'), displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
