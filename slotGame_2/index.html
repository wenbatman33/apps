<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Classic Sevens Slots</title>
		<style>
html, body, #canvas { margin: 0; padding: 0; border: 0; }
body { color: white; background-color: #0d0815; overflow: hidden; touch-action: none; }
#canvas { display: block; }
#canvas:focus { outline: none; }

#status {
	position: absolute;
	left: 0; right: 0; top: 0; bottom: 0;
	background: url('loading_assets/loading_back.jpg') center/cover no-repeat, #0a1628;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 10;
}
#status-logo {
	width: min(45vw, 450px);
	height: auto;
	margin-bottom: 25px;
}
#status-text-img {
	width: min(16vw, 170px);
	height: auto;
	margin-bottom: 10px;
}
/* 自訂進度條 */
#progress-wrap {
	width: min(40vw, 440px);
	height: 30px;
	background: #3a2520;
	border: 2px solid #5a3a2a;
	border-radius: 8px;
	overflow: hidden;
	position: relative;
}
#progress-fill {
	height: 100%;
	width: 0%;
	background: linear-gradient(90deg, #1a6aff 0%, #4db8ff 50%, #1a6aff 100%);
	background-size: 200% 100%;
	border-radius: 6px;
	animation: shimmer 1.5s infinite linear;
}
@keyframes shimmer {
	0% { background-position: 200% 0; }
	100% { background-position: -200% 0; }
}
#progress-text {
	position: absolute;
	top: 0; left: 0; right: 0; bottom: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	font-family: Arial, sans-serif;
	font-size: 14px;
	color: #fff;
	text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
#status-notice {
	display: none;
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 1rem 2rem 0;
	padding: 1rem;
	text-align: center;
}
		</style>
	</head>
	<body>
		<canvas id="canvas">Your browser does not support the canvas tag.</canvas>
		<noscript>Your browser does not support JavaScript.</noscript>

		<div id="status">
			<img id="status-logo" src="loading_assets/loading_logo.png" alt="Classic Sevens Slots">
			<img id="status-text-img" src="loading_assets/loading_text.png" alt="Loading...">
			<div id="progress-wrap">
				<div id="progress-fill"></div>
				<div id="progress-text">0%</div>
			</div>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {
	"args": [],
	"canvasResizePolicy": 2,
	"ensureCrossOriginIsolationHeaders": false,
	"executable": "index",
	"experimentalVK": false,
	"fileSizes": {},
	"focusCanvas": true,
	"gdextensionLibs": []
};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const progressFill = document.getElementById('progress-fill');
	const progressText = document.getElementById('progress-text');
	const statusNotice = document.getElementById('status-notice');

	function hideLoading() {
		statusOverlay.style.transition = 'opacity 0.5s';
		statusOverlay.style.opacity = '0';
		setTimeout(() => statusOverlay.remove(), 600);
	}

	function showError(err) {
		console.error(err);
		const msg = err instanceof Error ? err.message : typeof err === 'string' ? err : 'An unknown error occurred.';
		while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		msg.split('\n').forEach(line => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
		statusNotice.style.display = 'block';
		document.getElementById('progress-wrap').style.display = 'none';
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length !== 0) {
		showError('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
	} else {
		let gameReady = false;
		let displayPct = 0;
		const startTime = Date.now();

		// 平滑更新進度條（不直接跳到目標，而是漸進追趕）
		let targetPct = 0;
		const smoothInterval = setInterval(() => {
			if (displayPct < targetPct) {
				displayPct = Math.min(displayPct + 2, targetPct);
			}
			// 遊戲就緒後快速填滿到 100%
			if (gameReady && displayPct < 100) {
				displayPct = Math.min(displayPct + 5, 100);
			}
			progressFill.style.width = displayPct + '%';
			progressText.textContent = displayPct + '%';
			// 到 100% 且已經過最少 1 秒才隱藏
			if (displayPct >= 100 && gameReady && (Date.now() - startTime) > 1500) {
				clearInterval(smoothInterval);
				setTimeout(hideLoading, 300);
			}
		}, 30);

		engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					targetPct = Math.round((current / total) * 100);
				}
			},
		}).then(() => {
			gameReady = true;
			targetPct = 100;
		}, showError);
	}
}());
		</script>
	</body>
</html>
