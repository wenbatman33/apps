<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Jump Up! 垂直跳跃</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stage">
    <canvas id="game" width="360" height="640"></canvas>
    <div id="nameEditor" hidden>
      <div class="ne-panel">
        <div class="ne-title">输入昵称</div>
        <input id="nameInput" type="text" maxlength="16" autocomplete="off" placeholder="最多 16 字">
        <div class="ne-actions">
          <button id="nameCancel" type="button">取消</button>
          <button id="nameOk" type="button">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 背景音乐：之后你换成自己的文件即可 -->
  <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>

  <script src="js/audio.js"></script>
  <script src="js/stages.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
