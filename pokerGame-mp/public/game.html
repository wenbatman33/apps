<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Poker Royale MP — 遊戲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #04060E;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    canvas { display: block; position: absolute; }

    /* ── 連線中遮罩 ── */
    #connecting {
      position: fixed; inset: 0;
      background: #04060E;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      color: #D4A24C; letter-spacing: 3px; font-size: 14px; gap: 20px;
      transition: opacity 0.5s;
    }
    #connecting.hide { opacity: 0; pointer-events: none; }
    .brand-big {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 700;
      background: linear-gradient(180deg, #F2D58A 0%, #D4A24C 60%, #6E4A1A 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .dot-row { display: flex; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #D4A24C;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── 等待室遮罩 ── */
    #waiting-room {
      position: fixed; inset: 0;
      background: #04060E;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9990;   /* 低於連線中遮罩，連線中消失後才完全露出 */
      padding: 24px;
      overflow-y: auto;
    }
    #waiting-room.show { display: flex; }
    .wr-card {
      background: rgba(13,18,32,0.9);
      border: 1px solid rgba(212,162,76,0.35);
      border-radius: 16px;
      padding: 24px;
      width: 100%; max-width: 400px;
    }
    .wr-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 700;
      color: #F2D58A; letter-spacing: 3px;
      text-align: center; margin-bottom: 8px;
    }
    .wr-code-label {
      font-size: 11px; color: #7C7665;
      letter-spacing: 3px; text-align: center;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .wr-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 700;
      color: #F2D58A; letter-spacing: 8px;
      text-align: center; margin-bottom: 4px;
    }
    .wr-code-hint {
      font-size: 11px; color: #7C7665;
      text-align: center; margin-bottom: 20px;
    }
    .wr-player-list {
      display: flex; flex-direction: column; gap: 8px;
      margin: 16px 0;
    }
    .wr-player {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
    }
    .wr-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #6E4A1A, #D4A24C);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #1B1408; flex-shrink: 0;
    }
    .wr-name { font-size: 14px; font-weight: 600; color: #F4ECD8; }
    .wr-chips { font-size: 12px; color: #7C7665; }
    .wr-badge {
      margin-left: auto;
      font-size: 10px; letter-spacing: 1px; color: #D4A24C;
      background: rgba(212,162,76,0.12);
      border: 1px solid rgba(212,162,76,0.3);
      padding: 2px 8px; border-radius: 20px;
    }
    .wr-count { font-size: 12px; color: #BDB59D; text-align: center; margin-bottom: 4px; }
    .wr-hint  { font-size: 11px; color: #7C7665; text-align: center; margin-top: 12px; letter-spacing: 1px; }
    .btn-start {
      width: 100%; padding: 16px;
      background: linear-gradient(180deg, #6E4A1A 0%, #D4A24C 40%, #F2D58A 60%, #D4A24C 80%, #6E4A1A 100%);
      border: none; border-radius: 30px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      letter-spacing: 3px; color: #1B1408;
      cursor: pointer; margin-top: 16px;
      box-shadow: 0 4px 20px rgba(212,162,76,0.3);
      transition: transform 0.1s;
    }
    .btn-start:hover { transform: translateY(-1px); }
    .btn-copy {
      background: rgba(212,162,76,0.1);
      border: 1px solid rgba(212,162,76,0.3);
      border-radius: 8px; padding: 5px 14px;
      font-size: 12px; color: #D4A24C;
      cursor: pointer; font-family: inherit;
      display: block; margin: 0 auto 4px;
    }
    .btn-copy:hover { background: rgba(212,162,76,0.2); }
  </style>
</head>
<body>

<!-- 連線中 -->
<div id="connecting">
  <div class="brand-big">POKER ROYALE</div>
  <div>連線中...</div>
  <div class="dot-row">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- 等待室（頁面載入就立刻顯示邀請碼，不等 WebSocket） -->
<script>
  // 從 URL 取邀請碼，直接顯示，不等連線
  (function () {
    const p = new URLSearchParams(location.search);
    const mid = p.get('matchID');
    const pid = p.get('playerID');
    if (!mid) return;
    // 等待室預先顯示
    document.addEventListener('DOMContentLoaded', function () {
      const wr = document.getElementById('waiting-room');
      const codeEl = document.getElementById('wr-code');
      if (wr) wr.classList.add('show');
      if (codeEl) codeEl.textContent = mid;
      // 房主才顯示開始按鈕區域（玩家列表更新後才真正能按）
    });
  })();
</script>

<!-- 等待室 -->
<div id="waiting-room">
  <div style="width:100%;max-width:400px">
    <div class="wr-title">等待玩家加入</div>
    <div style="margin:12px 0 20px">
      <div class="wr-code-label">邀請碼</div>
      <div class="wr-code" id="wr-code">------</div>
      <button class="btn-copy" onclick="copyInviteCode()">複製邀請碼</button>
      <div class="wr-code-hint">將邀請碼分享給朋友</div>
    </div>
    <div class="wr-card">
      <div class="wr-count" id="wr-count">等待玩家中...</div>
      <div class="wr-player-list" id="wr-player-list"></div>
    </div>
    <button class="btn-start" id="btn-start" onclick="hostStartGame()" style="display:none">
      開始遊戲（最少 2 人）
    </button>
    <div class="wr-hint" id="wr-hint">最少 2 人，最多 6 人</div>
  </div>
</div>

<!-- PixiJS 7.3.2 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script type="module" src="/dist/game/game-client.js"></script>

</body>
</html>
