<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Royale</title>
    <link rel="icon" href="assets/Icons/png/icon-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(ellipse at 50% 38%, #14213A 0%, #070A14 55%, #04060E 100%);
            font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        canvas { display: block; }
        .font-preload { position: absolute; left: -9999px; visibility: hidden; }

        /* ==== Loading 首屏 ==== */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 38%, #14213A 0%, #070A14 55%, #04060E 100%);
            transition: opacity 0.5s ease-out;
            gap: 32px;
        }
        #loader.hide { opacity: 0; pointer-events: none; }
        #loader .sub {
            font: 500 13px/1 'Inter', sans-serif;
            color: #BDB59D;
            letter-spacing: 5px;
        }
        #loader .title {
            font: 700 42px/1 'Cormorant Garamond', serif;
            color: #F2D58A;
            letter-spacing: 5px;
            text-shadow: 0 0 22px rgba(212,162,76,0.35);
        }
        #loader .hairline {
            position: relative; width: 160px; height: 1px;
            background: linear-gradient(90deg, transparent 0%, #D4A24C 50%, transparent 100%);
        }
        #loader .hairline::after {
            content: ''; position: absolute; left: 50%; top: 50%;
            width: 4px; height: 4px; border-radius: 50%;
            background: #D4A24C; transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #D4A24C;
        }
        /* 旋轉 loading 圓環 */
        #loader .spinner {
            width: 48px; height: 48px; position: relative;
            margin-top: 12px;
        }
        #loader .spinner::before, #loader .spinner::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid transparent;
        }
        #loader .spinner::before {
            border-top-color: #F2D58A;
            border-right-color: #D4A24C;
            animation: spin 1.1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        }
        #loader .spinner::after {
            inset: 6px; border-top-color: #6E4A1A; border-left-color: #8C6224;
            animation: spin 1.6s linear reverse infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* 進度文字 */
        #loader .progress {
            font: 500 11px/1 'Inter', sans-serif;
            color: rgba(244,236,216,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            min-height: 12px;
        }
    </style>
</head>
<body>
    <!-- Loading 首屏：HTML 載完立即顯示，init 完成後淡出 -->
    <div id="loader">
        <div class="sub">德州撲克 · VIP 牌桌</div>
        <div class="title">POKER ROYALE</div>
        <div class="hairline"></div>
        <div class="spinner"></div>
        <div class="progress" id="loader-prog">LOADING…</div>
    </div>

    <!-- 字型預加載 -->
    <div class="font-preload">
        <span style="font-family: 'Cormorant Garamond', serif; font-weight: 700;">AaBb 01</span>
        <span style="font-family: 'Cormorant Garamond', serif; font-weight: 600;">AaBb 01</span>
        <span style="font-family: 'Inter', sans-serif; font-weight: 400;">AaBb 01</span>
        <span style="font-family: 'Inter', sans-serif; font-weight: 600;">AaBb 01</span>
        <span style="font-family: 'Inter', sans-serif; font-weight: 700;">AaBb 01</span>
        <span style="font-family: 'Inter', sans-serif; font-weight: 900;">AaBb 01</span>
        <span style="font-family: 'Noto Sans TC', sans-serif; font-weight: 500;">中文字</span>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
