<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>足球直播系統</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1628;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: pan-y;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── 3-Column Broadcast Layout ── */
#app-layout { display: flex; width: 100%; flex: 1; overflow: hidden; }
#animation-panel #score-bar { padding: 6px 12px; flex-shrink: 0; }
#animation-panel #timeline-section { padding: 6px 12px 4px; flex-shrink: 0; }
#animation-panel #stadium-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
@media (max-width: 900px) {
  #app-layout { flex-direction: column; height: auto; }
  #text-panel { width: 100%; height: 40vh; }
  #animation-panel { width: 100%; height: auto; }
  #widget-panel { width: 100%; height: 30vh; }
}

/* ── Stadium Container ── */
#stadium-wrap {
  position: relative;
  width: 100%;
  background: linear-gradient(180deg, #1a2744 0%, #0d1a30 100%);
  border-radius: 0 0 12px 12px;
  overflow: hidden;
}
#stadium-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30px;
  background: repeating-linear-gradient(90deg,
    rgba(100,130,180,0.1) 0px, rgba(80,110,160,0.08) 3px, rgba(60,90,140,0.1) 6px);
  z-index: 1;
  pointer-events: none;
}

/* Pitch canvas */
#pitch-container {
  position: relative;
  padding: 8px 20px;
  display: flex;
  justify-content: center;
}
#pitchCanvas { display: block; border-radius: 4px; }

/* Possession label */
#possession-label {
  position: absolute; top: 80px; left: 100px; z-index: 10;
  text-align: center; pointer-events: none;
}
#possession-label .team-name { font-size: 20px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
#possession-label .label { font-size: 13px; color: #f5c542; font-weight: 600; }

/* Event overlay */
#event-overlay {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; z-index: 20; pointer-events: none;
  animation: eventPop 0.4s ease-out;
}
#event-icon { font-size: 48px; margin-bottom: 4px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }
#event-minute { font-size: 14px; color: #5ddf5d; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
#event-text { font-size: 16px; font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.8); max-width: 240px; margin: 0 auto; }
@keyframes eventPop {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  60% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* ── Score Bar ── */
#score-bar {
  background: linear-gradient(180deg, #0f1e36 0%, #0a1628 100%);
  padding: 8px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.score-section { position: relative; display: flex; align-items: center; justify-content: center; }
.team-info { display: flex; align-items: center; gap: 8px; width: 200px; }
.team-info.home { justify-content: flex-end; }
.team-info.away { flex-direction: row-reverse; justify-content: flex-end; }
.team-flag { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.team-flag img { width: 100%; height: 100%; object-fit: contain; }
.team-label { font-size: 15px; font-weight: 600; padding-bottom: 2px; border-bottom: 3px solid transparent; transition: border-color 0.3s; white-space: nowrap; }
.team-label.has-possession { border-bottom-color: #5ddf5d; }
.score-display { font-size: 28px; font-weight: 800; letter-spacing: 2px; min-width: 100px; text-align: center; flex-shrink: 0; }

/* ── Timeline ── */
#timeline-section { background: #0d1a30; padding: 8px 12px 4px; }
#timeline-controls-row { display: flex; align-items: center; gap: 8px; }
#timeline-controls-row button {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.15); color: #ccc;
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
#timeline-controls-row button:hover { background: #254070; color: #fff; }
#current-time-display { font-size: 14px; color: #5ddf5d; font-weight: 700; min-width: 36px; text-align: center; flex-shrink: 0; }
#timeline-container { position: relative; height: 70px; flex: 1; min-width: 0; }
.timeline-team-label { display: none; }
#timeline-track { position: absolute; left: 0; right: 0; top: 0; bottom: 0; cursor: pointer; user-select: none; }
#momentumCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }

#timeline-bottom-row { display: flex; flex-direction: column; gap: 2px; padding: 2px 0 0 0; }
.time-axis { display: flex; justify-content: space-between; font-size: 10px; color: #556677; padding: 0; }
#speed-buttons { display: flex; gap: 4px; justify-content: flex-end; }
#speed-buttons .speed-btn {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #889;
  padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.15s;
}
#speed-buttons .speed-btn:hover { background: #254070; color: #fff; }
#speed-buttons .speed-btn.active { background: #2a5090; color: #fff; border-color: #5ba3f5; }

/* Timeline split halves */
.timeline-half {
  position: absolute; left: 0; right: 0; display: flex; align-items: center;
  padding: 0 6px; overflow: hidden;
}
.timeline-half.home { top: 0; height: 50%; background: rgba(91,163,245,0.08); border-bottom: 1px solid rgba(255,255,255,0.06); }
.timeline-half.away { bottom: 0; height: 50%; background: rgba(245,166,35,0.06); }
.timeline-half .team-name-bg { font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.12); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; pointer-events: none; }

/* Timeline events */
.timeline-event {
  position: absolute; font-size: 16px; cursor: pointer; z-index: 5;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); display: flex; align-items: center; gap: 2px; transform: translateX(-6px);
}
.timeline-event::after { content: attr(data-label); font-size: 9px; color: rgba(255,255,255,0.85); font-weight: 600; white-space: nowrap; margin-left: 3px; opacity: 0; transition: opacity 0.2s; }
.timeline-event:hover::after, .timeline-event.active::after { opacity: 1; }
.timeline-event.home { top: 3px; }
.timeline-event.away { bottom: 3px; }

/* Timeline progress */
#timeline-progress {
  position: absolute; top: 0; left: 0; width: 0%; height: 100%;
  background: rgba(93,223,93,0.06); border-right: 2px solid rgba(93,223,93,0.6);
  pointer-events: none; z-index: 6;
}
#timeline-time-indicator {
  position: absolute; top: -16px; font-size: 11px; font-weight: 700; color: #5ddf5d;
  transform: translateX(-50%); pointer-events: none; z-index: 10;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
#timeline-track.seeking { cursor: grabbing; }
#timeline-track.seeking #timeline-progress { border-right-color: #ff6b6b; background: rgba(255,107,107,0.08); }

/* Timeline published segments */
.timeline-segment {
  position: absolute; top: 2px; bottom: 2px;
  background: rgba(156,39,176,0.3); border: 1px solid rgba(156,39,176,0.6);
  border-radius: 3px; z-index: 4; display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: rgba(255,255,255,0.7); overflow: hidden; white-space: nowrap; min-width: 20px;
  pointer-events: none;
}

/* Loading */
#loading {
  position: fixed; inset: 0; background: #0a1628;
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px;
}
#loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(91,163,245,0.2); border-top-color: #5ba3f5; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading .text { color: #8899aa; font-size: 14px; }
#loading.hidden { display: none; }

/* ── Match Setup Overlay ── */
#match-setup-overlay {
  position: fixed; inset: 0; z-index: 1001;
  display: none; align-items: center; justify-content: center;
  background: rgba(10,22,40,0.97); overflow-y: auto; padding: 20px;
}
#match-setup-panel {
  max-width: 860px; width: 100%;
  background: linear-gradient(180deg, #0f1e36 0%, #0a1628 100%);
  border: 1px solid rgba(91,163,245,0.3); border-radius: 12px; padding: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#match-setup-panel h2 { font-size: 20px; font-weight: 800; color: #5ba3f5; text-align: center; margin-bottom: 20px; }
.setup-teams { display: flex; gap: 20px; }
.setup-team { flex: 1; min-width: 0; }
.setup-team h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid rgba(255,255,255,0.1); }
.setup-team.home h3 { color: #5ba3f5; }
.setup-team.away h3 { color: #f5a623; }
.setup-field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.setup-field label { font-size: 12px; color: #8899aa; min-width: 50px; flex-shrink: 0; }
.setup-field input[type="text"], .setup-field input[type="number"] {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.15); color: #ddd;
  padding: 6px 8px; border-radius: 6px; font-size: 12px; flex: 1; min-width: 0;
}
.setup-field input[type="color"] { width: 36px; height: 28px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
.setup-field select { background: #1a3050; border: 1px solid rgba(255,255,255,0.15); color: #ddd; padding: 6px 8px; border-radius: 6px; font-size: 12px; }
.espn-result:hover { background: rgba(91,163,245,0.15); }
.setup-roster-header { display: flex; gap: 6px; font-size: 10px; color: #667; margin: 10px 0 4px; padding: 0 2px; }
.setup-roster-header span:nth-child(1) { width: 44px; text-align: center; }
.setup-roster-header span:nth-child(2) { flex: 1; }
.setup-roster-header span:nth-child(3) { width: 30px; text-align: center; }
.setup-player-row { display: flex; gap: 4px; margin-bottom: 3px; align-items: center; }
.setup-player-row input[type="number"] {
  width: 44px; background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #ddd;
  padding: 4px 4px; border-radius: 4px; font-size: 11px; text-align: center; flex-shrink: 0;
}
.setup-player-row input[type="text"] {
  flex: 1; background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #ddd;
  padding: 4px 6px; border-radius: 4px; font-size: 11px; min-width: 0;
}
.setup-player-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: #5ba3f5; }
.setup-player-row.gk-row input[type="text"] { border-color: rgba(68,221,102,0.4); }
.setup-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
.setup-actions button {
  padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s;
}
#setup-quick-fill { background: #1a3050; color: #aab; border: 1px solid rgba(255,255,255,0.15); }
#setup-quick-fill:hover { background: #254070; color: #fff; }
#setup-start { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; box-shadow: 0 4px 16px rgba(46,204,113,0.3); }
#setup-start:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(46,204,113,0.5); }

/* ── Editor Canvas ── */
#editor-canvas-wrap { position: relative; overflow: hidden; flex-shrink: 0; display: flex; justify-content: center; }
#editorCanvas { display: block; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: grab; }
#editorCanvas.dragging { cursor: grabbing; }

/* ── Selector Bar ── */
#selector-bar { padding: 6px 0; }
.selector-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.selector-label { font-size: 11px; color: #8899aa; min-width: 36px; }
.selector-buttons { display: flex; gap: 3px; flex-wrap: wrap; }
.sel-btn {
  min-width: 32px; height: 28px; border: 2px solid rgba(255,255,255,0.15); border-radius: 4px;
  cursor: pointer; font-size: 11px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.sel-btn-home { background: rgba(91,163,245,0.5); }
.sel-btn-away { background: rgba(245,166,35,0.5); }
.sel-btn-gk { background: rgba(68,221,102,0.3); }
.sel-btn-ball { background: rgba(255,255,255,0.2); min-width: 50px; }
.sel-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); transform: scale(1.1); }
.sel-btn-home.active { background: rgba(91,163,245,0.7); }
.sel-btn-away.active { background: rgba(245,166,35,0.7); }
.sel-btn-ball.active { background: rgba(255,255,255,0.5); color: #000; }
.sel-btn-gk.active { background: rgba(68,221,102,0.7); }

/* ── Segments Panel ── */
#segments-panel { flex: 1; min-height: 80px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 4px; }
.seg-columns-header { display: flex; gap: 6px; margin-bottom: 4px; }
.seg-col-title { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 3px 0; border-radius: 4px; }
.seg-col-title.seg-col-home { background: rgba(91,163,245,0.1); color: #5ba3f5; }
.seg-col-title.seg-col-away { background: rgba(245,166,35,0.1); color: #f5a623; }
#segments-list { display: flex; flex-direction: column; gap: 4px; }
.segment-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px; padding: 8px; margin-bottom: 6px;
}
.segment-card.active { border-color: rgba(91,163,245,0.4); background: rgba(91,163,245,0.05); }
.segment-card.seg-home { border-left: 3px solid rgba(91,163,245,0.4); }
.segment-card.seg-away { border-left: 3px solid rgba(245,166,35,0.4); }
.segment-card:hover { border-color: rgba(255,255,255,0.12); }
.segment-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; flex-wrap: wrap; }
.segment-header input {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #ddd;
  padding: 3px 6px; border-radius: 4px; font-size: 11px; width: 70px; text-align: center;
}
.segment-header .seg-label { color: #5ba3f5; font-weight: 700; }
.seg-time-sel { background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #ddd; padding: 2px 4px; border-radius: 3px; font-size: 11px; width: 46px; }
.segment-timeline { display: flex; align-items: center; gap: 6px; }
.segment-bar {
  flex: 1; height: 28px; background: rgba(255,255,255,0.05); border-radius: 14px;
  position: relative; display: flex; align-items: center; cursor: pointer;
}
.segment-bar:hover { background: rgba(255,255,255,0.08); }
.seg-node-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
  position: absolute; transform: translateX(-50%); pointer-events: none;
}
.seg-node-dot.filled { background: rgba(91,163,245,0.5); border-color: #5ba3f5; }
.seg-seek-line {
  position: absolute; top: 2px; bottom: 2px; width: 2px;
  background: #5ddf5d; border-radius: 1px; pointer-events: none; display: none;
}
.seg-play-btn {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #aab;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap;
}
.seg-play-btn:hover { background: #254070; color: #fff; }
.seg-toggle { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 10px; }
.seg-toggle input { width: 14px; height: 14px; accent-color: #5ddf5d; cursor: pointer; }
.seg-toggle-label { color: #889; }
.segment-actions { display: flex; gap: 4px; margin-top: 6px; }
.segment-actions button {
  background: #1a3050; border: 1px solid rgba(255,255,255,0.12); color: #aab;
  padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.15s;
}
.segment-actions button:hover { background: #254070; color: #fff; }
.segment-actions .seg-delete-btn { color: #e74c3c; }
.segment-actions .seg-delete-btn:hover { background: rgba(231,76,60,0.15); }
.segment-actions .seg-save-btn { color: #5ddf5d; }
.segment-actions .seg-save-btn:hover { background: rgba(93,223,93,0.1); }

/* ── Publish Button ── */
/* ── Template Grid ── */
#template-section { padding: 6px 0; border-top: 1px solid rgba(255,255,255,0.06); }
#template-grid { max-height: 240px; overflow-y: auto; }

/* Template tabs */
.tpl-tabs { display: flex; gap: 3px; margin-bottom: 6px; flex-wrap: wrap; }
.tpl-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #889; padding: 3px 10px; border-radius: 10px; cursor: pointer; font-size: 10px; font-weight: 600; transition: all 0.15s; }
.tpl-tab:hover { background: rgba(245,166,35,0.15); color: #f5a623; }
.tpl-tab.active { background: rgba(245,166,35,0.2); color: #f5a623; border-color: rgba(245,166,35,0.4); }

/* Template cards */
/* .tpl-cards removed — replaced by tpl-two-col layout */
.tpl-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 4px 6px; cursor: pointer; font-size: 10px; color: #aab; transition: all 0.2s; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
.tpl-card:hover { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.4); color: #fff; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(245,166,35,0.2); }
.tpl-card .tpl-icon { font-size: 12px; }
.tpl-card .tpl-name { font-weight: 600; }
.tpl-card .tpl-zone { color: #667; font-size: 9px; }
.tpl-card.tpl-home { border-left: 3px solid rgba(91,163,245,0.5); }
.tpl-card.tpl-home:hover { background: rgba(91,163,245,0.12); border-color: #5ba3f5; }
.tpl-card.tpl-away { border-left: 3px solid rgba(245,166,35,0.5); }
.tpl-card.tpl-away:hover { background: rgba(245,166,35,0.12); border-color: #f5a623; }
.tpl-team-tag { font-size: 9px; font-weight: 800; padding: 1px 4px; border-radius: 3px; }
.tpl-team-tag.tpl-home { background: rgba(91,163,245,0.3); color: #5ba3f5; }
.tpl-team-tag.tpl-away { background: rgba(245,166,35,0.3); color: #f5a623; }
.tpl-two-col { display: flex; gap: 6px; }
.tpl-col { flex: 1; min-width: 0; }
.tpl-col-header { text-align: center; font-size: 10px; font-weight: 700; padding: 2px 0; border-radius: 3px; margin-bottom: 4px; }
.tpl-col-header.tpl-home { background: rgba(91,163,245,0.1); color: #5ba3f5; }
.tpl-col-header.tpl-away { background: rgba(245,166,35,0.1); color: #f5a623; }
.tpl-col-cards { display: flex; flex-wrap: wrap; gap: 3px; }

.publish-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #f5a623, #e09000);
  border: none; color: #fff; font-size: 16px; font-weight: 800;
  border-radius: 8px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
}
.publish-btn:hover { box-shadow: 0 4px 20px rgba(245,166,35,0.4); transform: translateY(-1px); }

/* ── Goal Lightbox (American Dramatic Style) ── */
#goal-lightbox {
  position: fixed; inset: 0; z-index: 2000;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.97) 100%);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden;
}
#goal-lightbox.show { display: flex; animation: lbFlashIn 0.3s ease-out; }
@keyframes lbFlashIn { 0% { opacity: 0; } 30% { opacity: 1; background: rgba(255,255,255,0.3); } 100% { opacity: 1; } }

/* Animated background stripes */
#goal-lightbox::before {
  content: ''; position: absolute; inset: -50%;
  background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
  animation: lbStripes 3s linear infinite;
}
@keyframes lbStripes { to { transform: translateX(113px); } }

/* Pulsing border glow */
#goal-lightbox::after {
  content: ''; position: absolute; inset: 10px;
  border: 3px solid rgba(255,200,0,0.3);
  border-radius: 12px;
  animation: lbBorderPulse 2s ease-in-out infinite;
}
@keyframes lbBorderPulse { 0%,100% { border-color: rgba(255,200,0,0.2); box-shadow: inset 0 0 30px rgba(255,200,0,0.05); } 50% { border-color: rgba(255,200,0,0.5); box-shadow: inset 0 0 60px rgba(255,200,0,0.1); } }

#goal-lightbox .lb-close {

}

/* Overlay on top of pitch */

.lb-time-badge {

@keyframes lbFirework {

}

/* Screen shake on goal */

  30% { transform: rotateX(15deg) translate(-6px, 2px); }

function addTextEvent(type) {
  const evtType = EVENT_TYPES[type];
  if (!evtType) return;
  const teamVal = document.getElementById('evt-team').value;
  const teamName = teamVal === 'home' ? homeTeam : awayTeam;
  const playerSel = document.getElementById('evt-player');
  const playerName = playerSel.options[playerSel.selectedIndex]?.textContent || '';
  const minute = parseInt(document.getElementById('evt-minute').value) || 0;

  const evt = {
    id: 'evt-' + Date.now(),
    type,
    minute,
    team: teamVal,
    teamName,
    player: playerName,
    desc: evtType.desc(teamName, playerName),
    icon: evtType.icon,
    pushed: false
  };
  textEvents.push(evt);
  textEvents.sort((a, b) => a.minute - b.minute);
  renderTextEvents();
  updateWidget();
}

function deleteTextEvent(id) {
  textEvents = textEvents.filter(e => e.id !== id);
  renderTextEvents();
  updateWidget();
}

function renderTextEvents() {
  const list = document.getElementById('text-event-list');
  if (!list) return;
  if (textEvents.length === 0) {
    list.innerHTML = '<div style="color:#556;font-size:11px;text-align:center;padding:20px">點擊上方按鈕新增比賽事件</div>';
    return;
  }
  list.innerHTML = textEvents.map(evt => `
    <div class="text-event-item">
      <span class="evt-time">${evt.minute}'</span>
      <span class="evt-icon">${evt.icon}</span>
      <span class="evt-team-tag ${evt.team}">${evt.team === 'home' ? '主' : '客'}</span>
      <span class="evt-desc">${evt.desc}</span>
      <span class="evt-delete" onclick="deleteTextEvent('${evt.id}')">✕</span>
    </div>
  `).join('');
  list.scrollTop = list.scrollHeight;
}

function updateWidget() {
  const container = document.getElementById('widget-events');
  if (!container) return;

  updateWidgetScore();

  // Show latest 4 pushed items
  const latest = widgetItems.slice(-4).reverse();

  if (latest.length === 0) {
    container.innerHTML = '<div style="color:#556;font-size:11px;text-align:center;padding:20px">等待推送事件...</div>';
    return;
  }
  container.innerHTML = latest.map(item => {
    if (item.isAnim) {
      const wIdx = widgetItems.indexOf(item);
      return `<div class="widget-event goal" style="cursor:pointer" onclick="playWidgetAnim(${wIdx})">
        <div class="we-time">${item.minute}' ${item.icon}</div>
        <div class="we-desc">${item.desc}</div>
        <div style="font-size:9px;color:#5ddf5d;margin-top:2px">▶ 點擊播放動畫</div>

    }
    return `<div class="widget-event ${item.type}">
      <div class="we-time">${item.minute}' ${item.icon}</div>
      <div class="we-desc">${item.desc}</div>
    </div>`;
  }).join('');
}

function pushTextToWidget() {
  const unpushed = textEvents.filter(e => !e.pushed);
  if (unpushed.length === 0) { alert('沒有新的文字事件'); return; }
  unpushed.forEach(e => {
    e.pushed = true;
    widgetItems.push({ minute: e.minute, type: e.type, icon: e.icon, desc: e.desc, isAnim: false });
  });
  widgetItems.sort((a, b) => a.minute - b.minute);
  renderTextEvents();
  updateWidget();
}

function pushAnimToWidget() {
  const unpushed = segments.filter(s => s.published && !s.pushedToWidget);
  if (unpushed.length === 0) { alert('沒有新的動畫片段'); return; }
  unpushed.forEach(seg => {
    const min = Math.floor(seg.endSeconds / 60);
    widgetItems.push({ minute: min, type: 'goal', icon: '⚽', desc: seg.templateName || '動畫片段', isAnim: true, segId: seg.id, segData: seg });
  });
  // Remove pushed segments from list
  segments = segments.filter(s => !unpushed.includes(s));
  activeSegmentId = segments.length > 0 ? segments[0].id : null;
  widgetItems.sort((a, b) => a.minute - b.minute);
  renderSegmentsList();
  editorDraw();
  updateWidget();
  saveSession();
}

// ── Widget Drag ──
(function() {
  const widget = document.getElementById('widget-panel');
  const handle = widget?.querySelector('.widget-drag-handle');
  if (!widget || !handle) return;
  let dragging = false, offsetX = 0, offsetY = 0;
  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    const rect = widget.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    widget.style.transition = 'none';
    handle.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    widget.style.left = (e.clientX - offsetX) + 'px';
    widget.style.top = (e.clientY - offsetY) + 'px';
    widget.style.right = 'auto';
    widget.style.transform = 'none';
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; handle.style.cursor = 'grab'; }
  });
  // Touch
  handle.addEventListener('touchstart', (e) => {
    dragging = true;
    const t = e.touches[0];
    const rect = widget.getBoundingClientRect();
    offsetX = t.clientX - rect.left;
    offsetY = t.clientY - rect.top;
    widget.style.transition = 'none';
  }, {passive: true});
  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    widget.style.left = (t.clientX - offsetX) + 'px';
    widget.style.top = (t.clientY - offsetY) + 'px';
    widget.style.right = 'auto';
    widget.style.transform = 'none';
  }, {passive: true});
  document.addEventListener('touchend', () => { dragging = false; });
})();

// ===============================================================
// PITCH DRAWING (Preview)
// ===============================================================
const pitchCanvas = document.getElementById('pitchCanvas');
const pitchCtx = pitchCanvas.getContext('2d');
const PITCH_W = 120, PITCH_H = 80;
let canvasW, canvasH, scaleX, scaleY, offsetX = 0, offsetY = 0;

function resizePitch() {
  const panel = document.getElementById('animation-panel');
  const container = document.getElementById('pitch-container');
  const maxW = panel ? panel.clientWidth - 40 : container.clientWidth - 40;
  const maxH = panel ? panel.clientHeight - 20 : Math.min(340, window.innerHeight * 0.42);
  const ratio = PITCH_H / PITCH_W;
  canvasW = maxW;
  canvasH = maxW * ratio;
  if (canvasH > maxH) { canvasH = maxH; canvasW = maxH / ratio; }
  pitchCanvas.width = canvasW * 2;
  pitchCanvas.height = canvasH * 2;
  pitchCanvas.style.width = canvasW + 'px';
  pitchCanvas.style.height = canvasH + 'px';
  scaleX = (canvasW * 2) / PITCH_W;
  scaleY = (canvasH * 2) / PITCH_H;
}

function px(x) { return x * scaleX; }
function py(y) { return y * scaleY; }

function drawPitchOnCtx(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  const sx = w / 120, sy = h / 80;
  const stripeCount = 12;
  const stripeW = w / stripeCount;
  for (let i = 0; i < stripeCount; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2d8a4e' : '#34a058';
    ctx.fillRect(i * stripeW, 0, stripeW, h);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx*0.5, sy*0.5, sx*119, sy*79);
  ctx.beginPath(); ctx.moveTo(sx*60, sy*0.5); ctx.lineTo(sx*60, sy*79.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx*60, sy*40, sx*9.15, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(sx*60, sy*40, 3, 0, Math.PI*2); ctx.fill();
  ctx.strokeRect(sx*0.5, sy*18, sx*16.5, sy*44);
  ctx.strokeRect(sx*0.5, sy*30, sx*5.5, sy*20);
  ctx.strokeRect(sx*103, sy*18, sx*16.5, sy*44);
  ctx.strokeRect(sx*114, sy*30, sx*5.5, sy*20);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(sx*12, sy*40, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx*108, sy*40, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx*12, sy*40, sx*9.15, -0.7, 0.7); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx*108, sy*40, sx*9.15, Math.PI-0.7, Math.PI+0.7); ctx.stroke();
  const cornerR = sx*1.5;
  ctx.beginPath(); ctx.arc(sx*0.5, sy*0.5, cornerR, 0, Math.PI/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx*119.5, sy*0.5, cornerR, Math.PI/2, Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx*119.5, sy*79.5, cornerR, Math.PI, Math.PI*1.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx*0.5, sy*79.5, cornerR, Math.PI*1.5, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 3;
  ctx.strokeRect(sx*(-2), sy*36, sx*2.5, sy*8);
  ctx.strokeRect(sx*119.5, sy*36, sx*2.5, sy*8);
  ctx.lineWidth = 2;
}

function drawPitch() {
  drawPitchOnCtx(pitchCtx, pitchCanvas.width, pitchCanvas.height);
}

// ===============================================================
// DRAW BALL & PLAYERS (Preview)
// ===============================================================
function drawBall(x, y) {
  const ctx = pitchCtx;
  const bx = px(x), by = py(y);
  const r = 18;

  // Shadow
  ctx.beginPath(); ctx.arc(bx + 2, by + 2, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  // White body
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(bx - 4, by - 4, 2, bx, by, r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, '#ddd');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke();

  // Pentagon pattern (5 black patches)
  ctx.fillStyle = '#333';
  // Center pentagon
  const pr = r * 0.35;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 72 - 90) * Math.PI / 180;
    const px2 = bx + Math.cos(a) * pr;
    const py2 = by + Math.sin(a) * pr;
    if (i === 0) ctx.moveTo(px2, py2); else ctx.lineTo(px2, py2);
  }
  ctx.closePath(); ctx.fill();

  // 5 outer pentagons (partial, visible as dark patches on edge)
  for (let i = 0; i < 5; i++) {
    const a = (i * 72 - 90) * Math.PI / 180;
    const cx = bx + Math.cos(a) * r * 0.7;
    const cy = by + Math.sin(a) * r * 0.7;
    ctx.beginPath();
    for (let j = 0; j < 5; j++) {
      const a2 = (j * 72 - 90 + i * 72) * Math.PI / 180;
      const px3 = cx + Math.cos(a2) * pr * 0.6;
      const py3 = cy + Math.sin(a2) * pr * 0.6;
      if (j === 0) ctx.moveTo(px3, py3); else ctx.lineTo(px3, py3);
    }
    ctx.closePath(); ctx.fill();
  }

  // Highlight shine
  ctx.beginPath(); ctx.arc(bx - 5, by - 5, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
}

function drawPlayers(players) {
  const ctx = pitchCtx;
  const r = Math.max(20, scaleX * 2.8);
  players.forEach(p => {
    const x = px(p.x), y = py(p.y);
    const isHome = p.teammate;
    const teamColor = isHome ? homeColor : awayColor;
    const numColor = isHome ? homeNumColor : awayNumColor;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    if (p.keeper) { ctx.fillStyle = isHome ? '#44dd66' : '#dddd44'; }
    else { ctx.fillStyle = teamColor; }
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2.5; ctx.stroke();
    if (p.actor) {
      ctx.beginPath(); ctx.arc(x, y, r+5, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
    }
    if (p.jersey) {
      ctx.fillStyle = p.keeper ? '#000' : numColor;
      ctx.font = `bold ${Math.max(12, r*0.85)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.jersey, x, y+0.5);
    }
  });
}

// ===============================================================
// UTILITY
// ===============================================================
function parseTimestamp(ts) {
  const parts = ts.split(':');
  return parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseFloat(parts[2]);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m + "'" + String(s).padStart(2, '0') + "''";
}

function parseTimeInput(str) {
  // Parse "1'30''" or "1:30" or "90" format
  str = str.trim().replace(/['']/g, "'");
  const parts = str.split("'").filter(x => x !== '');
  if (parts.length >= 2) return parseInt(parts[0])*60 + parseInt(parts[1]);
  const num = parseInt(str);
  return isNaN(num) ? 0 : num;
}

// ===============================================================
// FORMATION SYSTEM
// ===============================================================
function getFormationPositions(bx, by, carrierId, carrierIsHome) {
  const players = [];
  const attackIsHome = carrierIsHome;

  function processTeam(lineup, isHome) {
    const isAttacking = isHome === attackIsHome;
    const atkDir = isHome ? 1 : -1;

    lineup.forEach(p => {
      const isBallCarrier = (p.playerId === carrierId && isHome === carrierIsHome);
      if (isBallCarrier) {
        players.push({ x: bx, y: by, teammate: isHome, keeper: p.keeper, actor: true, jersey: p.jersey });
        return;
      }

      let x = isHome ? p.baseX : 120 - p.baseX;
      let y = p.baseY;

      if (p.keeper) {
        y += (by - 40) * 0.2;
        const ownGoalX = isHome ? 0 : 120;
        const ballDistToGoal = Math.abs(bx - ownGoalX);
        if (ballDistToGoal < 30) { x += atkDir * (30 - ballDistToGoal) * 0.15; }
      } else if (isAttacking) {
        const ballInfluenceX = (bx - 60) / 120;
        const ballInfluenceY = (by - 40) / 80;
        x += ballInfluenceX * 18; y += ballInfluenceY * 10;
        const distToBall = Math.hypot(x - bx, y - by);
        if (distToBall < 30 && distToBall > 8) { x += atkDir * 5; const spreadY = (y < by) ? -4 : 4; y += spreadY; }
      } else {
        const ballDepth = isHome ? (120 - bx) / 120 : bx / 120;
        const retreatAmount = (1 - ballDepth) * 25;
        x -= atkDir * retreatAmount;
        y += (by - y) * 0.25;
        const distToBall = Math.hypot(x - bx, y - by);
        if (distToBall < 30) { const pressureStrength = (30 - distToBall) / 30 * 0.35; x += (bx - x) * pressureStrength; y += (by - y) * pressureStrength; }
        if (isHome && x > bx + 5) x = bx + 3;
        if (!isHome && x < bx - 5) x = bx - 3;
      }

      const rt = performance.now() / 1000;
      const jitterScale = isAttacking ? 1.0 : 0.6;
      x += Math.sin(rt * 0.8 + p.jersey * 7.3) * jitterScale;
      y += Math.cos(rt * 0.6 + p.jersey * 11.7) * jitterScale;
      x = Math.max(2, Math.min(118, x)); y = Math.max(2, Math.min(78, y));
      players.push({ x, y, teammate: isHome, keeper: p.keeper, actor: false, jersey: p.jersey });
    });
  }

  processTeam(homeLineup, true);
  processTeam(awayLineup, false);
  return players;
}

function updatePlayerPositions(ev) {
  const carrierId = ev.playerId || 0;
  const carrierIsHome = ev.teamId === homeId;
  const targets = getFormationPositions(ballX, ballY, carrierId, carrierIsHome);

  if (smoothedPlayers.length !== targets.length) {
    smoothedPlayers = targets.map(p => ({ ...p }));
    currentPlayers = smoothedPlayers;
    return;
  }

  const lerpSpeed = 0.10;
  const carrierLerp = 0.20;
  for (let i = 0; i < targets.length; i++) {
    const t = targets[i];
    const s = smoothedPlayers[i];
    const speed = t.actor ? carrierLerp : lerpSpeed;
    s.x += (t.x - s.x) * speed; s.y += (t.y - s.y) * speed;
    s.teammate = t.teammate; s.keeper = t.keeper; s.actor = t.actor; s.jersey = t.jersey;
  }
  currentPlayers = smoothedPlayers;
}

function updateTimeDisplay() {
  let minDisplay;
  if (currentPeriod === 1) { minDisplay = Math.min(45, Math.floor(totalMatchSeconds / 60)); }
  else if (currentPeriod === 2) { minDisplay = Math.min(90, 45 + Math.floor((totalMatchSeconds - 2700) / 60)); }
  else { minDisplay = Math.floor(totalMatchSeconds / 60); }
  const timeStr = minDisplay + "'";
  const ctd = document.getElementById('current-time-display');
  if (ctd) ctd.textContent = timeStr;
}

function updateTimeAxisLabels() {
  const el = document.getElementById('time-axis-labels');
  if (!el) return;
  const labels = ["0'", "15'", "30'", "HT", "60'", "75'", "90'"];
  el.innerHTML = labels.map(l => `<span>${l}</span>`).join('');
}

// ===============================================================
// SCENE SYSTEM (kept for legacy goal animation)
// ===============================================================
function renderSceneFrame(elapsed) {
  if (!currentScene) return;
  const { keyframes, ke } = currentScene;
  let kfA = keyframes[0], kfB = keyframes[0];
  for (let i = 0; i < keyframes.length - 1; i++) {
    if (elapsed >= keyframes[i].t && elapsed < keyframes[i+1].t) { kfA = keyframes[i]; kfB = keyframes[i+1]; break; }
    if (i === keyframes.length - 2) { kfA = kfB = keyframes[keyframes.length-1]; }
  }
  const segDur = kfB.t - kfA.t || 1;
  const t = Math.min((elapsed - kfA.t) / segDur, 1);
  const smooth = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
  ballX = kfA.bx + (kfB.bx - kfA.bx) * smooth;
  ballY = kfA.by + (kfB.by - kfA.by) * smooth;
  const carrier = kfB.carrier || kfA.carrier;
  const fakeEv = { playerId: carrier?.playerId || 0, teamId: ke.teamId, period: currentPeriod };
  updatePlayerPositions(fakeEv);
  drawPitch();
  drawPlayers(currentPlayers);
  const ballOnPitch = ballX >= 0 && ballX <= 120 && ballY >= 0 && ballY <= 80;
  if (ballOnPitch) drawBall(ballX, ballY);
  const overlay = document.getElementById('event-overlay');
  const label = kfA.label || (t > 0.8 ? kfB.label : null);
  if (label) {
    overlay.style.display = '';
    document.getElementById('event-icon').textContent = '';
    document.getElementById('event-minute').textContent = ke.minute + "'";
    document.getElementById('event-text').textContent = label;
    if (!overlay.dataset.shown) {
      overlay.style.animation = 'none'; void overlay.offsetHeight;
      overlay.style.animation = 'eventPop 0.4s ease-out'; overlay.dataset.shown = '1';
    }
  } else { overlay.style.display = 'none'; delete overlay.dataset.shown; }
}

function stopScene() {
  if (sceneTimer) { clearInterval(sceneTimer); sceneTimer = null; }
  currentScene = null;
  document.getElementById('event-overlay').style.display = 'none';
  delete document.getElementById('event-overlay').dataset.shown;
}

async function searchESPNTeam(side) {
  const input = document.getElementById(`setup-${side}-search`);
  const query = input.value.trim();
  if (!query) return;

  const resultsDiv = document.getElementById(`setup-${side}-search-results`);
  resultsDiv.style.display = '';
  resultsDiv.innerHTML = '<div style="color:#667;font-size:11px;padding:4px">搜尋中...</div>';

  try {
    // 搜尋多個聯賽
    const leagues = ['eng.1','esp.1','ger.1','ita.1','fra.1','usa.1','mex.1','jpn.1','kor.1','bra.1','arg.1'];
    const allTeams = [];

    for (const league of leagues) {
      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams`);
        const data = await res.json();
        if (data.sports && data.sports[0] && data.sports[0].leagues) {
          data.sports[0].leagues.forEach(l => {
            if (l.teams) {
              l.teams.forEach(t => {
                const team = t.team;
                if (team.displayName.toLowerCase().includes(query.toLowerCase()) ||
                    team.shortDisplayName.toLowerCase().includes(query.toLowerCase())) {
                  allTeams.push({
                    id: team.id,
                    name: team.displayName,
                    short: team.shortDisplayName,
                    logo: team.logos?.[0]?.href,
                    color: team.color ? '#' + team.color : '#5ba3f5',
                    league: league
                  });
                }
              });
            }
          });
        }
      } catch(e) {}
    }

    if (allTeams.length === 0) {
      resultsDiv.innerHTML = '<div style="color:#e74c3c;font-size:11px;padding:4px">找不到球隊</div>';
      return;
    }

    resultsDiv.innerHTML = allTeams.slice(0, 10).map(t =>
      `<div class="espn-result" onclick="loadESPNRoster('${side}','${t.id}','${t.league}','${t.name.replace(/'/g,"\\'")}','${t.color}')" style="display:flex;align-items:center;gap:6px;padding:4px 6px;cursor:pointer;border-radius:4px;font-size:11px;color:#ddd">
        ${t.logo ? `<img src="${t.logo}" style="width:20px;height:20px">` : ''}
        <span>${t.name}</span>
      </div>`
    ).join('');
  } catch(err) {
    resultsDiv.innerHTML = `<div style="color:#e74c3c;font-size:11px;padding:4px">搜尋失敗: ${err.message}</div>`;
  }
}

async function loadESPNRoster(side, teamId, league, teamName, teamColor) {
  const resultsDiv = document.getElementById(`setup-${side}-search-results`);
  resultsDiv.innerHTML = '<div style="color:#667;font-size:11px;padding:4px">載入陣容中...</div>';

  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}/roster`);
    const data = await res.json();

    const athletes = data.athletes || [];
    const posOrder = { 'Goalkeeper': 0, 'Defender': 1, 'Midfielder': 2, 'Forward': 3 };
    const allPlayers = [];
    athletes.forEach(group => {
      if (group.items) {
        group.items.forEach(p => {
          allPlayers.push({
            name: p.displayName || p.fullName || '',
            number: parseInt(p.jersey) || 0,
            position: group.position || p.position?.displayName || ''
          });
        });
      }
    });

    // 嘗試平面格式
    if (allPlayers.length === 0 && data.athletes) {
      data.athletes.forEach(p => {
        allPlayers.push({
          name: p.displayName || p.fullName || '',
          number: parseInt(p.jersey) || 0,
          position: p.position?.displayName || ''
        });
      });
    }

    allPlayers.sort((a, b) => (posOrder[a.position] ?? 2) - (posOrder[b.position] ?? 2));

    // 取前 11 名
    const starters = allPlayers.slice(0, 11);
    const rosterData = starters.map((p, i) => ({
      n: p.number || (i + 1),
      name: p.name,
      gk: i === 0 && (p.position === 'Goalkeeper' || p.position === 'GK')
    }));

    // 套用
    document.getElementById(`setup-${side}-name`).value = teamName;
    document.getElementById(`setup-${side}-color`).value = teamColor;
    setupRenderRoster(side, rosterData);
    resultsDiv.style.display = 'none';
    resultsDiv.innerHTML = '';
    document.getElementById(`setup-${side}-search`).value = '';
  } catch(err) {
    resultsDiv.innerHTML = `<div style="color:#e74c3c;font-size:11px;padding:4px">載入失敗: ${err.message}</div>`;
  }
}

// ENTITY SELECTION (Player/Ball)
// ===============================================================
function selectEntity(key) {
  selectedEntities = new Set([key]);
  selectedEntity = key;
  document.querySelectorAll('#selector-bar .sel-btn').forEach(b => b.classList.toggle('active', key === b.dataset.entity));
  initEntityNodes();
  editorDraw();
}

function toggleEntity(key) {
  // Toggle in selectedEntities (for node editing)
  if (selectedEntities.has(key)) {
    selectedEntities.delete(key);
    if (selectedEntity === key) selectedEntity = selectedEntities.values().next().value || 'ball';
  } else {
    selectedEntities.add(key);
    selectedEntity = key;
  }

  // Also toggle in active segment's visible list
  const seg = activeSegmentId ? segments.find(s => s.id === activeSegmentId) : null;
  if (seg) {
    if (!seg.visible) seg.visible = ['ball'];
    const idx = seg.visible.indexOf(key);
    if (idx >= 0) {
      // Don't remove ball
      if (key !== 'ball') seg.visible.splice(idx, 1);
    } else {
      seg.visible.push(key);
    }
  }

  // Update button highlights
  updateButtonStates();
  // Init nodes for all selected entities
  selectedEntities.forEach(e => { selectedEntity = e; initEntityNodes(); });
  selectedEntity = key;
  editorDraw();
  saveSession();
}

function updateButtonStates() {
  const seg = activeSegmentId ? segments.find(s => s.id === activeSegmentId) : null;
  const visibleSet = seg && seg.visible ? new Set(seg.visible) : new Set(['ball']);
  document.querySelectorAll('#selector-bar .sel-btn').forEach(b => {
    const key = b.dataset.entity;
    const isVisible = visibleSet.has(key);
    const isSelected = selectedEntities.has(key);
    b.classList.toggle('active', isSelected);
    b.classList.toggle('visible', isVisible);
    b.style.opacity = isVisible ? '1' : '0.35';
  });
}

// ===============================================================
// EDITOR CANVAS
// ===============================================================
function editorInit() {
  editorCanvas = document.getElementById('editorCanvas');
  if (!editorCanvas) return;
  editorCtx = editorCanvas.getContext('2d');
  const wrap = document.getElementById('editor-canvas-wrap');
  if (!wrap) return;
  // Fixed size: 420 x 280 (120:80 ratio), capped by container
  const maxW = Math.min(420, wrap.clientWidth - 4);
  const w = maxW;
  const h = Math.round(w * 80 / 120);
  editorW = w; editorH = h;
  editorCanvas.width = w * 2;
  editorCanvas.height = h * 2;
  editorCanvas.style.width = w + 'px';
  editorCanvas.style.height = h + 'px';

  editorCanvas.onmousedown = (e) => { const p = editorPitchCoords(e); editorHandleDown(p.x, p.y); };
  editorCanvas.onmousemove = (e) => { const p = editorPitchCoords(e); editorHandleMove(p.x, p.y); };
  editorCanvas.onmouseup = () => editorHandleUp();
  editorCanvas.onmouseleave = () => editorHandleUp();
  editorCanvas.ontouchstart = (e) => { e.preventDefault(); const p = editorPitchCoordsTouch(e); editorHandleDown(p.x, p.y); };
  editorCanvas.ontouchmove = (e) => { e.preventDefault(); const p = editorPitchCoordsTouch(e); editorHandleMove(p.x, p.y); };
  editorCanvas.ontouchend = () => editorHandleUp();

  editorDraw();
}

function editorPitchCoords(e) {
  const rect = editorCanvas.getBoundingClientRect();
  return { x: ((e.clientX - rect.left) / rect.width) * 120, y: ((e.clientY - rect.top) / rect.height) * 80 };
}

function editorPitchCoordsTouch(e) {
  const t = e.touches[0];
  const rect = editorCanvas.getBoundingClientRect();
  return { x: ((t.clientX - rect.left) / rect.width) * 120, y: ((t.clientY - rect.top) / rect.height) * 80 };
}

function editorHandleDown(pitchX, pitchY) {
  if (!activeSegmentId) return;
  const seg = segments.find(s => s.id === activeSegmentId);
  if (!seg) return;

  // Find closest node across ALL selected entities
  const threshold = 8;
  let bestEntity = null, bestNode = -1, bestDist = Infinity;
  selectedEntities.forEach(entityKey => {
    const nodes = seg.nodes[entityKey];
    if (!nodes) return;
    for (let i = 0; i < 4; i++) {
      const d = Math.hypot(nodes[i].x - pitchX, nodes[i].y - pitchY);
      if (d < bestDist) { bestDist = d; bestNode = i; bestEntity = entityKey; }
    }
  });
  if (bestDist < threshold && bestEntity) {
    selectedEntity = bestEntity; // set active for dragging
    editorDraggingNode = bestNode;
    editorCanvas.classList.add('dragging');
  }
}

function editorHandleMove(pitchX, pitchY) {
  if (editorDraggingNode < 0) return;
  const seg = segments.find(s => s.id === activeSegmentId);
  if (!seg || !seg.nodes[selectedEntity]) return;
  pitchX = Math.max(1, Math.min(119, pitchX));
  pitchY = Math.max(1, Math.min(79, pitchY));

  const nodes = seg.nodes[selectedEntity];
  const dragIdx = editorDraggingNode;

  // Check if all 4 nodes are at roughly the same position (initial state)
  const allSame = nodes.every(n => Math.hypot(n.x - nodes[0].x, n.y - nodes[0].y) < 3);

  if (allSame) {
    // First drag: spread all nodes into a path
    // Origin = where nodes started, Target = where dragging to
    const originX = nodes[0].x, originY = nodes[0].y;
    // Node 4 = drag target (end), Node 1 = origin (start)
    // Spread nodes 1→4 from origin to target
    for (let i = 0; i < 4; i++) {
      const t = i / 3; // 0, 0.33, 0.67, 1
      nodes[i] = {
        x: originX + (pitchX - originX) * t,
        y: originY + (pitchY - originY) * t
      };
    }
  } else {
    // Normal: only move the dragged node
    nodes[dragIdx] = { x: pitchX, y: pitchY };
  }

  editorDraw();
}

function editorHandleUp() {
  if (editorDraggingNode >= 0) {
    editorDraggingNode = -1;
    editorCanvas.classList.remove('dragging');
    saveSession();
  }
}

function editorDraw() {
  if (!editorCtx) return;
  const ctx = editorCtx;
  const w = editorCanvas.width, h = editorCanvas.height;
  const sx = w / 120, sy = h / 80;

  // Draw pitch
  drawPitchOnCtx(ctx, w, h);

  const seg = activeSegmentId ? segments.find(s => s.id === activeSegmentId) : null;

  // Draw attack direction indicators based on half
  const segTime = seg ? seg.startSeconds : totalMatchSeconds;
  const isSecondHalf = segTime >= 2700; // 45 min
  // First half: home→right, away→left. Second half: swap.
  const homeGoalX = isSecondHalf ? 0 : 120;
  const awayGoalX = isSecondHalf ? 120 : 0;
  const hColor = homeColor || '#5ba3f5';
  const aColor = awayColor || '#f5a623';

  // Home attack arrow
  const hArrowX = homeGoalX === 120 ? (w - 30) : 30;
  const hArrowDir = homeGoalX === 120 ? 1 : -1;
  ctx.fillStyle = hColor;
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.moveTo(hArrowX, h * 0.35);
  ctx.lineTo(hArrowX + hArrowDir * 18, h * 0.5);
  ctx.lineTo(hArrowX, h * 0.65);
  ctx.fill();
  ctx.globalAlpha = 0.5;
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = hArrowDir > 0 ? 'right' : 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(homeTeam + '→', hArrowX - hArrowDir * 4, h * 0.5);

  // Away attack arrow
  const aArrowX = awayGoalX === 120 ? (w - 30) : 30;
  const aArrowDir = awayGoalX === 120 ? 1 : -1;
  ctx.fillStyle = aColor;
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.moveTo(aArrowX, h * 0.35 - 30);
  ctx.lineTo(aArrowX + aArrowDir * 18, h * 0.5 - 30);
  ctx.lineTo(aArrowX, h * 0.65 - 30);
  ctx.fill();
  ctx.globalAlpha = 0.5;
  ctx.textAlign = aArrowDir > 0 ? 'right' : 'left';
  ctx.fillText(awayTeam + '→', aArrowX - aArrowDir * 4, h * 0.5 - 30);
  ctx.globalAlpha = 1;

  // Half label
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(isSecondHalf ? '下半場' : '上半場', w / 2, 6);

  // Draw players — only visible ones, non-selected as faded
  const visibleSet = seg && seg.visible ? new Set(seg.visible) : new Set(['ball']);
  const allPlayers = [
    ...homeLineup.map(p => ({ x: p.baseX, y: p.baseY, jersey: p.jersey, isHome: true, keeper: p.keeper, key: 'home-' + p.jersey })),
    ...awayLineup.map(p => ({ x: 120 - p.baseX, y: p.baseY, jersey: p.jersey, isHome: false, keeper: p.keeper, key: 'away-' + p.jersey }))
  ];
  allPlayers.forEach(p => {
    if (!visibleSet.has(p.key)) return; // hidden — skip entirely
    if (selectedEntities.has(p.key)) return; // skip — drawn as nodes below
    const ppx = p.x * sx, ppy = p.y * sy;
    ctx.globalAlpha = 0.25;
    ctx.beginPath(); ctx.arc(ppx, ppy, 14, 0, Math.PI*2);
    ctx.fillStyle = p.keeper ? (p.isHome ? '#44dd66' : '#dddd44') : (p.isHome ? homeColor : awayColor);
    ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.jersey, ppx, ppy);
    ctx.globalAlpha = 1;
  });

  if (!seg) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('請先新增或選擇一個片段', w/2, h/2);
    return;
  }

  // Draw ALL selected entities' nodes
  selectedEntities.forEach(entityKey => {
    if (!seg.nodes[entityKey]) return;
    const nodes = seg.nodes[entityKey];
    const isBall = entityKey === 'ball';
    const isHome = entityKey.startsWith('home-');
    let nodeColor = '#fff';
    let entityLabel = '⚽';
    if (!isBall) {
      const jersey = parseInt(entityKey.split('-')[1]);
      const lineup = isHome ? homeLineup : awayLineup;
      const player = lineup.find(p => p.jersey === jersey);
      nodeColor = (player && player.keeper) ? (isHome ? '#44dd66' : '#dddd44') : (isHome ? homeColor : awayColor);
      entityLabel = '#' + jersey;
    }

    // Connecting lines
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const nx = nodes[i].x * sx, ny = nodes[i].y * sy;
      if (i === 0) ctx.moveTo(nx, ny); else ctx.lineTo(nx, ny);
    }
    ctx.strokeStyle = nodeColor;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 5]);
    ctx.globalAlpha = 0.8;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Draw node circles — LARGE with clear numbers
    for (let i = 0; i < 4; i++) {
      const nx = nodes[i].x * sx, ny = nodes[i].y * sy;
      const r = isBall ? 18 : 22;
      const isDragging = editorDraggingNode === i && selectedEntity === entityKey;

      // Glow for active drag
      if (isDragging) {
        ctx.beginPath(); ctx.arc(nx, ny, r + 8, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
      }

      // Node circle
      ctx.beginPath(); ctx.arc(nx, ny, r, 0, Math.PI*2);
      ctx.fillStyle = nodeColor; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

      // Node number — BIG and clear
      ctx.fillStyle = isBall ? '#333' : '#fff';
      ctx.font = `bold ${r}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, nx, ny + 1);
    }

    // Entity label near node 1
    ctx.fillStyle = nodeColor;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(entityLabel, nodes[0].x * sx + 14, nodes[0].y * sy - 4);
  });
}

function mirrorNodes(nodes) {
  // Mirror x coords for away team attack (attack LEFT toward x=0)
  const mirrored = {};
  Object.entries(nodes).forEach(([key, positions]) => {
    mirrored[key] = positions.map(p => ({ x: 120 - p.x, y: p.y }));
  });
  return mirrored;
}

function applyTemplate(tplId, forceAway) {
  const tpl = GOAL_TEMPLATES.find(t => t.id === tplId);
  if (!tpl) return;

  const isAway = forceAway === true;
  const dur = 8;
  const startSec = findNextAvailableTime(dur);
  const endSec = startSec + dur;
  const goalSec = endSec;
  const minute = Math.floor(goalSec / 60);
  const second = goalSec % 60;

  // Build node data from template
  const raw = tpl.build();
  let ballNodes = raw.ball;
  let playerNodes = raw.players;

  // Determine if second half (teams swap sides)
  const isSecondHalf = goalSec >= 2700; // >= 45'

  // Mirror logic:
  // 1st half: home attacks RIGHT, away attacks LEFT (default)
  // 2nd half: home attacks LEFT, away attacks RIGHT (mirror all)
  const isTeamSpecific = tpl.cat === '主隊角球' || tpl.cat === '客隊角球';

  // Need mirror if: (away team in 1st half) OR (home team in 2nd half)
  // For team-specific templates: only mirror for 2nd half swap
  let needMirror = false;
  let needSwapKeys = false;

  if (isTeamSpecific) {
    // Team-specific templates: only mirror x for 2nd half (side swap)
    needMirror = isSecondHalf;
    needSwapKeys = false; // keys already correct
  } else {
    // Generic templates (home attacks right by default)
    // Away in 1st half: mirror + swap keys
    // Home in 2nd half: mirror only (keys stay)
    // Away in 2nd half: swap keys only (mirror cancels out)
    if (!isAway && !isSecondHalf) { needMirror = false; needSwapKeys = false; }
    else if (isAway && !isSecondHalf) { needMirror = true; needSwapKeys = true; }
    else if (!isAway && isSecondHalf) { needMirror = true; needSwapKeys = false; }
    else { needSwapKeys = true; needMirror = false; } // away + 2nd half
  }

  if (needMirror) {
    ballNodes = ballNodes.map(p => ({ x: 120 - p.x, y: p.y }));
    playerNodes = mirrorNodes(playerNodes);
  }
  if (needSwapKeys) {
    const swapped = {};
    Object.entries(playerNodes).forEach(([key, val]) => {
      const newKey = key.startsWith('home-') ? key.replace('home-', 'away-') : key.replace('away-', 'home-');
      swapped[newKey] = val;
    });
    playerNodes = swapped;
  }

  // Create segment
  const seg = {
    id: 'seg-' + Date.now(),
    startSeconds: startSec,
    endSeconds: endSec,
    published: true, // auto-publish
    templateName: (isAway ? '客' : '主') + ' ' + tpl.icon + ' ' + tpl.name,
    visible: ['ball', ...Object.keys(playerNodes)],
    nodes: { 'ball': ballNodes, ...playerNodes }
  };

  segments.push(seg);
  segments.sort((a, b) => a.startSeconds - b.startSeconds);
  selectSegment(seg.id);
  renderSegmentsList();
  renderPublishedTimeline();
  saveSession();

  // Auto-preview immediately
  // Don't auto-play lightbox — let user click "播放" when ready

}

let tplPreviewTimer = null;

function previewTemplate(tplId, isAway) {
  const tpl = GOAL_TEMPLATES.find(t => t.id === tplId);
  if (!tpl) return;

  if (tplPreviewTimer) { clearInterval(tplPreviewTimer); tplPreviewTimer = null; }

  isAway = isAway === true;
  const raw = tpl.build();
  let ballNodes = raw.ball;
  let playerNodes = raw.players;

  if (isAway) {
    ballNodes = ballNodes.map(p => ({ x: 120 - p.x, y: p.y }));
    const mirrored = {};
    Object.entries(playerNodes).forEach(([key, positions]) => {
      const newKey = key.startsWith('home-') ? key.replace('home-', 'away-') : key.replace('away-', 'home-');
      mirrored[newKey] = positions.map(p => ({ x: 120 - p.x, y: p.y }));
    });
    playerNodes = mirrored;
  }

  // Animate on the editor canvas
  const start = performance.now();
  const dur = 2000; // 2 second preview loop

  tplPreviewTimer = setInterval(() => {
    const elapsed = (performance.now() - start) % dur;
    const progress = elapsed / dur;

    if (!editorCtx) return;
    const ctx = editorCtx;
    const w = editorCanvas.width, h = editorCanvas.height;
    const sx = w / 120, sy = h / 80;

    drawPitchOnCtx(ctx, w, h);

    // Interpolate ball
    const bp = interpolateNodes(ballNodes, progress);

    // Draw player paths as dashed lines
    Object.entries(playerNodes).forEach(([key, nodes]) => {
      const isHome = key.startsWith('home-');
      const color = isHome ? (homeColor || '#5ba3f5') : (awayColor || '#f5a623');
      // Path line
      ctx.beginPath();
      nodes.forEach((n, i) => { if (i === 0) ctx.moveTo(n.x * sx, n.y * sy); else ctx.lineTo(n.x * sx, n.y * sy); });
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.3;
      ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;

      // Current position
      const pp = interpolateNodes(nodes, progress);
      ctx.beginPath(); ctx.arc(pp.x * sx, pp.y * sy, 16, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      const jersey = key.split('-')[1];
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(jersey, pp.x * sx, pp.y * sy);
    });

    // Ball path
    ctx.beginPath();
    ballNodes.forEach((n, i) => { if (i === 0) ctx.moveTo(n.x * sx, n.y * sy); else ctx.lineTo(n.x * sx, n.y * sy); });
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);

    // Ball
    ctx.beginPath(); ctx.arc(bp.x * sx, bp.y * sy, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const tplObj = GOAL_TEMPLATES.find(t => t.id === tplId);
    ctx.fillText(tplObj ? tplObj.name : '', w/2, 6);
  }, 33);
}

function stopPreviewTemplate() {
  if (tplPreviewTimer) {
    clearInterval(tplPreviewTimer);
    tplPreviewTimer = null;
    editorDraw(); // restore normal view
  }
}

  const endSec = startSec + 10;
  const seg = {
    id: 'seg-' + Date.now(),
    startSeconds: startSec,
    endSeconds: endSec,
    published: false,
    visible: ['ball'], // only visible entities get animated
    nodes: {
      'ball': [
        { x: 60, y: 40 },
        { x: 60, y: 40 },
        { x: 60, y: 40 },
        { x: 60, y: 40 }
      ]
    }
  };
  segments.push(seg);
  segments.sort((a, b) => a.startSeconds - b.startSeconds);
  selectSegment(seg.id);
  renderSegmentsList();
  updateWidget();
  saveSession();
}

function selectSegment(id) {
  activeSegmentId = id;
  // Restore selectedEntities from segment's visible list
  const seg = segments.find(s => s.id === id);
  if (seg && seg.visible) {
    selectedEntities = new Set(seg.visible);
    selectedEntity = seg.visible[seg.visible.length - 1] || 'ball';
  }
  initEntityNodes();
  updateButtonStates();
  renderSegmentsList();
  editorDraw();
}

function deleteSegment(id) {
  segments = segments.filter(s => s.id !== id);
  if (activeSegmentId === id) {
    activeSegmentId = segments.length > 0 ? segments[0].id : null;
  }
  renderSegmentsList();
  renderPublishedTimeline();
  editorDraw();
  saveSession();
}

function saveSegment(id) {
  // Mark as saved (data is already in memory)
  const seg = segments.find(s => s.id === id);
  if (seg) seg._saved = true;
  renderSegmentsList();
  saveSession();
}

function updateSegmentTime(id, field, value) {
  const seg = segments.find(s => s.id === id);
  if (!seg) return;
  const seconds = parseTimeInput(value);
  if (field === 'start') seg.startSeconds = seconds;
  else seg.endSeconds = seconds;
  if (seg.endSeconds <= seg.startSeconds) seg.endSeconds = seg.startSeconds + 5;
  segments.sort((a, b) => a.startSeconds - b.startSeconds);
  renderSegmentsList();
  saveSession();
}

function initEntityNodes() {
  if (!activeSegmentId) return;
  const seg = segments.find(s => s.id === activeSegmentId);
  if (!seg) return;

  // If entity has no nodes yet in this segment, initialize them
  if (!seg.nodes[selectedEntity]) {
    if (selectedEntity === 'ball') {
      seg.nodes['ball'] = [
        { x: 60, y: 40 }, { x: 60, y: 40 }, { x: 60, y: 40 }, { x: 60, y: 40 }
      ];
    } else {
      // Player — init at their formation position
      const isHome = selectedEntity.startsWith('home-');
      const jersey = parseInt(selectedEntity.split('-')[1]);
      const lineup = isHome ? homeLineup : awayLineup;
      const player = lineup.find(p => p.jersey === jersey);
      if (player) {
        const fx = isHome ? player.baseX : 120 - player.baseX;
        const fy = player.baseY;
        seg.nodes[selectedEntity] = [
          { x: fx, y: fy }, { x: fx, y: fy }, { x: fx, y: fy }, { x: fx, y: fy }
        ];
      }
    }
  }
}

function findNextAvailableTime(duration) {
  let candidate = 0;
  segments.sort((a, b) => a.startSeconds - b.startSeconds);
  for (const seg of segments) {
    if (candidate + duration <= seg.startSeconds) break;
    if (candidate < seg.endSeconds) candidate = seg.endSeconds;
  }
  return candidate;
}

      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'LABEL' || e.target.classList.contains('seg-x')) return;

    const startMin = Math.floor(seg.startSeconds / 60);

    const endSec = seg.endSeconds % 60;
    const pubLabel = seg.published ? ' <span style="color:#5ddf5d;font-size:10px">[已上架]</span>' : '';

    const entityCount = Object.keys(seg.nodes).length;

    // Build minute options (0-90)

    // Build second options (00-59)

    for (let s = 0; s < 60; s++) secOpts += `<option value="${s}">${String(s).padStart(2,'0')}</option>`;

    // Header with dropdown selectors
    const header = document.createElement('div');
    header.className = 'segment-header';
    header.innerHTML = `
      <span class="seg-label">片段${idx+1}</span>${seg.templateName ? ` <span style="color:#f5a623;font-size:10px">${seg.templateName}</span>` : ''}${pubLabel}
      <select class="seg-time-sel" onclick="event.stopPropagation()">${minOpts}</select>
      <span style="color:#667;font-size:10px">'</span>
      <select class="seg-time-sel" onclick="event.stopPropagation()">${secOpts}</select>
      <span style="color:#667;font-size:10px">"</span>
      <span style="color:#556;font-size:10px;margin-left:auto">${entityInfo}</span>
    `;
    const selects = header.querySelectorAll('.seg-time-sel');
    selects[0].value = startMin;
    selects[1].value = startSec;
    selects.forEach(sel => {
      sel.onchange = () => {
        const sm = parseInt(selects[0].value);
        const ss = parseInt(selects[1].value);
        seg.startSeconds = sm * 60 + ss;
        seg.endSeconds = seg.startSeconds + (seg.endSeconds - seg.startSeconds || 8);
        segments.sort((a, b) => a.startSeconds - b.startSeconds);
        renderSegmentsList();
        editorDraw();
        saveSession();
      };
    });
    card.appendChild(header);

    // Delete button (top-right corner)
    const delBtn = document.createElement('span');
    delBtn.className = 'seg-x';
    delBtn.textContent = '✕';
    delBtn.title = '刪除片段';
    delBtn.style.cssText = 'position:absolute;top:4px;right:6px;cursor:pointer;color:rgba(255,255,255,0.3);font-size:12px';
    delBtn.onmouseenter = () => delBtn.style.color = '#e74c3c';
    delBtn.onmouseleave = () => delBtn.style.color = 'rgba(255,255,255,0.3)';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteSegment(seg.id); };
    card.appendChild(delBtn);

    // Actions: 播放
    const actions = document.createElement('div');
    actions.className = 'segment-actions';
    actions.innerHTML = `
      <button class="seg-play-btn" onclick="event.stopPropagation();playSegment('${seg.id}')">▶ 播放</button>
    `;
    card.appendChild(actions);

    list.appendChild(card);
  });
}

// SEGMENT PLAYBACK
// ===============================================================
function generateSegmentFrames(segment, showAll) {
  const dur = segment.endSeconds - segment.startSeconds;
  if (dur <= 0) return [];
  const fps = 30;
  const totalFrames = Math.round(dur * fps);
  const frames = [];

  for (let f = 0; f <= totalFrames; f++) {
    const progress = f / totalFrames;
    const t = segment.startSeconds + progress * dur;

    // Interpolate ball position (always has nodes)
    const ballNodes = segment.nodes['ball'];
    const ballPos = interpolateNodes(ballNodes, progress);

    // Build player array
    const visibleSet = showAll ? null : new Set(segment.visible || ['ball']);
    const playerList = [];

    // Process home players
    homeLineup.forEach(p => {
      const key = 'home-' + p.jersey;
      if (visibleSet && !visibleSet.has(key)) return; // skip hidden players
      if (segment.nodes[key]) {
        const pos = interpolateNodes(segment.nodes[key], progress);
        playerList.push({ x: pos.x, y: pos.y, jersey: p.jersey, teammate: true, keeper: p.keeper, actor: false });
      } else {
        // Visible but no nodes — use formation position
        playerList.push({ x: p.baseX, y: p.baseY, jersey: p.jersey, teammate: true, keeper: p.keeper, actor: false });
      }
    });

    // Process away players
    awayLineup.forEach(p => {
      const key = 'away-' + p.jersey;
      if (visibleSet && !visibleSet.has(key)) return; // skip hidden players
      if (segment.nodes[key]) {
        const pos = interpolateNodes(segment.nodes[key], progress);
        playerList.push({ x: pos.x, y: pos.y, jersey: p.jersey, teammate: false, keeper: p.keeper, actor: false });
      } else {
        playerList.push({ x: 120 - p.baseX, y: p.baseY, jersey: p.jersey, teammate: false, keeper: p.keeper, actor: false });
      }
    });

    frames.push({
      t: progress,
      matchT: t,
      ball: ballPos,
      players: playerList
    });
  }
  return frames;
}

function interpolateNodes(nodes, progress) {
  if (!nodes || nodes.length !== 4) return { x: 60, y: 40 };
  // progress 0..1 maps to nodes 0..3
  const idx = progress * 3;
  const i = Math.min(Math.floor(idx), 2);
  const localT = idx - i;
  const ease = localT < 0.5 ? 2*localT*localT : -1 + (4 - 2*localT)*localT;
  const a = nodes[i], b = nodes[i+1];
  return {
    x: a.x + (b.x - a.x) * ease,
    y: a.y + (b.y - a.y) * ease
  };
}

function playSegment(id) {
  const seg = segments.find(s => s.id === id);
  if (!seg) return;
  openGoalLightbox(seg);
}
