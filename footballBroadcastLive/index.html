let lbTimer = null;
let lbCanvas = null;
let lbCtx = null;

function openGoalLightbox(seg) {
  const lb = document.getElementById('goal-lightbox');
  lbCanvas = document.getElementById('lbCanvas');
  lbCtx = lbCanvas.getContext('2d');

  const wrap = document.querySelector('.lb-pitch-area');
  const w = Math.min(900, window.innerWidth * 0.8);
  const h = Math.round(w * 80 / 120);
  lbCanvas.width = w * 2; lbCanvas.height = h * 2;
  lbCanvas.style.width = w + 'px'; lbCanvas.style.height = h + 'px';

  const isHome = seg.templateName && !seg.templateName.startsWith('客');
  const teamColor = isHome ? (homeColor || '#5ba3f5') : (awayColor || '#f5a623');
  const teamName = isHome ? homeTeam : awayTeam;
  const minute = Math.floor(seg.endSeconds / 60);

  // Hide celebration initially (show after animation)
  document.getElementById('lb-overlay').style.display = 'none';

  // Set team badge
  const badge = document.getElementById('lb-team-badge');
  badge.className = 'lb-team-badge ' + (isHome ? 'home' : 'away');
  document.getElementById('lb-team-dot').style.background = teamColor;
  // 加入球隊 logo
  const logo = isHome ? (window._homeTeamLogo || '') : (window._awayTeamLogo || '');
  const teamEl = document.getElementById('lb-team');
  if (logo) {
    teamEl.innerHTML = `<img src="${logo}" style="height:40px;vertical-align:middle;margin-right:8px"> ${teamName}`;
  } else {
    teamEl.textContent = teamName;
  }

  // Scorer info
  let scorerText = seg.templateName || '';
  document.getElementById('lb-scorer').innerHTML = scorerText;
  document.getElementById('lb-minute').textContent = minute + "' 分鐘";
  document.getElementById('lb-score').textContent = vmHomeScore + ' : ' + vmAwayScore;

  // Show lightbox (only flash on first open, not replay)
  const isReplay = lb.classList.contains('show');
  lb.classList.add('show');
  if (isReplay) {
    // Skip flash animation on replay
    lb.style.animation = 'none';
    void lb.offsetHeight; // force reflow
    lb.style.animation = '';
  }

  // Reset shake
  const canvasWrap = document.getElementById('lb-canvas-wrap');
  canvasWrap.classList.remove('lb-shake');

  // Fireworks only on first open
  if (!isReplay) {
    spawnFireworks(lb, teamColor);
    startBurstEffect(teamColor);
  }

  // Play animation — directly from segment nodes (no filtering)
  pauseVirtualMatch();
  const dur = (seg.endSeconds - seg.startSeconds) * 1000;
  const start = performance.now();

  if (lbTimer) clearInterval(lbTimer);
  lbTimer = setInterval(() => {
    const elapsed = performance.now() - start;
    const progress = Math.min(elapsed / dur, 1);

    // Interpolate ball directly from nodes
    const ballPos = interpolateNodes(seg.nodes['ball'], progress);
    const bx = ballPos.x, by = ballPos.y;

    // Build player list directly from all segment nodes
    const playerList = [];
    Object.keys(seg.nodes).forEach(key => {
      if (key === 'ball') return;
      const isHome = key.startsWith('home-');
      const jersey = parseInt(key.split('-')[1]);
      const pos = interpolateNodes(seg.nodes[key], progress);
      playerList.push({ x: pos.x, y: pos.y, jersey, teammate: isHome, keeper: false, actor: false });
    });

    drawLbFrameDirect(bx, by, playerList, progress);

    // At 85% progress, trigger screen shake + show celebration
    if (progress > 0.85 && !canvasWrap.classList.contains('lb-shake')) {
      canvasWrap.classList.add('lb-shake');
      document.getElementById('lb-overlay').style.display = '';
      // Extra fireworks burst at goal moment
      spawnFireworks(lb, teamColor);
      spawnFireworks(lb, '#FFD700');
    }

    if (progress >= 1) {
      clearInterval(lbTimer); lbTimer = null;
      // Loop after delay
      setTimeout(() => {
        if (lb.classList.contains('show')) {
          canvasWrap.classList.remove('lb-shake');
          document.getElementById('lb-overlay').style.display = 'none';
          openGoalLightbox(seg);
        }
      }, 4000); // longer pause to show celebration
    }
  }, 33);
}

function drawLbFrameDirect(bx, by, playerList, progress) {
  if (!lbCtx) return;
  const ctx = lbCtx;
  const w = lbCanvas.width, h = lbCanvas.height;
  const sx = w / 120, sy = h / 80;

  // Draw pitch
  drawPitchOnCtx(ctx, w, h);

  // Draw players
  const r = Math.max(24, sx * 3);
  playerList.forEach(p => {
    const ppx = p.x * sx, ppy = p.y * sy;

    // Trail glow
    ctx.beginPath(); ctx.arc(ppx, ppy, r + 6, 0, Math.PI * 2);
    ctx.fillStyle = p.teammate ? 'rgba(91,163,245,0.2)' : 'rgba(245,166,35,0.2)';
    ctx.fill();

    // Player circle
    ctx.beginPath(); ctx.arc(ppx, ppy, r, 0, Math.PI * 2);
    ctx.fillStyle = p.teammate ? (homeColor || '#5ba3f5') : (awayColor || '#f5a623');
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

    // Jersey number
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(16, r * 0.65)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.jersey, ppx, ppy);
  });

  // Draw ball (realistic)
  const bpx = bx * sx, bpy = by * sy;
  const br = 20;
  ctx.beginPath(); ctx.arc(bpx + 3, bpy + 3, br, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(bpx, bpy, br, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(bpx - 5, bpy - 5, 2, bpx, bpy, br);
  grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#ddd');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke();
  // Pentagon
  ctx.fillStyle = '#333';
  const pr = br * 0.35;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 72 - 90) * Math.PI / 180;
    if (i === 0) ctx.moveTo(bpx + Math.cos(a) * pr, bpy + Math.sin(a) * pr);
    else ctx.lineTo(bpx + Math.cos(a) * pr, bpy + Math.sin(a) * pr);
  }
  ctx.closePath(); ctx.fill();

  // Dramatic goal flash + zoom effect
  if (progress > 0.8) {
    const p = (progress - 0.8) / 0.2;
    // White flash
    ctx.fillStyle = `rgba(255,255,255,${Math.sin(p * Math.PI) * 0.3})`;
    ctx.fillRect(0, 0, w, h);
    // Radial burst from ball
    const burstR = p * 200;
    ctx.beginPath(); ctx.arc(bx * sx, by * sy, burstR, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(bx * sx, by * sy, 0, bx * sx, by * sy, burstR);
    g.addColorStop(0, `rgba(255,215,0,${0.4 * (1-p)})`);
    g.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = g; ctx.fill();
    // Speed lines
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const innerR = burstR * 0.3;
      const outerR = burstR;
      ctx.beginPath();
      ctx.moveTo(bx * sx + Math.cos(angle) * innerR, by * sy + Math.sin(angle) * innerR);
      ctx.lineTo(bx * sx + Math.cos(angle) * outerR, by * sy + Math.sin(angle) * outerR);
      ctx.strokeStyle = `rgba(255,215,0,${0.5 * (1-p)})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }
}

// ── Manga Burst Effect ──
let burstTimer = null;

function startBurstEffect(teamColor) {
  const canvas = document.getElementById('burstCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth * 2;
  canvas.height = window.innerHeight * 2;

  // Generate random rays and lightning bolts
  const rays = [];
  const numRays = 60;
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
    const width = 8 + Math.random() * 50;
    const colors = [teamColor, '#fff', '#ff3355', '#55aaff', '#88ddff', '#FFD700'];
    rays.push({
      angle,
      width,
      speed: 0.3 + Math.random() * 0.7,
      color: colors[Math.floor(Math.random() * colors.length)],
      length: 0.4 + Math.random() * 0.6,
      delay: Math.random() * 0.3,
    });
  }

  // Lightning bolts
  const bolts = [];
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 0.25 + Math.random() * 0.3;
    bolts.push({ angle, dist, size: 30 + Math.random() * 50, rot: Math.random() * Math.PI });
  }

  const start = performance.now();
  if (burstTimer) cancelAnimationFrame(burstTimer);

  function drawBurst() {
    const elapsed = (performance.now() - start) / 1000;
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const maxR = Math.hypot(cx, cy);

    ctx.clearRect(0, 0, w, h);

    // Dark center
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.4);
    bgGrad.addColorStop(0, 'rgba(10,20,60,0.95)');
    bgGrad.addColorStop(1, 'rgba(10,20,60,0)');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, w, h);

    // Draw rays
    const progress = Math.min(elapsed / 0.5, 1); // expand in 0.5s
    rays.forEach(ray => {
      const t = Math.max(0, progress - ray.delay) / (1 - ray.delay);
      if (t <= 0) return;
      const innerR = maxR * 0.05;
      const outerR = maxR * ray.length * t;
      const pulse = 1 + Math.sin(elapsed * 4 + ray.angle * 3) * 0.15;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(ray.angle + elapsed * 0.1 * ray.speed);

      ctx.beginPath();
      ctx.moveTo(innerR, -ray.width * pulse * 0.5);
      ctx.lineTo(outerR, -ray.width * pulse * 0.15);
      ctx.lineTo(outerR, ray.width * pulse * 0.15);
      ctx.lineTo(innerR, ray.width * pulse * 0.5);
      ctx.closePath();

      ctx.fillStyle = ray.color;
      ctx.globalAlpha = 0.4 * t;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Draw lightning bolts
    bolts.forEach(bolt => {
      const bx = cx + Math.cos(bolt.angle) * maxR * bolt.dist;
      const by = cy + Math.sin(bolt.angle) * maxR * bolt.dist;
      const s = bolt.size * (0.8 + Math.sin(elapsed * 8 + bolt.angle) * 0.3);
      const rot = bolt.rot + elapsed * 0.5;

      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(rot);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.6 + Math.sin(elapsed * 12 + bolt.angle * 5) * 0.4;

      // Lightning bolt shape
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.3, -s * 0.15);
      ctx.lineTo(s * 0.1, -s * 0.1);
      ctx.lineTo(s * 0.4, s * 0.5);
      ctx.lineTo(0, s * 0.1);
      ctx.lineTo(-s * 0.15, s * 0.15);
      ctx.lineTo(-s * 0.05, -s * 0.2);
      ctx.lineTo(-s * 0.25, -s * 0.1);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Small flying particles/dots
    for (let i = 0; i < 40; i++) {
      const a = (i / 40) * Math.PI * 2 + elapsed * 0.3;
      const r = maxR * (0.15 + ((elapsed * 0.4 + i * 0.07) % 0.5));
      const px = cx + Math.cos(a) * r;
      const py = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(px, py, 1 + Math.random() * 3, 0, Math.PI * 2);
      ctx.fillStyle = i % 3 === 0 ? '#fff' : (i % 3 === 1 ? '#ff3355' : '#55aaff');
      ctx.globalAlpha = 0.5 + Math.random() * 0.5;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    burstTimer = requestAnimationFrame(drawBurst);
  }
  drawBurst();
}

function stopBurstEffect() {
  if (burstTimer) { cancelAnimationFrame(burstTimer); burstTimer = null; }
  const canvas = document.getElementById('burstCanvas');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function spawnFireworks(container, color) {
  for (let burst = 0; burst < 6; burst++) {
    setTimeout(() => {
      const cx = Math.random() * 80 + 10;
      const cy = Math.random() * 70 + 10;
      for (let i = 0; i < 30; i++) {
        const spark = document.createElement('div');
        spark.className = 'lb-firework';
        const angle = (i / 30) * Math.PI * 2 + Math.random() * 0.5;
        const dist = 100 + Math.random() * 180;
        const colors = ['#FFD700','#FF6B00','#FF0000','#fff','#5ddf5d',color];
        spark.style.cssText = `
          left:${cx}%; top:${cy}%;
          width:${4 + Math.random() * 6}px; height:${4 + Math.random() * 6}px;
          background: ${colors[Math.floor(Math.random()*colors.length)]};
          --fx: ${Math.cos(angle) * dist}px;
          --fy: ${Math.sin(angle) * dist}px;
          animation-delay: ${Math.random() * 0.4}s;
          animation-duration: ${1.2 + Math.random() * 0.8}s;
        `;
        container.appendChild(spark);
        setTimeout(() => spark.remove(), 2500);
      }
    }, burst * 500);
  }
}

function closeLightbox(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('lb-close')) return;

  lb.querySelectorAll('.lb-firework').forEach(el => el.remove());

  resumeVirtualMatch();
}

function previewSegmentAtProgress(id, progress) {
  const seg = segments.find(s => s.id === id);
  if (!seg) return;
  const frames = generateSegmentFrames(seg);
  if (frames.length === 0) return;

  progress = Math.max(0, Math.min(1, progress));

  // Find surrounding frames
  let fA = frames[0], fB = frames[frames.length - 1];
  for (let i = 0; i < frames.length - 1; i++) {
    if (progress >= frames[i].t && progress <= frames[i + 1].t) {
      fA = frames[i]; fB = frames[i + 1]; break;
    }
  }
  const segDur = fB.t - fA.t || 1;
  const localT = Math.min((progress - fA.t) / segDur, 1);

  ballX = fA.ball.x + (fB.ball.x - fA.ball.x) * localT;
  ballY = fA.ball.y + (fB.ball.y - fA.ball.y) * localT;

  if (fA.players && fB.players && fA.players.length === fB.players.length) {
    currentPlayers = fA.players.map((pa, i) => {
      const pb = fB.players[i];
      return {
        x: pa.x + (pb.x - pa.x) * localT,
        y: pa.y + (pb.y - pa.y) * localT,
        jersey: pa.jersey, teammate: pa.teammate, keeper: pa.keeper, actor: false
      };
    });
    smoothedPlayers = currentPlayers.map(p => ({ ...p }));
  }

  drawPitch();
  drawPlayers(currentPlayers);
  if (ballX >= 0 && ballX <= 120 && ballY >= 0 && ballY <= 80) drawBall(ballX, ballY);
}

function exportTimelineJSON() {
  const published = segments.filter(s => s.published);
  if (published.length === 0) { alert('沒有已啟用的片段'); return; }
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    match: { homeTeam, awayTeam, homeColor, awayColor },
    segments: published.map(seg => ({
      id: seg.id,
      startSeconds: seg.startSeconds,
      endSeconds: seg.endSeconds,
      templateName: seg.templateName || '',
      frames: generateSegmentFrames(seg)
    }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `timeline-${homeTeam}-vs-${awayTeam}-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderPublishedTimeline() {
  const track = document.getElementById('timeline-track');
  if (!track) return;
  track.querySelectorAll('.timeline-segment').forEach(el => el.remove());

  segments.forEach(seg => {
    if (!seg.published) return;
    const leftPct = (seg.startSeconds / maxMatchSeconds) * 100;
    const widthPct = ((seg.endSeconds - seg.startSeconds) / maxMatchSeconds) * 100;
    const div = document.createElement('div');
    div.className = 'timeline-segment';
    div.style.left = leftPct + '%';
    div.style.width = Math.max(widthPct, 0.5) + '%';
    const dur = seg.endSeconds - seg.startSeconds;
    div.textContent = dur + 's';
    track.appendChild(div);
  });
}

function startVirtualMatch() {
  stopScene();
  if (vmInterval) clearInterval(vmInterval);

  vmActive = true; vmPaused = false; isPlaying = true;
  vmHomeScore = 0; vmAwayScore = 0; vmGoals = [];
  homeId = 'vm-home'; awayId = 'vm-away';

  vmPossessionHome = true;

  document.getElementById('away-name').textContent = awayTeam;
  document.getElementById('home-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${homeColor};border:2px solid rgba(255,255,255,0.3)"></span>`;
  document.getElementById('away-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${awayColor};border:2px solid rgba(255,255,255,0.3)"></span>`;
  document.getElementById('home-score').textContent = '0';
  document.getElementById('away-score').textContent = '0';

  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.timeline-event, .timeline-half, .timeline-segment').forEach(el => el.remove());
  const homeHalf = document.createElement('div');
  homeHalf.className = 'timeline-half home';

  const awayHalf = document.createElement('div');
  awayHalf.className = 'timeline-half away';
  awayHalf.innerHTML = `<span class="team-name-bg">${awayTeam}</span>`;
  track.appendChild(awayHalf);

  updateTimeAxisLabels();
  resizePitch();

  // Set initial static formation
  const initPlayers = [];
  homeLineup.forEach(p => initPlayers.push({ x: p.baseX, y: p.baseY, teammate: true, keeper: p.keeper, actor: false, jersey: p.jersey }));
  awayLineup.forEach(p => initPlayers.push({ x: 120 - p.baseX, y: p.baseY, teammate: false, keeper: p.keeper, actor: false, jersey: p.jersey }));
  currentPlayers = initPlayers;
  smoothedPlayers = initPlayers.map(p => ({ ...p }));

  playSpeed = 1;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');

  initTimelineSeek();
  buildPlayerButtons();
  selectEntity('ball');
  editorInit();
  renderTemplateGrid();
  renderPublishedTimeline();

  // Auto-select first segment if exists
  if (segments.length > 0 && !activeSegmentId) {
    activeSegmentId = segments[0].id;
    renderSegmentsList();
    editorDraw();
  }

  vmLastTick = performance.now();
  vmInterval = setInterval(vmTick, 33);

  // Draw initial frame
  drawPitch();
  drawPlayers(currentPlayers);
  drawBall(ballX, ballY);

  updatePlayButton();

  // 初始化文字轉播系統
  renderTextEvents();
  updateWidget();
  updateEvtPlayerDropdown();
  syncScoreControl();
  document.getElementById('evt-team').onchange = updateEvtPlayerDropdown;
}

function vmTick() {
  if (!vmActive || vmPaused) return;
  const now = performance.now();
  const dt = (now - vmLastTick) / 1000;
  vmLastTick = now;

  const gameDt = dt * playSpeed;
  totalMatchSeconds += gameDt;

  if (totalMatchSeconds >= 2700 && currentPeriod === 1) { currentPeriod = 2; }
  if (totalMatchSeconds >= 5400) { stopVirtualMatch(); return; }

  currentMatchMinute = Math.floor(totalMatchSeconds / 60);
  updateTimeDisplay();

  // Check for active published segment
  const published = segments.filter(s => s.published).sort((a,b) => a.startSeconds - b.startSeconds);
  const activeSeg = published.find(s => totalMatchSeconds >= s.startSeconds && totalMatchSeconds < s.endSeconds);

  if (activeSeg) {
    const progress = (totalMatchSeconds - activeSeg.startSeconds) / (activeSeg.endSeconds - activeSeg.startSeconds);
    renderSegmentAtProgress(activeSeg, progress);
  } else {
    // No active segment — show "比賽進行中" on empty pitch
    drawPitch();
    const ctx = pitchCtx;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = `bold ${Math.max(16, canvasW * 0.03)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('比賽進行中', pitchCanvas.width / 2, pitchCanvas.height / 2);
    // Show match time large
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = `bold ${Math.max(24, canvasW * 0.05)}px sans-serif`;
    ctx.fillText(currentMatchMinute + "'", pitchCanvas.width / 2, pitchCanvas.height / 2 + 30);

    // Auto-skip to next segment if there is one
    const nextSeg = published.find(s => s.startSeconds > totalMatchSeconds);
    if (nextSeg) {
      // Fast-forward to next segment (skip empty time)
      totalMatchSeconds = nextSeg.startSeconds;
      currentMatchMinute = Math.floor(totalMatchSeconds / 60);
      currentPeriod = totalMatchSeconds >= 2700 ? 2 : 1;
    } else if (published.length > 0) {
      // All segments played — pause at end
      const lastSeg = published[published.length - 1];
      if (totalMatchSeconds >= lastSeg.endSeconds) {
        pauseVirtualMatch();
      }
    }
  }

  // Update timeline progress + score
  const timePct = Math.min((totalMatchSeconds / maxMatchSeconds) * 100, 100);
  document.getElementById('timeline-progress').style.width = timePct + '%';
  const timeInd = document.getElementById('timeline-time-indicator');
  if (timeInd) { timeInd.style.left = timePct + '%'; timeInd.textContent = currentMatchMinute + "'"; }
  document.getElementById('home-score').textContent = vmHomeScore;
  document.getElementById('away-score').textContent = vmAwayScore;
}

function renderSegmentAtProgress(segment, progress) {
  // Interpolate ball
  const ballNodes = segment.nodes['ball'];
  const ballPos = interpolateNodes(ballNodes, progress);
  ballX = ballPos.x;
  ballY = ballPos.y;

  // Build player positions — only visible entities
  const visibleSet = new Set(segment.visible || []);
  const playerList = [];

  // Only show players that are in the visible list
  Object.keys(segment.nodes).forEach(key => {
    if (key === 'ball') return;
    if (!visibleSet.has(key)) return; // skip hidden
    const isHome = key.startsWith('home-');
    const jersey = parseInt(key.split('-')[1]);
    const lineup = isHome ? homeLineup : awayLineup;
    const player = lineup.find(p => p.jersey === jersey);
    if (!player) return;
    const pos = interpolateNodes(segment.nodes[key], progress);
    playerList.push({ x: pos.x, y: pos.y, jersey: player.jersey, teammate: isHome, keeper: player.keeper, actor: false });
  });

  currentPlayers = playerList;
  smoothedPlayers = playerList.map(p => ({ ...p }));

  drawPitch();
  drawPlayers(currentPlayers);
  if (ballX >= 0 && ballX <= 120 && ballY >= 0 && ballY <= 80) drawBall(ballX, ballY);
}

function togglePlayPause() {
  if (vmPaused) {
    const published = segments.filter(s => s.published).sort((a,b) => a.startSeconds - b.startSeconds);
    if (published.length > 0) {
      // Find next segment to play
      const next = published.find(s => s.endSeconds > totalMatchSeconds);
      if (next) {
        if (totalMatchSeconds < next.startSeconds) {
          totalMatchSeconds = next.startSeconds;
        }
      } else {
        // All played — restart from first
        totalMatchSeconds = published[0].startSeconds;
      }
      currentMatchMinute = Math.floor(totalMatchSeconds / 60);
      currentPeriod = totalMatchSeconds >= 2700 ? 2 : 1;
    }
    // IMPORTANT: reset vmLastTick BEFORE resume to avoid time jump
    vmLastTick = performance.now();
    resumeVirtualMatch();
    isPlaying = true;
  } else {
    pauseVirtualMatch();
    isPlaying = false;
  }
  updatePlayButton();
}

function updatePlayButton() {
  const btn = document.getElementById('btn-play');
  if (btn) btn.innerHTML = vmPaused ? '&#9654;' : '&#9208;';
}

function pauseVirtualMatch() { vmPaused = true; updatePlayButton(); }
function resumeVirtualMatch() { vmPaused = false; vmLastTick = performance.now(); updatePlayButton(); }
function stopVirtualMatch() { vmActive = false; if (vmInterval) { clearInterval(vmInterval); vmInterval = null; } }

// ===============================================================
// TIMELINE SEEKING
// ===============================================================
function initTimelineSeek() {
  const track = document.getElementById('timeline-track');
  if (track.dataset.seekInit) return;
  track.dataset.seekInit = '1';

  function getTimeFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return pct * maxMatchSeconds;
  }

  track.addEventListener('mousedown', (e) => {
    timelineDragging = true; pauseVirtualMatch();
    seekToTime(getTimeFromEvent(e)); track.classList.add('seeking');
  });
  document.addEventListener('mousemove', (e) => {
    if (!timelineDragging) return; seekToTime(getTimeFromEvent(e));
  });
  document.addEventListener('mouseup', () => {
    if (!timelineDragging) return; timelineDragging = false;
    track.classList.remove('seeking');
  });
  track.addEventListener('touchstart', (e) => {
    timelineDragging = true; pauseVirtualMatch();
    seekToTime(getTimeFromEvent(e)); track.classList.add('seeking');
  }, {passive:true});
  document.addEventListener('touchmove', (e) => {
    if (!timelineDragging) return; seekToTime(getTimeFromEvent(e));
  }, {passive:true});
  document.addEventListener('touchend', () => {
    if (!timelineDragging) return; timelineDragging = false;
    track.classList.remove('seeking');
  });
}

function seekToTime(targetSeconds) {
  totalMatchSeconds = Math.max(0, Math.min(maxMatchSeconds, targetSeconds));
  currentMatchMinute = Math.floor(totalMatchSeconds / 60);
  currentPeriod = totalMatchSeconds >= 2700 ? 2 : 1;

  // Recalculate score
  vmHomeScore = 0; vmAwayScore = 0;
  vmGoals.forEach(g => {
    const gs = g.goalMatchSeconds || g.minute * 60;
    if (gs <= totalMatchSeconds) { if (g.team === 'home') vmHomeScore++; else vmAwayScore++; }
  });
  document.getElementById('home-score').textContent = vmHomeScore;
  document.getElementById('away-score').textContent = vmAwayScore;
  updateTimeDisplay();

  const timePct = Math.min((totalMatchSeconds / maxMatchSeconds) * 100, 100);
  document.getElementById('timeline-progress').style.width = timePct + '%';
  const ti = document.getElementById('timeline-time-indicator');
  if (ti) { ti.style.left = timePct + '%'; ti.textContent = currentMatchMinute + "'"; }

  // Check if we're inside a published segment — render that frame
  const activeSeg = segments.find(s => s.published && totalMatchSeconds >= s.startSeconds && totalMatchSeconds < s.endSeconds);
  if (activeSeg) {
    const progress = (totalMatchSeconds - activeSeg.startSeconds) / (activeSeg.endSeconds - activeSeg.startSeconds);
    renderSegmentAtProgress(activeSeg, progress);
  } else {
    // Show "比賽進行中" with time
    drawPitch();
    const ctx = pitchCtx;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = `bold ${Math.max(16, canvasW * 0.03)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('比賽進行中', pitchCanvas.width / 2, pitchCanvas.height / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = `bold ${Math.max(24, canvasW * 0.05)}px sans-serif`;
    ctx.fillText(currentMatchMinute + "'", pitchCanvas.width / 2, pitchCanvas.height / 2 + 30);
  }
}

// ===============================================================
// GOAL KEYFRAMES BUILDER (kept for goal support)
// ===============================================================
function bcBuildGoalKeyframes(params) {
  const { isHome, originX, originY, shotType, playerName, playerJersey } = params;
  const mirr = (x) => isHome ? x : 120 - x;
  const shotX = mirr(originX) + (Math.random()-0.5)*4;
  const shotY = originY + (Math.random()-0.5)*4;
  const goalX = isHome ? 119 : 1;
  const goalY = 37 + Math.random()*6;
  const startX = mirr(35+Math.random()*10);
  const startY = 25+Math.random()*30;
  const midX = mirr(55+Math.random()*10);
  const midY = 15+Math.random()*50;
  const preX = mirr(75+Math.random()*10);
  const preY = originY + (Math.random()-0.5)*20;
  const scorer = { jersey: playerJersey, playerId: playerJersey };
  const keyframes = [
    { t: 0, bx: startX, by: startY, carrier: scorer },
    { t: 1.0, bx: midX, by: midY, carrier: scorer },
    { t: 2.2, bx: preX, by: preY, carrier: scorer },
    { t: 3.2, bx: shotX, by: shotY, carrier: scorer },
    { t: 4.2, bx: goalX, by: goalY, carrier: scorer, effect: 'shot' },
    { t: 4.7, bx: goalX, by: goalY, carrier: scorer, label: `\u26BD 進球！ ${playerName}`, effect: 'burst' },
    { t: 7.7, bx: goalX, by: goalY, carrier: null }
  ];
  return keyframes;
}

function bcInsertGoal(params) {
  const { minute, second, isHome, playerName, playerJersey, goalMatchSeconds } = params;
  if (isHome) vmHomeScore++; else vmAwayScore++;
  document.getElementById('home-score').textContent = vmHomeScore;
  document.getElementById('away-score').textContent = vmAwayScore;
  vmGoals.push({
    minute, second: second || 0, team: isHome ? 'home' : 'away',
    playerName, playerJersey, goalMatchSeconds
  });
  vmGoals.sort((a, b) => (a.goalMatchSeconds || a.minute*60) - (b.goalMatchSeconds || b.minute*60));
  vmRenderTimeline();
  saveSession();
}

function vmRenderTimeline() {
  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.timeline-event').forEach(el => el.remove());
  vmGoals.forEach(g => {
    const pct = (g.minute / 90) * 100;
    const isHome = g.team === 'home';
    const shortName = (g.playerName || '').split(' ').pop();
    const div = document.createElement('div');
    div.className = `timeline-event ${isHome ? 'home' : 'away'}`;
    div.style.left = pct + '%';
    div.innerHTML = '\u26BD';
    div.dataset.label = `${g.minute}' ${shortName}`;
    div.title = `${g.minute}' ${g.playerName || ''}`;
    track.appendChild(div);
  });
}

// ===============================================================
// DATA PERSISTENCE
// ===============================================================
const STORAGE_KEY = 'fbBroadcastSession';

function saveSession() {
  try {
    const data = {
      version: 2,
      savedAt: new Date().toISOString(),
      setup: { homeTeam, awayTeam, homeColor, awayColor, homeNumColor, awayNumColor, homeLineup, awayLineup },
      match: { totalMatchSeconds, currentPeriod, vmHomeScore, vmAwayScore, playSpeed },
      goals: vmGoals,
      segments: segments
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('儲存失敗:', e); }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return (data.version === 1 || data.version === 2) ? data : null;
  } catch(e) { return null; }
}

function restoreSession(data) {
  if (!data) data = _pendingRestore;
  if (!data) return;
  homeTeam = data.setup.homeTeam; awayTeam = data.setup.awayTeam;
  homeColor = data.setup.homeColor; awayColor = data.setup.awayColor;
  homeNumColor = data.setup.homeNumColor; awayNumColor = data.setup.awayNumColor;
  homeLineup = data.setup.homeLineup; awayLineup = data.setup.awayLineup;
  homeId = 'vm-home'; awayId = 'vm-away';
  vmHomeScore = data.match.vmHomeScore; vmAwayScore = data.match.vmAwayScore;
  vmGoals = data.goals || [];
  totalMatchSeconds = data.match.totalMatchSeconds || 0;
  currentPeriod = data.match.currentPeriod || 1;
  playSpeed = data.match.playSpeed || 1;

  // Handle segments — migrate from v1 if needed
  if (data.version === 1 && data.segments && data.segments.length > 0 && data.segments[0].frames) {
    // v1 segments had frames, not nodes. Convert to node-based.
    segments = [];
    // Can't easily convert frame-based to node-based, just start fresh
  } else {
    segments = data.segments || [];
  }

  document.getElementById('match-setup-overlay').style.display = 'none';
  const restoreOv = document.getElementById('restore-overlay');
  if (restoreOv) restoreOv.remove();
  startVirtualMatchFromRestore();
}

function startVirtualMatchFromRestore() {
  if (vmInterval) clearInterval(vmInterval);
  vmActive = true; vmPaused = false; isPlaying = true;
  maxMatchSeconds = 5400;
  vmPossessionHome = true;
  ballX = 60; ballY = 40;
  smoothedPlayers = [];
  currentMatchMinute = Math.floor(totalMatchSeconds / 60);

  document.getElementById('home-name').textContent = homeTeam;
  document.getElementById('away-name').textContent = awayTeam;
  document.getElementById('home-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${homeColor};border:2px solid rgba(255,255,255,0.3)"></span>`;
  document.getElementById('away-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${awayColor};border:2px solid rgba(255,255,255,0.3)"></span>`;
  document.getElementById('home-score').textContent = vmHomeScore;
  document.getElementById('away-score').textContent = vmAwayScore;

  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.timeline-event, .timeline-half, .timeline-segment').forEach(el => el.remove());
  const homeHalf = document.createElement('div');
  homeHalf.className = 'timeline-half home';
  homeHalf.innerHTML = `<span class="team-name-bg">${homeTeam}</span>`;
  track.appendChild(homeHalf);
  const awayHalf = document.createElement('div');
  awayHalf.className = 'timeline-half away';
  awayHalf.innerHTML = `<span class="team-name-bg">${awayTeam}</span>`;
  track.appendChild(awayHalf);
  vmRenderTimeline();
  updateTimeAxisLabels();

  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.speed-btn[data-speed="${playSpeed}"]`)?.classList.add('active');
  resizePitch();
  initTimelineSeek();

  // Set initial static formation
  const initPlayers = [];
  homeLineup.forEach(p => initPlayers.push({ x: p.baseX, y: p.baseY, teammate: true, keeper: p.keeper, actor: false, jersey: p.jersey }));
  awayLineup.forEach(p => initPlayers.push({ x: 120 - p.baseX, y: p.baseY, teammate: false, keeper: p.keeper, actor: false, jersey: p.jersey }));
  currentPlayers = initPlayers;
  smoothedPlayers = initPlayers.map(p => ({ ...p }));

  buildPlayerButtons();
  selectEntity('ball');
  editorInit();
  renderTemplateGrid();
  renderPublishedTimeline();
  renderSegmentsList();

  if (segments.length > 0 && !activeSegmentId) {
    activeSegmentId = segments[0].id;
    renderSegmentsList();
    editorDraw();
  }

  vmLastTick = performance.now();
  vmInterval = setInterval(vmTick, 33);

  drawPitch();
  drawPlayers(currentPlayers);
  drawBall(ballX, ballY);
  updatePlayButton();

  // 初始化文字轉播系統
  renderTextEvents();
  updateWidget();
  updateEvtPlayerDropdown();
  syncScoreControl();
  document.getElementById('evt-team').onchange = updateEvtPlayerDropdown;
}

function exportSessionJSON() {
  saveSession();
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  const blob = new Blob([raw], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `match-${homeTeam}-vs-${awayTeam}-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importSessionJSON(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.version !== 1 && data.version !== 2) { alert('無效的檔案格式'); return; }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      restoreSession(data);
    } catch(err) { alert('匯入失敗: ' + err.message); }
  };
  reader.readAsText(file);
}

function clearSession() {
  if (!confirm('確定要清除所有已儲存的資料嗎？')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function showRestoreDialog(data) {
  _pendingRestore = data;
  const div = document.createElement('div');
  div.id = 'restore-overlay';
  div.style.cssText = 'position:fixed;inset:0;z-index:1002;display:flex;align-items:center;justify-content:center;background:rgba(10,22,40,0.97)';
  const score = `${data.match.vmHomeScore} : ${data.match.vmAwayScore}`;
  const min = Math.floor((data.match.totalMatchSeconds||0) / 60);
  div.innerHTML = `<div style="background:linear-gradient(180deg,#0f1e36,#0a1628);border:1px solid rgba(91,163,245,0.3);border-radius:12px;padding:24px;text-align:center;max-width:400px">
    <h2 style="color:#5ba3f5;margin-bottom:16px">發現上次的比賽資料</h2>
    <p style="color:#aab;font-size:14px;margin-bottom:8px">${data.setup.homeTeam} vs ${data.setup.awayTeam}</p>
    <p style="color:#fff;font-size:24px;font-weight:800;margin-bottom:8px">${score}</p>
    <p style="color:#5ddf5d;font-size:13px;margin-bottom:20px">第 ${min} 分鐘 · ${(data.goals||[]).length} 個進球 · ${(data.segments||[]).length} 個片段</p>
    <div style="display:flex;gap:12px;justify-content:center">
      <button onclick="restoreSession(_pendingRestore)" style="background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">恢復比賽</button>
      <button onclick="document.getElementById('restore-overlay').remove();localStorage.removeItem(STORAGE_KEY);document.getElementById('match-setup-overlay').style.display='flex';setupRenderRoster('a',SETUP_DEFAULT_ROSTER_A);setupRenderRoster('b',SETUP_DEFAULT_ROSTER_B);setupQuickFill();" style="background:#1a3050;color:#aab;border:1px solid rgba(255,255,255,0.15);padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">重新開始</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}

window.addEventListener('beforeunload', saveSession);

// ===============================================================
// SPEED BUTTONS
// ===============================================================
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playSpeed = parseInt(btn.dataset.speed);
  };
});

// ===============================================================
// INIT
// ===============================================================
async function init() {
  resizePitch();
  drawPitch();
  drawBall(60, 40);
  renderTextEvents();
  updateWidget();

  document.getElementById('loading').classList.add('hidden');

  const saved = loadSession();
  if (saved) {
    showRestoreDialog(saved);
  } else {
    document.getElementById('match-setup-overlay').style.display = 'flex';
    setupRenderRoster('a', SETUP_DEFAULT_ROSTER_A);
    setupRenderRoster('b', SETUP_DEFAULT_ROSTER_B);
    setupQuickFill();
  }
}

window.addEventListener('resize', () => {
  resizePitch();
  drawPitch();
  drawPlayers(currentPlayers);
  drawBall(ballX, ballY);
  editorInit();
});

init();
</script>
