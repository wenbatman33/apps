<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scoreboard {
            display: flex;
            gap: 40px;
        }

        .score-box {
            text-align: center;
        }

        .score-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #666;
        }

        .score-box .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ade80;
            line-height: 1.1;
        }

        #gameCanvas {
            border: 2px solid #2a2a3e;
            border-radius: 8px;
            display: block;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.15);
        }

        .controls {
            font-size: 0.8rem;
            color: #555;
            text-align: center;
            line-height: 1.8;
        }

        .controls span {
            color: #888;
        }

        /* Overlay */
        #overlay {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            pointer-events: none;
        }

        #overlay.hidden {
            display: none;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(15, 15, 26, 0.88);
            border-radius: 8px;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f87171;
        }

        #overlay h2.start {
            color: #4ade80;
        }

        #overlay p {
            font-size: 0.95rem;
            color: #aaa;
        }

        #overlay .final-score {
            font-size: 1.1rem;
            color: #e0e0e0;
        }

        #overlay .final-score span {
            color: #4ade80;
            font-weight: 700;
        }

        #startBtn {
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            color: #0f0f1a;
            border: none;
            padding: 12px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            pointer-events: all;
        }

        #startBtn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        #startBtn:active {
            transform: scale(0.97);
        }

        /* Mobile controls */
        .mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .mobile-row {
            display: flex;
            gap: 6px;
        }

        .dpad-btn {
            width: 52px;
            height: 52px;
            background: #1e1e2e;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }

        .dpad-btn:active {
            background: #2a3a2a;
            color: #4ade80;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: flex;
            }
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 貪食蛇</h1>

        <div class="scoreboard">
            <div class="score-box">
                <div class="label">分數</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="highScore">0</div>
            </div>
            <div class="score-box">
                <div class="label">等級</div>
                <div class="value" id="level">1</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="420" height="420"></canvas>
            <div id="overlay">
                <h2 class="start" id="overlayTitle">貪食蛇</h2>
                <p id="overlayMsg">用方向鍵或 WASD 控制</p>
                <div class="final-score hidden" id="finalScore">得分：<span id="finalScoreVal">0</span></div>
                <button id="startBtn">開始遊戲</button>
            </div>
        </div>

        <div class="controls">
            <span>↑ ↓ ← →</span> 或 <span>W A S D</span> 移動 &nbsp;|&nbsp; <span>P</span> 暫停
        </div>

        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="dpad-btn" id="btnUp">▲</button>
            </div>
            <div class="mobile-row">
                <button class="dpad-btn" id="btnLeft">◀</button>
                <button class="dpad-btn" id="btnDown">▼</button>
                <button class="dpad-btn" id="btnRight">▶</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLS = 21;
        const ROWS = 21;
        const CELL = canvas.width / COLS; // 20px

        const DIR = { UP: { x: 0, y: -1 }, DOWN: { x: 0, y: 1 }, LEFT: { x: -1, y: 0 }, RIGHT: { x: 1, y: 0 } };

        let snake, dir, nextDir, food, bonus, score, highScore, level, speed, gameLoop, state;
        // states: 'idle' | 'playing' | 'paused' | 'dead'

        const scoreEl    = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const levelEl    = document.getElementById('level');
        const overlay    = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMsg   = document.getElementById('overlayMsg');
        const finalScore   = document.getElementById('finalScore');
        const finalScoreVal = document.getElementById('finalScoreVal');
        const startBtn   = document.getElementById('startBtn');

        highScore = parseInt(localStorage.getItem('snakeHS') || '0');
        highScoreEl.textContent = highScore;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9,  y: 10 },
                { x: 8,  y: 10 },
            ];
            dir = DIR.RIGHT;
            nextDir = DIR.RIGHT;
            score = 0;
            level = 1;
            speed = 150;
            bonus = null;
            scoreEl.textContent = 0;
            levelEl.textContent = 1;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function spawnBonus() {
            if (bonus) return;
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food.x === pos.x && food.y === pos.y));
            bonus = { ...pos, timer: 80 }; // disappears after 80 ticks
        }

        function step() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame(); return;
            }
            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame(); return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHS', highScore);
                }
                spawnFood();
                // Level up every 50 points
                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    levelEl.textContent = level;
                    speed = Math.max(60, 150 - (level - 1) * 12);
                    restartLoop();
                }
                // Bonus chance
                if (Math.random() < 0.3) spawnBonus();
            } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
                score += 30 * level;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHS', highScore);
                }
                bonus = null;
            } else {
                snake.pop();
            }

            if (bonus) {
                bonus.timer--;
                if (bonus.timer <= 0) bonus = null;
            }

            draw();
        }

        function restartLoop() {
            clearInterval(gameLoop);
            gameLoop = setInterval(step, speed);
        }

        function draw() {
            // Background grid
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL, 0);
                ctx.lineTo(i * CELL, canvas.height);
                ctx.stroke();
            }
            for (let j = 0; j <= ROWS; j++) {
                ctx.beginPath();
                ctx.moveTo(0, j * CELL);
                ctx.lineTo(canvas.width, j * CELL);
                ctx.stroke();
            }

            // Food
            const fx = food.x * CELL + CELL / 2;
            const fy = food.y * CELL + CELL / 2;
            const fr = CELL * 0.38;
            const foodGrad = ctx.createRadialGradient(fx - fr * 0.3, fy - fr * 0.3, 1, fx, fy, fr);
            foodGrad.addColorStop(0, '#fde68a');
            foodGrad.addColorStop(1, '#f97316');
            ctx.beginPath();
            ctx.arc(fx, fy, fr, 0, Math.PI * 2);
            ctx.fillStyle = foodGrad;
            ctx.fill();

            // Bonus
            if (bonus) {
                const bx = bonus.x * CELL + CELL / 2;
                const by = bonus.y * CELL + CELL / 2;
                const alpha = bonus.timer > 20 ? 1 : bonus.timer / 20;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                // Star shape (5-pointed)
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                    const r = CELL * 0.42;
                    const ir = CELL * 0.18;
                    const outerX = bx + Math.cos(angle) * r;
                    const outerY = by + Math.sin(angle) * r;
                    const innerAngle = angle + Math.PI / 5;
                    const innerX = bx + Math.cos(innerAngle) * ir;
                    const innerY = by + Math.sin(innerAngle) * ir;
                    if (i === 0) ctx.moveTo(outerX, outerY);
                    else ctx.lineTo(outerX, outerY);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fillStyle = '#facc15';
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Snake body
            snake.forEach((seg, i) => {
                const x = seg.x * CELL;
                const y = seg.y * CELL;
                const pad = 1.5;
                const r = 4;

                if (i === 0) {
                    // Head
                    const grad = ctx.createLinearGradient(x, y, x + CELL, y + CELL);
                    grad.addColorStop(0, '#6ee7b7');
                    grad.addColorStop(1, '#4ade80');
                    ctx.fillStyle = grad;
                } else {
                    const t = i / snake.length;
                    const g = Math.round(180 - t * 80);
                    ctx.fillStyle = `rgb(30, ${g}, 80)`;
                }

                roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
                ctx.fill();

                // Eyes on head
                if (i === 0) {
                    ctx.fillStyle = '#0f0f1a';
                    const eyeSize = 2.5;
                    let e1, e2;
                    if (dir === DIR.RIGHT)  { e1 = [x+CELL*0.72, y+CELL*0.3]; e2 = [x+CELL*0.72, y+CELL*0.7]; }
                    else if (dir === DIR.LEFT)   { e1 = [x+CELL*0.28, y+CELL*0.3]; e2 = [x+CELL*0.28, y+CELL*0.7]; }
                    else if (dir === DIR.UP)     { e1 = [x+CELL*0.3,  y+CELL*0.28]; e2 = [x+CELL*0.7, y+CELL*0.28]; }
                    else                         { e1 = [x+CELL*0.3,  y+CELL*0.72]; e2 = [x+CELL*0.7, y+CELL*0.72]; }
                    ctx.beginPath(); ctx.arc(e1[0], e1[1], eyeSize, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e2[0], e2[1], eyeSize, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function startGame() {
            init();
            state = 'playing';
            overlay.classList.add('hidden');
            finalScore.classList.add('hidden');
            restartLoop();
        }

        function endGame() {
            clearInterval(gameLoop);
            state = 'dead';
            draw();

            overlayTitle.textContent = '遊戲結束';
            overlayTitle.className = '';
            overlayMsg.textContent = '再接再厲！';
            finalScoreVal.textContent = score;
            finalScore.classList.remove('hidden');
            startBtn.textContent = '再玩一次';
            overlay.classList.remove('hidden');
        }

        function togglePause() {
            if (state === 'playing') {
                clearInterval(gameLoop);
                state = 'paused';
                overlayTitle.textContent = '暫停';
                overlayTitle.className = 'start';
                overlayMsg.textContent = '按 P 繼續';
                finalScore.classList.add('hidden');
                startBtn.textContent = '繼續';
                overlay.classList.remove('hidden');
            } else if (state === 'paused') {
                state = 'playing';
                overlay.classList.add('hidden');
                restartLoop();
            }
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp':    case 'w': case 'W':
                    if (dir !== DIR.DOWN)  nextDir = DIR.UP; break;
                case 'ArrowDown':  case 's': case 'S':
                    if (dir !== DIR.UP)    nextDir = DIR.DOWN; break;
                case 'ArrowLeft':  case 'a': case 'A':
                    if (dir !== DIR.RIGHT) nextDir = DIR.LEFT; break;
                case 'ArrowRight': case 'd': case 'D':
                    if (dir !== DIR.LEFT)  nextDir = DIR.RIGHT; break;
                case 'p': case 'P':
                    if (state === 'playing' || state === 'paused') togglePause(); break;
            }
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });

        // Mobile d-pad
        document.getElementById('btnUp').addEventListener('click',    () => { if (dir !== DIR.DOWN)  nextDir = DIR.UP;    if (state === 'idle') startGame(); });
        document.getElementById('btnDown').addEventListener('click',  () => { if (dir !== DIR.UP)    nextDir = DIR.DOWN;  if (state === 'idle') startGame(); });
        document.getElementById('btnLeft').addEventListener('click',  () => { if (dir !== DIR.RIGHT) nextDir = DIR.LEFT;  if (state === 'idle') startGame(); });
        document.getElementById('btnRight').addEventListener('click', () => { if (dir !== DIR.LEFT)  nextDir = DIR.RIGHT; if (state === 'idle') startGame(); });

        startBtn.addEventListener('click', startGame);

        // Initial draw
        state = 'idle';
        init();
        draw();
        overlay.classList.remove('hidden');
        overlayTitle.textContent = '貪食蛇';
        overlayTitle.className = 'start';
        overlayMsg.textContent = '用方向鍵或 WASD 控制';
        startBtn.textContent = '開始遊戲';
    </script>
</body>
</html>
