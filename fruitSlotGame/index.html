<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小瑪莉</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="machine">

  <!-- 機台頂部螺絲裝飾 -->
  <div class="machine-screws top-screws">
    <span class="screw"></span><span class="screw"></span>
  </div>

  <!-- ① 上方 LED 顯示 -->
  <div id="top-panel">
    <div class="display-unit">
      <div class="display-label">WIN</div>
      <div class="led-display" id="winLed"><span>0</span><span>0</span><span>0</span><span>0</span></div>
    </div>
    <div class="display-unit">
      <div class="display-label">CREDIT</div>
      <div class="led-display" id="creditLed"><span>0</span><span>0</span><span>0</span><span>0</span></div>
    </div>
  </div>

  <!-- ② 主遊戲區（符號邊框 + 中央動畫） -->
  <div id="main-panel">
    <!-- 邊框指示燈 -->
    <div class="panel-lights top-lights">
      <span class="plight" data-i="0"></span><span class="plight" data-i="1"></span>
      <span class="plight" data-i="2"></span><span class="plight" data-i="3"></span>
      <span class="plight" data-i="4"></span><span class="plight" data-i="5"></span>
    </div>
    <div class="panel-lights bot-lights">
      <span class="plight" data-i="6"></span><span class="plight" data-i="7"></span>
      <span class="plight" data-i="8"></span><span class="plight" data-i="9"></span>
      <span class="plight" data-i="10"></span><span class="plight" data-i="11"></span>
    </div>

    <!-- 符號邊框 -->
    <div id="symbol-frame">
      <!-- 上排 -->
      <div class="frame-row" id="frame-top"></div>

      <!-- 中段 -->
      <div id="frame-middle">
        <div class="frame-col" id="frame-left"></div>

        <!-- 中央顯示區 -->
        <div id="center-area">
          <div id="center-burst"></div>
          <div class="center-deco">⭐</div>
          <div id="center-main">
            <div id="center-title">小瑪莉</div>
            <div id="center-reel-wrap">
              <div id="center-reel-card">
                <div id="center-sym-display">🎰</div>
              </div>
            </div>
            <div id="jp-row">
              <span id="jp-title">J·P</span>
              <span id="jp-count">0</span>
            </div>
            <div id="game-msg"></div>
          </div>
          <div class="center-deco">⭐</div>
        </div>

        <div class="frame-col" id="frame-right"></div>
      </div>

      <!-- 下排 -->
      <div class="frame-row" id="frame-bottom"></div>
    </div>
  </div>

  <!-- ③ 賠率表 -->
  <div id="paytable-panel">
    <div id="paytable-cols"></div>
    <div id="paytable-leds"></div>
  </div>

  <!-- ④ 控制面板 -->
  <div id="control-panel">
    <button class="cpanel-btn leave-btn" id="addCreditBtn">儲值</button>
    <button class="cpanel-btn orange-btn" id="winCreditBtn" style="font-size:9px">WIN→<br>CREDIT</button>
    <button class="cpanel-btn orange-btn bet-btn" id="smallBetBtn">
      <span class="bet-size">左</span>
      <span class="bet-range">1-4</span>
    </button>
    <div id="double-area">
      <span>DOUBLE</span>
      <span>IN BET</span>
    </div>
    <button class="cpanel-btn orange-btn bet-btn" id="bigBetBtn">
      <span class="bet-size">右</span>
      <span class="bet-range">6-9</span>
    </button>
    <button class="cpanel-btn auto-btn" id="autoBtn">AUTO</button>
    <button class="cpanel-btn start-btn" id="startBtn">開始</button>
  </div>

  <!-- ⑤ 底部 7 個大按鈕 + 符號 -->
  <div id="action-panel">
    <div id="action-symbols"></div>
    <div id="action-btns"></div>
  </div>

  <!-- 底部螺絲 -->
  <div class="machine-screws bot-screws">
    <span class="screw"></span><span class="screw"></span>
  </div>

  <!-- 出幣口 -->
  <div id="coin-tray">
    <div class="tray-inner"></div>
  </div>

</div>

<!-- 中獎疊層 -->
<div id="win-overlay" class="hidden">
  <div id="win-box">
    <div id="win-icon">🎊</div>
    <div id="win-label">WIN!</div>
    <div id="win-amount-display"></div>
  </div>
</div>

<!-- JACKPOT 疊層 -->
<div id="jp-overlay" class="hidden">
  <div id="jp-box">
    <div id="jp-overlay-title">🎰 JACKPOT!! 🎰</div>
    <div id="jp-overlay-amount"></div>
    <div id="jp-stars">★ ★ ★ ★ ★</div>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/game.js"></script>
</body>
</html>
