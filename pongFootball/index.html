<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pong Football</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="menu" class="menu">
    <div class="logo-wrap">
      <img src="assets/png/logo.png" alt="logo">
    </div>
    <h1>Pong Football</h1>
    <div class="btn-row">
      <button id="play-ai" class="big-btn">單人（vs AI）</button>
      <button id="play-net" class="big-btn">網路對戰</button>
    </div>
    <div class="settings-row">
      <label><input type="checkbox" id="sound-toggle" checked> 音效</label>
    </div>
    <div class="hint">
      鍵盤：W/S（左方）、↑/↓（右方）　｜ 滑鼠 / 觸控：拖曳擋板
    </div>

    <div id="difficulty-pane" class="pane" style="display:none">
      <div class="pane-box">
        <h2>選擇難度</h2>
        <button data-diff="easy" class="big-btn">簡單</button>
        <button data-diff="normal" class="big-btn">普通</button>
        <button data-diff="hard" class="big-btn">困難</button>
        <button class="pane-close small-btn">取消</button>
      </div>
    </div>

    <div id="net-pane" class="pane" style="display:none">
      <div class="pane-box">
        <h2>網路對戰</h2>
        <p class="small">輸入暱稱，系統自動配對</p>
        <input id="name-input" type="text" placeholder="暱稱" maxlength="12">
        <button id="btn-match" class="big-btn">開始配對</button>
        <button class="pane-close small-btn">取消</button>
      </div>
    </div>

    <div id="matching-pane" class="pane" style="display:none">
      <div class="pane-box">
        <h2>配對中…</h2>
        <div class="spinner"></div>
        <p class="small" id="matching-info">尋找對手中</p>
        <button id="btn-cancel-match" class="small-btn">取消配對</button>
      </div>
    </div>

    <div id="ready-pane" class="pane" style="display:none">
      <div class="pane-box">
        <h2>配對成功</h2>
        <div class="vs-row">
          <div class="player-chip" id="me-chip">
            <div class="name" id="me-name">我</div>
            <div class="status" id="me-status">未準備</div>
          </div>
          <div class="vs">VS</div>
          <div class="player-chip" id="opp-chip">
            <div class="name" id="opp-name">對手</div>
            <div class="status" id="opp-status">未準備</div>
          </div>
        </div>
        <button id="btn-ready" class="big-btn">我準備好了</button>
        <button id="btn-leave-ready" class="small-btn">離開</button>
      </div>
    </div>
  </div>

  <div id="overlay"></div>

  <button id="back-btn" title="回主選單">⏎</button>
  <button id="surrender-btn" title="投降">🏳️</button>
  <div id="net-hud"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
