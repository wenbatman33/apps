function drawMomentum() {
  const canvas = document.getElementById('momentumCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 100;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '50px';
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const midY = h / 2;
  const bucketW = w / (momentumData.length || 1);

  // Home (top, blue)
  ctx.beginPath();
  ctx.moveTo(0, midY);
  momentumData.forEach((d, i) => {
    const x = i * bucketW + bucketW / 2;
    const y = midY - d.home * midY * 0.9;
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, midY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(91,163,245,0.3)';
  ctx.fill();

  // Away (bottom, orange)
  ctx.beginPath();
  ctx.moveTo(0, midY);
  momentumData.forEach((d, i) => {
    const x = i * bucketW + bucketW / 2;
    const y = midY + d.away * midY * 0.9;
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, midY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,166,35,0.3)';
  ctx.fill();

  // Center line
  ctx.beginPath();
  ctx.moveTo(0, midY);
  ctx.lineTo(w, midY);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════════
// ANIMATION ENGINE
// ═══════════════════════════════════════════════════════════
let lastFrameTime = 0;
let prevEvent = null;

function getEventAtTime(matchSec) {
  // Binary search for the event just before matchSec
  let lo = 0, hi = animEvents.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (animEvents[mid].matchSeconds <= matchSec) lo = mid;
    else hi = mid - 1;
  }
  return lo;
}

function updateAnimation(timestamp) {
  if (!isPlaying) return;
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = (timestamp - lastFrameTime) / 1000 * playSpeed;
  lastFrameTime = timestamp;

  totalMatchSeconds += dt;

  if (totalMatchSeconds >= maxMatchSeconds) {
    totalMatchSeconds = maxMatchSeconds;
    pausePlayback();
  }

  currentEventIdx = getEventAtTime(totalMatchSeconds);
  const ev = animEvents[currentEventIdx];
  const nextEv = animEvents[currentEventIdx + 1];

  if (ev) {
    // Detect possession change between current and next event
    const possessionChanged = nextEv && ev.possession_team !== nextEv.possession_team;
    // Detect large distance jump (e.g. goal kick, free kick restart)
    const evEnd = ev.endX !== null ? { x: ev.endX, y: ev.endY } : { x: ev.x, y: ev.y };
    const bigJump = nextEv && Math.hypot(nextEv.x - evEnd.x, nextEv.y - evEnd.y) > 30;

    // Determine ball position
    if (nextEv && nextEv.matchSeconds > ev.matchSeconds) {
      const elapsed = totalMatchSeconds - ev.matchSeconds;
      const duration = nextEv.matchSeconds - ev.matchSeconds;
      const t = Math.min(elapsed / duration, 1);

      if (possessionChanged || bigJump) {
        // Possession change or big jump: move ball along event path, then snap to next position
        if (ev.endX !== null) {
          // Complete the pass/carry first, then snap
          if (t < 0.6) {
            const t2 = t / 0.6;
            ballX = ev.x + (ev.endX - ev.x) * easeInOut(t2);
            ballY = ev.y + (ev.endY - ev.y) * easeInOut(t2);
          } else {
            // Snap quickly to next event position
            const t2 = (t - 0.6) / 0.4;
            const snapT = Math.min(t2 * 3, 1); // fast snap
            ballX = ev.endX + (nextEv.x - ev.endX) * easeInOut(snapT);
            ballY = ev.endY + (nextEv.y - ev.endY) * easeInOut(snapT);
          }
        } else {
          // No end location - just snap quickly
          const snapT = Math.min(t * 3, 1);
          ballX = ev.x + (nextEv.x - ev.x) * easeInOut(snapT);
          ballY = ev.y + (nextEv.y - ev.y) * easeInOut(snapT);
        }
      } else {
        // Same possession: smooth interpolation
        if (ev.endX !== null) {
          if (t < 0.5) {
            const t2 = t * 2;
            ballX = ev.x + (ev.endX - ev.x) * easeInOut(t2);
            ballY = ev.y + (ev.endY - ev.y) * easeInOut(t2);
          } else {
            const t2 = (t - 0.5) * 2;
            ballX = ev.endX + (nextEv.x - ev.endX) * easeInOut(t2);
            ballY = ev.endY + (nextEv.y - ev.endY) * easeInOut(t2);
          }
        } else {
          ballX = ev.x + (nextEv.x - ev.x) * easeInOut(t);
          ballY = ev.y + (nextEv.y - ev.y) * easeInOut(t);
        }
      }
    } else {
      ballX = ev.endX || ev.x;
      ballY = ev.endY || ev.y;
    }

    // Update possession label
    document.getElementById('poss-team-name').textContent = ev.possession_team;

    // Current minute display
    currentMatchMinute = ev.minute;
    currentPeriod = ev.period;

    // Update 360 player positions (interpolated)
    updatePlayerPositions(ev);

    // Draw
    drawPitch();
    // Only draw pass trail for same-possession events with end location
    if (ev.endX !== null && !possessionChanged) {
      drawPassTrail(ev.x, ev.y, ev.endX, ev.endY, 1);
    }
    drawPlayers(currentPlayers);
    drawBall(ballX, ballY);
  }

  // Update UI
  updateTimeDisplay();
  renderScoreBar();

  // Update seek slider
  document.getElementById('seek-slider').value = (totalMatchSeconds / maxMatchSeconds) * 1000;

  // Timeline progress
  document.getElementById('timeline-progress').style.width = ((totalMatchSeconds / maxMatchSeconds) * 100) + '%';

  requestAnimationFrame(updateAnimation);
}

// Fallback: use setInterval when rAF is throttled (background tab)
let _animInterval = null;
function ensureAnimLoop() {
  if (_animInterval) clearInterval(_animInterval);
  _animInterval = setInterval(() => {
    if (isPlaying && dataSource !== 'skillcorner') updateAnimation(performance.now());
  }, 30);
}
ensureAnimLoop();

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function buildLineups(lineups) {
  homeLineup = [];
  awayLineup = [];

  lineups.forEach(team => {
    const isHome = team.team_id === homeId;
    const roster = [];

    team.lineup.forEach(p => {
      // Get the first (starting) position
      const pos = p.positions.length > 0 ? p.positions[0].position : 'Center Midfield';
      const coords = POSITION_COORDS[pos] || [50, 40];
      roster.push({
        playerId: p.player_id,
        jersey: p.jersey_number,
        name: p.player_name,
        position: pos,
        baseX: coords[0],
        baseY: coords[1],
        keeper: pos === 'Goalkeeper'
      });
    });

    if (isHome) homeLineup = roster.slice(0, 11);
    else awayLineup = roster.slice(0, 11);
  });
}

function buildPlayerFrames() {
  // Not used anymore - formation system replaces this
  playerFrames = [];
}

// Get formation positions shifted by ball position
function getFormationPositions(bx, by, carrierId, carrierIsHome) {
  const players = [];
  const t = totalMatchSeconds;

  // Which team is attacking (has the ball)?
  const attackIsHome = carrierIsHome;

  // Detect corner kick situation
  const isCornerKick = ((bx > 112 || bx < 8) && (by < 8 || by > 72)) || (currentScene && currentScene.ke && currentScene.ke.type === 'corner');

  // Pre-computed corner positions per player (seeded by jersey to be stable)
  function cornerSlot(jersey, baseX, baseY, spread) {
    const seed1 = Math.sin(jersey * 73.37) * 0.5 + 0.5; // 0-1 stable per jersey
    const seed2 = Math.cos(jersey * 47.13) * 0.5 + 0.5;
    return { x: baseX + (seed1 - 0.5) * spread, y: baseY + (seed2 - 0.5) * spread * 1.2 };
  }

  function processTeam(lineup, isHome) {
    const isAttacking = isHome === attackIsHome;
    // Team's own goal X position
    const ownGoalX = isHome ? 0 : 120;
    // Direction toward opponent goal
    const atkDir = isHome ? 1 : -1;

    lineup.forEach(p => {
      const isBallCarrier = (p.playerId === carrierId && isHome === carrierIsHome);

      if (isBallCarrier) {
        players.push({
          x: bx, y: by, teammate: isHome, keeper: p.keeper,
          actor: true, jersey: p.jersey
        });
        return;
      }

      let x = isHome ? p.baseX : 120 - p.baseX;
      let y = p.baseY;

      if (p.keeper) {
        // Keeper: shift toward ball side, stay near goal
        y += (by - 40) * 0.2;
        // Come out slightly when ball is close
        const ballDistToGoal = Math.abs(bx - ownGoalX);
        if (ballDistToGoal < 30) {
          x += atkDir * (30 - ballDistToGoal) * 0.15;
        }
      } else if (isAttacking) {
        // ── ATTACKING TEAM ──

        if (isCornerKick) {
          // Corner kick: most players rush into OPPONENT's penalty area
          // Home attacks right → opponent penalty at x=108; Away attacks left → opponent penalty at x=12
          const oppPenaltyX = isHome ? 108 : 12;
          const isBackStay = ['RB', 'LB'].includes(p.position);

          if (isBackStay) {
            // 2 fullbacks stay at halfway line for counter defense
            const slot = cornerSlot(p.jersey, 55, p.baseY, 10);
            x = slot.x; y = slot.y;
          } else {
            // Everyone else rushes into opponent's penalty box
            const slot = cornerSlot(p.jersey, oppPenaltyX, 40, 28);
            x = slot.x; y = slot.y;
          }
        } else {
          // Normal attack: push forward toward ball zone
          const ballInfluenceX = (bx - 60) / 120;
          const ballInfluenceY = (by - 40) / 80;
          x += ballInfluenceX * 18;
          y += ballInfluenceY * 10;

          // Nearby players support the attack (run into space)
          const distToBall = Math.hypot(x - bx, y - by);
          if (distToBall < 30 && distToBall > 8) {
            x += atkDir * 5;
            const spreadY = (y < by) ? -4 : 4;
            y += spreadY;
          }
        }

      } else {
        // ── DEFENDING TEAM ──

        if (isCornerKick) {
          // Corner: all defenders pack into own penalty area to mark attackers
          const ownPenX = isHome ? 15 : 105;
          const isForwardStay = ['RW', 'LW', 'ST'].includes(p.position);

          if (isForwardStay) {
            // 1-2 forwards stay upfield for counter-attack
            const slot = cornerSlot(p.jersey, 55 + atkDir * 10, p.baseY, 8);
            x = slot.x; y = slot.y;
          } else {
            // Everyone else defends the box — mark attackers
            const slot = cornerSlot(p.jersey, ownPenX, 40, 24);
            x = slot.x; y = slot.y;
          }
        } else {
          // Normal defense

          // 1. Retreat: shift back toward own goal based on ball position
          const ballDepth = isHome ? (120 - bx) / 120 : bx / 120;
          const retreatAmount = (1 - ballDepth) * 25;
          x -= atkDir * retreatAmount;

          // 2. Compress toward ball Y-axis (narrow the space)
          y += (by - y) * 0.25;

          // 3. Nearest 2 defenders pressure the ball carrier
          const distToBall = Math.hypot(x - bx, y - by);
          if (distToBall < 30) {
            const pressureStrength = (30 - distToBall) / 30 * 0.35;
            x += (bx - x) * pressureStrength;
            y += (by - y) * pressureStrength;
          }

          // 4. Defensive line: don't go past ball (stay goalside)
          if (isHome && x > bx + 5) x = bx + 3;
          if (!isHome && x < bx - 5) x = bx - 3;
        }
      }

      // Natural movement jitter (smaller for defenders)
      const jitterScale = isAttacking ? 2 : 1.2;
      x += Math.sin(t * 0.4 + p.jersey * 7.3) * jitterScale;
      y += Math.cos(t * 0.3 + p.jersey * 11.7) * jitterScale;

      x = Math.max(2, Math.min(118, x));
      y = Math.max(2, Math.min(78, y));

      players.push({
        x, y, teammate: isHome, keeper: p.keeper,
        actor: false, jersey: p.jersey
      });
    });
  }

  processTeam(homeLineup, true);
  processTeam(awayLineup, false);
  return players;
}

function updatePlayerPositions(ev) {
  const carrierId = ev.playerId || 0;
  const carrierIsHome = ev.teamId === homeId;
  const targets = getFormationPositions(ballX, ballY, carrierId, carrierIsHome);

  // Override positions for foul scene players
  if (currentScene) {
    const kf = currentScene.keyframes;
    const elapsed = (performance.now() - sceneStart) / 1000;
    // Find current keyframe
    let curKf = kf[0];
    for (let i = 0; i < kf.length - 1; i++) {
      if (elapsed >= kf[i].t && elapsed < kf[i + 1].t) { curKf = kf[i]; break; }
      if (i === kf.length - 2) curKf = kf[kf.length - 1];
    }
    // Interpolate foul players between keyframes
    if (curKf.foulPlayers) {
      const fp = curKf.foulPlayers;
      targets.forEach(p => {
        if (p.jersey === fp.victim.jersey && p.teammate === fp.victimIsHome) {
          p.x = fp.vx; p.y = fp.vy; p.actor = true;
        }
        if (p.jersey === fp.fouler.jersey && p.teammate === fp.foulerIsHome) {
          p.x = fp.fx; p.y = fp.fy; p.actor = true;
        }
      });
    }
  }

  // Initialize smoothed positions if empty or count changed
  if (smoothedPlayers.length !== targets.length) {
    smoothedPlayers = targets.map(p => ({ ...p }));
    currentPlayers = smoothedPlayers;
    return;
  }

  // Lerp each player toward target
  // Detect set piece (corner/free kick) — move faster to get into position
  const isSetPiece = (ballX > 112 || ballX < 8) || currentScene?.ke?.type === 'corner';
  const lerpSpeed = isSetPiece ? 0.15 : 0.06;
  const carrierLerp = 0.18;

  for (let i = 0; i < targets.length; i++) {
    const t = targets[i];
    const s = smoothedPlayers[i];
    const speed = t.actor ? carrierLerp : lerpSpeed;
    s.x += (t.x - s.x) * speed;
    s.y += (t.y - s.y) * speed;
    s.teammate = t.teammate;
    s.keeper = t.keeper;
    s.actor = t.actor;
    s.jersey = t.jersey;
  }

  currentPlayers = smoothedPlayers;
}

function updateTimeDisplay() {
  let minDisplay;
  if (currentPeriod === 1) {
    minDisplay = Math.min(45, Math.floor(totalMatchSeconds / 60));
  } else if (currentPeriod === 2) {
    minDisplay = Math.min(90, 45 + Math.floor((totalMatchSeconds - 2700) / 60));
  } else {
    minDisplay = Math.floor(totalMatchSeconds / 60);
  }
  const timeStr = minDisplay + "'";
  const matchTimeEl = document.getElementById('match-time');
  if (matchTimeEl) matchTimeEl.textContent = timeStr;
  const ctd = document.getElementById('current-time-display');
  if (ctd) ctd.textContent = timeStr;
}

// ═══════════════════════════════════════════════════════════
// PLAYBACK CONTROLS
// ═══════════════════════════════════════════════════════════
function startPlayback() {
  isPlaying = true;
  lastFrameTime = 0;
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  requestAnimationFrame(updateAnimation);
}

function pausePlayback() {
  isPlaying = false;
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'none';
}

document.getElementById('btn-play').onclick = () => {
  if (dataSource === 'skillcorner') {
    startSCPlayback();
  } else if (dataSource === 'espn' && keyEvents.length > 0) {
    autoPlayKeyEvents();
  } else {
    startPlayback();
  }
};
document.getElementById('btn-pause').onclick = () => {
  if (dataSource === 'skillcorner') {
    pauseSCPlayback();
  } else if (dataSource === 'espn') {
    stopAutoPlay();
  }
  pausePlayback();
};

document.getElementById('seek-slider').addEventListener('input', e => {
  const pct = e.target.value / 1000;
  if (dataSource === 'skillcorner' && scFrames.length > 0) {
    scPlayTime = pct * (scFrames.length - 1);
    scFrameIdx = Math.floor(scPlayTime);
    const idxA = scFrameIdx;
    const idxB = Math.min(idxA + 1, scFrames.length - 1);
    renderSkillCornerFrameInterp(idxA, idxB, scPlayTime - idxA);
    return;
  }
  totalMatchSeconds = pct * maxMatchSeconds;
  currentEventIdx = getEventAtTime(totalMatchSeconds);
  if (!isPlaying) {
    // Render single frame
    const ev = animEvents[currentEventIdx];
    if (ev) {
      ballX = ev.x; ballY = ev.y;
      updatePlayerPositions(ev);
      drawPitch();
      drawPlayers(currentPlayers);
      drawBall(ballX, ballY);
      document.getElementById('poss-team-name').textContent = ev.possession_team;
      currentMatchMinute = ev.minute;
      currentPeriod = ev.period;
    }
    updateTimeDisplay();
    renderScoreBar();
    document.getElementById('timeline-progress').style.width = (pct * 100) + '%';
  }
});

// Timeline track drag-to-seek
(function() {
  const track = document.getElementById('timeline-track');
  let dragging = false;

  function seekFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));

    // Sync the slider
    document.getElementById('seek-slider').value = pct * 1000;

    if (dataSource === 'skillcorner' && scFrames.length > 0) {
      scPlayTime = pct * (scFrames.length - 1);
      scFrameIdx = Math.floor(scPlayTime);
      const idxA = scFrameIdx;
      const idxB = Math.min(idxA + 1, scFrames.length - 1);
      renderSkillCornerFrameInterp(idxA, idxB, scPlayTime - idxA);
    } else {
      totalMatchSeconds = pct * maxMatchSeconds;
      document.getElementById('seek-slider').dispatchEvent(new Event('input'));
    }
  }

  track.addEventListener('mousedown', e => { dragging = true; seekFromEvent(e); });
  track.addEventListener('touchstart', e => { dragging = true; seekFromEvent(e); }, { passive: true });
  window.addEventListener('mousemove', e => { if (dragging) seekFromEvent(e); });
  window.addEventListener('touchmove', e => { if (dragging) seekFromEvent(e); }, { passive: true });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('touchend', () => { dragging = false; });
})();

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playSpeed = parseInt(btn.dataset.speed);
  };
});

// ═══════════════════════════════════════════════════════════
// MATCH SELECTOR
// ═══════════════════════════════════════════════════════════
const compSelect = document.getElementById('comp-select');
const seasonSelect = document.getElementById('season-select');
const matchSelect = document.getElementById('match-select');
const sbMatchSelect = document.getElementById('sb-match-select');
const datePicker = document.getElementById('date-picker');
const sourceSelect = document.getElementById('source-select');

let espnMatches = [];

// Source toggle
sourceSelect.onchange = () => {
  dataSource = sourceSelect.value;
  document.getElementById('sc-controls').style.display = dataSource === 'skillcorner' ? '' : 'none';
  document.getElementById('espn-controls').style.display = dataSource === 'espn' ? '' : 'none';
  document.getElementById('sb-controls').style.display = dataSource === 'statsbomb' ? '' : 'none';
};

// SkillCorner match select
document.getElementById('sc-match-select').onchange = () => {
  const matchId = document.getElementById('sc-match-select').value;
  if (matchId) loadSkillCornerMatch(matchId);
};

// ESPN: date picker
datePicker.onchange = async () => {
  matchSelect.innerHTML = '<option>Loading...</option>';
  espnMatches = await loadESPNMatchesByDate(datePicker.value);
  matchSelect.innerHTML = '<option value="">-- Select Match --</option>';
  espnMatches.forEach(m => {
    matchSelect.innerHTML += `<option value="${m.id}">${m.homeTeam} vs ${m.awayTeam} (${m.homeScore}-${m.awayScore}) ${m.status}</option>`;
  });
};

// ESPN: match select
matchSelect.onchange = async () => {
  const eventId = matchSelect.value;
  if (!eventId) return;
  const matchInfo = espnMatches.find(m => m.id === eventId);
  if (matchInfo) await loadESPNMatch(eventId, matchInfo);
};

// StatsBomb selectors
async function loadCompetitions() {
  competitions = await fetchJSON(`${BASE}/competitions.json`);
  const comps = {};
  competitions.forEach(c => {
    const key = c.competition_id;
    if (!comps[key]) comps[key] = { name: c.competition_name, id: key, seasons: [] };
    comps[key].seasons.push({ id: c.season_id, name: c.season_name });
  });
  compSelect.innerHTML = '<option value="">-- Competition --</option>';
  Object.values(comps).sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
    compSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

compSelect.onchange = () => {
  const compId = compSelect.value;
  const seasons = competitions.filter(c => c.competition_id == compId);
  seasonSelect.innerHTML = '<option value="">-- Season --</option>';
  seasons.sort((a, b) => b.season_name.localeCompare(a.season_name)).forEach(s => {
    seasonSelect.innerHTML += `<option value="${s.season_id}">${s.season_name}</option>`;
  });
  sbMatchSelect.innerHTML = '<option value="">--</option>';
};

seasonSelect.onchange = async () => {
  const compId = compSelect.value, seasonId = seasonSelect.value;
  if (!compId || !seasonId) return;
  sbMatchSelect.innerHTML = '<option>Loading...</option>';
  const matches = await fetchJSON(`${BASE}/matches/${compId}/${seasonId}.json`);
  sbMatchSelect.innerHTML = '<option value="">-- Match --</option>';
  matches.sort((a, b) => a.match_date.localeCompare(b.match_date)).forEach(m => {
    sbMatchSelect.innerHTML += `<option value="${m.match_id}">${m.match_date} ${m.home_team.home_team_name} vs ${m.away_team.away_team_name} (${m.home_score}-${m.away_score})</option>`;
  });
};

sbMatchSelect.onchange = async () => {
  const matchId = sbMatchSelect.value;
  if (!matchId) return;
  await loadStatsBombMatch(matchId, compSelect.value, seasonSelect.value);
};

// ═══════════════════════════════════════════════════════════
// LOAD MATCH (ESPN)
// ═══════════════════════════════════════════════════════════
async function loadESPNMatch(eventId, matchInfo) {
  document.getElementById('loading').classList.remove('hidden');
  pausePlayback();
  totalMatchSeconds = 0;
  currentEventIdx = 0;
  currentPlayers = [];
  smoothedPlayers = [];

  try {
    homeTeam = matchInfo.homeTeam;
    awayTeam = matchInfo.awayTeam;
    homeId = matchInfo.homeId;
    awayId = matchInfo.awayId;

    // Set team logos
    document.getElementById('home-flag').innerHTML = matchInfo.homeLogo ? `<img src="${matchInfo.homeLogo}" alt="${homeTeam}">` : getFlag(homeTeam);
    document.getElementById('away-flag').innerHTML = matchInfo.awayLogo ? `<img src="${matchInfo.awayLogo}" alt="${awayTeam}">` : getFlag(awayTeam);

    const detail = await loadESPNMatchDetail(eventId);
    parseESPNData(detail, matchInfo);

    renderScoreBar();
    renderStats();
    renderTimeline();
    computeMomentum([]);

    resizePitch();
    ballX = 60; ballY = 40;
    updatePlayerPositions(animEvents[0] || { period: 1, playerId: 0, teamId: homeId });
    drawPitch();
    drawPlayers(currentPlayers);
    drawBall(60, 40);

    document.getElementById('loading').classList.add('hidden');
  } catch (err) {
    console.error('Error loading ESPN match:', err);
    document.getElementById('loading').querySelector('.text').textContent = 'Error: ' + err.message;
  }
}

// ═══════════════════════════════════════════════════════════
// LOAD MATCH (STATSBOMB)
// ═══════════════════════════════════════════════════════════
async function loadStatsBombMatch(matchId, compId, seasonId) {
  document.getElementById('loading').classList.remove('hidden');
  pausePlayback();
  totalMatchSeconds = 0;
  currentEventIdx = 0;
  currentPlayers = [];
  smoothedPlayers = [];
  threeSixtyMap = {};

  try {
    const matches = await fetchJSON(`${BASE}/matches/${compId}/${seasonId}.json`);
    matchData = matches.find(m => m.match_id == matchId);
    homeTeam = matchData.home_team.home_team_name;
    awayTeam = matchData.away_team.away_team_name;
    homeId = matchData.home_team.home_team_id;
    awayId = matchData.away_team.away_team_id;

    document.getElementById('home-flag').textContent = getFlag(homeTeam);
    document.getElementById('away-flag').textContent = getFlag(awayTeam);

    const [events, lineups] = await Promise.all([
      fetchJSON(`${BASE}/events/${matchId}.json`),
      fetchJSON(`${BASE}/lineups/${matchId}.json`)
    ]);
    eventsData = events;
    lineupsData = lineups;

    try {
      const threeSixty = await fetchJSON(`${BASE}/three-sixty/${matchId}.json`);
      threeSixty.forEach(item => { threeSixtyMap[item.event_uuid] = item.freeze_frame; });
    } catch (e) {}

    processEvents(events);
    buildLineups(lineups);
    buildPlayerFrames();
    renderScoreBar();
    renderStats();
    renderTimeline();

    resizePitch();
    ballX = 60; ballY = 40;
    updatePlayerPositions(animEvents[0] || { period: 1, playerId: 0, teamId: homeId });
    drawPitch();
    drawPlayers(currentPlayers);
    drawBall(60, 40);

    document.getElementById('loading').classList.add('hidden');
  } catch (err) {
    console.error('Error loading StatsBomb match:', err);
    document.getElementById('loading').querySelector('.text').textContent = 'Error: ' + err.message;
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  resizePitch();
  drawPitch();
  drawBall(60, 40);

  // Default: load SkillCorner tracking data
  dataSource = 'skillcorner';
  playSpeed = 4;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.speed-btn[data-speed="4"]').classList.add('active');
  await loadSkillCornerMatch('1996435');

  // Auto-play immediately
  startSCPlayback();
}

window.addEventListener('resize', () => {
  resizePitch();
  drawPitch();
  drawPlayers(currentPlayers);
  drawBall(ballX, ballY);
});

init();
</script>
