<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Football Animation Live</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1628;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: pan-y;
}

/* ── Stadium Container ── */
#stadium-wrap {
  position: relative;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  background: linear-gradient(180deg, #1a2744 0%, #0d1a30 100%);
  border-radius: 0 0 12px 12px;
  overflow: hidden;
}

/* Crowd sides */
#stadium-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30px;
  background: repeating-linear-gradient(90deg,
    rgba(100,130,180,0.1) 0px, rgba(80,110,160,0.08) 3px, rgba(60,90,140,0.1) 6px);
  z-index: 1;
  pointer-events: none;
}

/* Pitch canvas */
#pitch-container {
  position: relative;
  padding: 8px 20px;
  display: flex;
  justify-content: center;
}
#pitchCanvas {
  display: block;
  border-radius: 4px;
}

/* Possession label */
#possession-label {
  position: absolute;
  top: 80px;
  left: 100px;
  z-index: 10;
  text-align: center;
  pointer-events: none;
}
#possession-label .team-name {
  font-size: 20px;
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}
#possession-label .label {
  font-size: 13px;
  color: #f5c542;
  font-weight: 600;
}

/* Event overlay */
#event-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  pointer-events: none;
  animation: eventPop 0.4s ease-out;
}
#event-icon {
  font-size: 48px;
  margin-bottom: 4px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}
#event-minute {
  font-size: 14px;
  color: #5ddf5d;
  font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
#event-text {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  max-width: 240px;
  margin: 0 auto;
}
@keyframes eventPop {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  60% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* ── Score Bar ── */
#score-bar {
  max-width: 1100px;
  margin: 0 auto;
  background: linear-gradient(180deg, #0f1e36 0%, #0a1628 100%);
  padding: 8px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
/* match-time removed - time shown in timeline bar */
.score-section {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.team-info {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 200px;
}
.team-info.home {
  justify-content: flex-end;
}
.team-info.away {
  flex-direction: row-reverse;
  justify-content: flex-end;
}
.team-flag {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.team-flag img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.team-label {
  font-size: 15px;
  font-weight: 600;
  padding-bottom: 2px;
  border-bottom: 3px solid transparent;
  transition: border-color 0.3s;
  white-space: nowrap;
}
.team-label.has-possession {
  border-bottom-color: #5ddf5d;
}
.score-display {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 2px;
  min-width: 100px;
  text-align: center;
  flex-shrink: 0;
}
.card-stats {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: #8899aa;
}
.card-stats span {
  display: flex;
  align-items: center;
  gap: 3px;
}
.card-icon {
  width: 10px;
  height: 13px;
  border-radius: 1px;
  display: inline-block;
}
.card-icon.yellow { background: #f5c542; }
.card-icon.red { background: #e74c3c; }
.corner-icon { color: #6b8; }

/* ── Timeline ── */
#timeline-section {
  max-width: 1100px;
  margin: 0 auto;
  background: #0d1a30;
  padding: 8px 12px 4px;
}
#timeline-controls-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#timeline-controls-row button {
  background: #1a3050;
  border: 1px solid rgba(255,255,255,0.15);
  color: #ccc;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
#timeline-controls-row button:hover { background: #254070; color: #fff; }
#current-time-display {
  font-size: 14px;
  color: #5ddf5d;
  font-weight: 700;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}
#timeline-container {
  position: relative;
  height: 70px;
  flex: 1;
  min-width: 0;
}
.timeline-team-label {
  display: none; /* hidden - team names now shown inside the track */
}

#timeline-track {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

/* Momentum chart */
#momentumCanvas {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
}

/* Timeline bottom rows */
#timeline-bottom-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 2px 0 0 0;
}
.time-axis {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #556677;
  padding: 0;
}
#speed-buttons {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}
#speed-buttons .speed-btn {
  background: #1a3050;
  border: 1px solid rgba(255,255,255,0.12);
  color: #889;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
}
#speed-buttons .speed-btn:hover { background: #254070; color: #fff; }
#speed-buttons .speed-btn.active { background: #2a5090; color: #fff; border-color: #5ba3f5; }

/* Timeline split halves */
.timeline-half {
  position: absolute;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  padding: 0 6px;
  overflow: hidden;
}
.timeline-half.home {
  top: 0;
  height: 50%;
  background: rgba(91,163,245,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.timeline-half.away {
  bottom: 0;
  height: 50%;
  background: rgba(245,166,35,0.06);
}
.timeline-half .team-name-bg {
  font-size: 18px;
  font-weight: 900;
  color: rgba(255,255,255,0.12);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* Timeline events */
.timeline-event {
  position: absolute;
  font-size: 16px;
  cursor: pointer;
  z-index: 5;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  display: flex;
  align-items: center;
  gap: 2px;
  transform: translateX(-6px); /* anchor near the ball icon center */
}
.timeline-event::after {
  content: attr(data-label);
  font-size: 9px;
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  white-space: nowrap;
  margin-left: 3px;
  opacity: 0;
  transition: opacity 0.2s;
}
.timeline-event:hover::after,
.timeline-event.active::after {
  opacity: 1;
}
.timeline-event.home { top: 3px; }
.timeline-event.away { bottom: 3px; }

/* Timeline progress */
#timeline-progress {
  position: absolute;
  top: 0;
  left: 0;
  width: 0%;
  height: 100%;
  background: rgba(93,223,93,0.06);
  border-right: 2px solid rgba(93,223,93,0.6);
  pointer-events: none;
  z-index: 6;
}
#timeline-time-indicator {
  position: absolute;
  top: -16px;
  font-size: 11px;
  font-weight: 700;
  color: #5ddf5d;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 10;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  background: rgba(93,223,93,0.06);
  border-right: 2px solid rgba(93,223,93,0.5);
  pointer-events: none;
  transition: width 0.3s;
}

/* ── Stats Bar ── */
#stats-section {
  max-width: 1100px;
  margin: 0 auto;
  background: #0a1628;
  padding: 6px 20px 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 30px;
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.stat-val {
  font-size: 14px;
  font-weight: 700;
  min-width: 32px;
  text-align: center;
}
.stat-val.home { color: #5ba3f5; }
.stat-val.away { color: #f5a623; }
.stat-label {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #8899aa;
}
.stat-bar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
}
.stat-bar {
  height: 6px;
  border-radius: 3px;
  transition: width 0.5s;
}
.stat-bar.home { background: #5ba3f5; }
.stat-bar.away { background: #f5a623; }
.stat-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}
.stat-bar-bg.reverse { flex-direction: row-reverse; }

/* ── Controls ── */
/* Old controls - removed, now integrated into timeline */

/* Loading */
#loading {
  position: fixed;
  inset: 0;
  background: #0a1628;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 16px;
}
#loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(91,163,245,0.2);
  border-top-color: #5ba3f5;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .text { color: #8899aa; font-size: 14px; }
#loading.hidden { display: none; }

/* Competition selector */
#match-selector {
  max-width: 1100px;
  margin: 4px auto;
  display: flex;
  gap: 6px;
  padding: 4px 10px;
}
#match-selector select {
  background: #1a3050;
  border: 1px solid rgba(255,255,255,0.12);
  color: #ccc;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

/* ── Mobile responsive ── */
@media (max-width: 600px) {
  #controls {
    flex-wrap: wrap;
    gap: 6px;
    padding: 6px 8px;
  }
  /* Play/Pause + time on first row */
  #controls #btn-play,
  #controls #btn-pause,
  #controls #current-time-display {
    flex-shrink: 0;
  }
  /* Slider fills second row */
  #controls #seek-slider {
    order: 10;
    width: 100%;
    max-width: 100%;
    flex-basis: 100%;
  }
  /* Speed buttons shrink */
  #controls .speed-btn {
    padding: 5px 10px;
    font-size: 12px;
  }
  #controls button {
    padding: 5px 10px;
    font-size: 12px;
  }
  /* Match selector wrap on small screens */
  #match-selector {
    flex-wrap: wrap;
  }
  #match-selector select,
  #match-selector input {
    max-width: 100%;
    flex: 1 1 auto;
  }
  /* Stats two-column on mobile */
  #stats-section {
    grid-template-columns: 1fr;
    gap: 2px;
  }
}
</style>
<script>
// Prevent double-tap zoom (iOS/Android)
let _lastTap = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });
// Prevent pinch zoom
document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// ESPN DATA LOADER
// ═══════════════════════════════════════════════════════════
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/all';

let dataSource = 'espn'; // 'espn' or 'statsbomb'

async function loadESPNMatchesByDate(dateStr) {
  const d = dateStr.replace(/-/g, '');
  const res = await fetch(`${ESPN_BASE}/scoreboard?dates=${d}`);
  const data = await res.json();
  return (data.events || []).map(ev => {
    const comp = ev.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
    const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
    return {
      id: ev.id,
      name: ev.name,
      shortName: ev.shortName,
      date: ev.date,
      status: ev.status?.type?.shortDetail || '',
      homeTeam: home.team.displayName,
      awayTeam: away.team.displayName,
      homeScore: home.score || '0',
      awayScore: away.score || '0',
      homeLogo: home.team.logo,
      awayLogo: away.team.logo,
      homeId: home.team.id,
      awayId: away.team.id,
    };
  });
}

async function loadESPNMatchDetail(eventId) {
  const res = await fetch(`${ESPN_BASE}/summary?event=${eventId}`);
  return await res.json();
}

function parseESPNData(detail, matchInfo) {
  // Parse rosters into lineup format
  const rosters = detail.rosters || [];
  const boxscore = detail.boxscore || {};
  const teamStats = boxscore.teams || [];

  // Build home/away lineups
  homeLineup = [];
  awayLineup = [];

  rosters.forEach((teamRoster, idx) => {
    const isHome = idx === 0;
    const starters = (teamRoster.roster || []).filter(p => p.starter);
    const subs = (teamRoster.roster || []).filter(p => !p.starter);

    // Sort starters: GK first, then Defenders, Midfielders, Forwards
    const posOrder = { 'Goalkeeper': 0, 'Defender': 1, 'Midfielder': 2, 'Forward': 3 };
    starters.sort((a, b) => (posOrder[a.position?.displayName] ?? 2) - (posOrder[b.position?.displayName] ?? 2));

    // Fill to 11 if needed
    while (starters.length < 11 && subs.length > 0) starters.push(subs.shift());

    // Assign each player to a formation slot
    const roster = starters.slice(0, 11).map((p, i) => {
      const slot = FORMATION_433[i] || FORMATION_433[5]; // fallback to midfield
      return {
        playerId: p.athlete?.id || p.jersey,
        jersey: parseInt(p.jersey) || 0,
        name: p.athlete?.fullName || p.athlete?.shortName || '',
        position: slot.role,
        baseX: slot.x,
        baseY: slot.y,
        keeper: slot.role === 'GK'
      };
    });

    if (isHome) homeLineup = roster;
    else awayLineup = roster;
  });

  // Parse match events (goals, cards, subs)
  goalEvents = [];
  cardEvents = [];
  const matchEvents = []; // for timeline animation

  rosters.forEach((teamRoster, idx) => {
    const isHome = idx === 0;
    const teamName = isHome ? matchInfo.homeTeam : matchInfo.awayTeam;
    const teamId = isHome ? matchInfo.homeId : matchInfo.awayId;

    (teamRoster.roster || []).forEach(p => {
      (p.plays || []).forEach(play => {
        const minute = parseInt(play.clock?.displayValue) || 0;
        const matchSeconds = minute * 60;

        if (play.scoringPlay || play.didScore) {
          goalEvents.push({
            minute, team: teamName, teamId, matchSeconds,
            player: p.athlete?.shortName || p.athlete?.fullName || ''
          });
        }
        if (play.yellowCard) {
          cardEvents.push({
            minute, team: teamName, teamId, matchSeconds,
            player: p.athlete?.shortName || '', card: 'Yellow Card'
          });
        }
        if (play.redCard) {
          cardEvents.push({
            minute, team: teamName, teamId, matchSeconds,
            player: p.athlete?.shortName || '', card: 'Red Card'
          });
        }

        matchEvents.push({
          minute, matchSeconds, teamId, isHome,
          type: play.scoringPlay ? 'Goal' : play.yellowCard ? 'Yellow' : play.redCard ? 'Red' : play.substitution ? 'Sub' : 'Other',
          player: p.athlete?.shortName || ''
        });
      });
    });
  });

  // Parse team statistics
  stats = { home: {}, away: {} };
  const statMap = {
    'Possession': 'possession', 'SHOTS': 'shots', 'Total Shots': 'shots',
    'ON GOAL': 'shotsOnTarget', 'Shots On Target': 'shotsOnTarget',
    'Shots Off Target': 'shotsOff', 'Corner Kicks': 'corners', 'Fouls': 'fouls',
    'Yellow Cards': 'yellowCards', 'Red Cards': 'redCards', 'Offsides': 'offsides',
    'Saves': 'saves', 'Blocked Shots': 'blockedShots'
  };

  teamStats.forEach((team, idx) => {
    const side = idx === 0 ? 'home' : 'away';
    stats[side] = { possession: 50, shots: 0, shotsOnTarget: 0, shotsOff: 0, corners: 0, fouls: 0, yellowCards: 0, redCards: 0, attacks: 0, dangerousAttacks: 0 };
    (team.statistics || []).forEach(s => {
      const key = statMap[s.label || s.name];
      if (key) {
        let val = parseFloat(s.displayValue);
        if (key === 'possession') val = parseFloat(s.displayValue);
        stats[side][key] = val || 0;
      }
    });
    // Compute derived stats
    if (!stats[side].shotsOff) stats[side].shotsOff = Math.max(0, (stats[side].shots || 0) - (stats[side].shotsOnTarget || 0));
    stats[side].attacks = (stats[side].shots || 0) * 8 + (stats[side].corners || 0) * 3;
    stats[side].dangerousAttacks = (stats[side].shotsOnTarget || 0) * 5 + (stats[side].shots || 0) * 2;
  });

  // Build key event highlights only (goals, cards, fouls, PKs)
  buildKeyEventAnimation();
}

// ANIMATED KEY EVENT SYSTEM
// ═══════════════════════════════════════════════════════════
let keyEvents = [];
let currentKeyIdx = -1;
let isAutoPlaying = false;
let sceneTimer = null;     // setInterval for current scene
let sceneStart = 0;        // performance.now() when scene started
let currentScene = null;   // {keyframes, duration, ke}

function buildKeyEventAnimation() {
  keyEvents = [];
  animEvents = [];
  maxMatchSeconds = 5400;

  goalEvents.forEach(g => {
    keyEvents.push({
      minute: g.minute, matchSeconds: g.matchSeconds,
      type: 'goal', icon: '⚽', team: g.team, teamId: g.teamId,
      player: g.player, isHome: g.teamId == homeId,
      label: `GOAL! ${g.player}`
    });
  });

  cardEvents.forEach(c => {
    const isYellow = c.card.includes('Yellow');
    const isRed = c.card.includes('Red');
    keyEvents.push({
      minute: c.minute, matchSeconds: c.matchSeconds,
      type: isRed ? 'red' : 'yellow', icon: isRed ? '🟥' : '🟨',
      team: c.team, teamId: c.teamId,
      player: c.player, isHome: c.teamId == homeId,
      label: `${isRed ? 'RED CARD' : 'YELLOW CARD'} ${c.player}`
    });
  });

  // Generate synthetic corner kick events from total counts
  const homeCorners = stats.home.corners || 0;
  const awayCorners = stats.away.corners || 0;
  function distributeCorners(count, teamName, teamId, isHome) {
    for (let i = 0; i < count; i++) {
      // Spread evenly with some randomness, avoid existing event times
      const baseMin = Math.floor((i + 0.5) / count * 88) + 1;
      const jitter = Math.floor(Math.random() * 4) - 2;
      const minute = Math.max(1, Math.min(89, baseMin + jitter));
      const matchSeconds = minute * 60 + Math.floor(Math.random() * 30);
      // Skip if too close to a goal (within 1 min)
      const tooCloseToGoal = goalEvents.some(g => Math.abs(g.matchSeconds - matchSeconds) < 60);
      if (tooCloseToGoal) continue;
      keyEvents.push({
        minute, matchSeconds,
        type: 'corner', icon: '🚩', team: teamName, teamId,
        player: '', isHome,
        label: `CORNER KICK ${teamName}`
      });
    }
  }
  distributeCorners(homeCorners, homeTeam, homeId, true);
  distributeCorners(awayCorners, awayTeam, awayId, false);

  keyEvents.sort((a, b) => a.matchSeconds - b.matchSeconds);
  renderKeyEventsList();
}

function renderKeyEventsList() {
  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.timeline-event').forEach(el => el.remove());
  keyEvents.forEach((ke, i) => {
    const pct = (ke.matchSeconds / maxMatchSeconds) * 100;
    const div = document.createElement('div');
    div.className = `timeline-event ${ke.isHome ? 'home' : 'away'}`;
    div.style.left = pct + '%';
    div.style.cursor = 'pointer';
    div.textContent = ke.icon;
    div.title = `${ke.minute}' ${ke.label}`;
    div.onclick = () => playEventScene(i);
    track.appendChild(div);
  });
}

// ── Helper: get player screen position ──
function plrPos(p, isHome) {
  return { x: isHome ? p.baseX : 120 - p.baseX, y: p.baseY };
}
function pickPlayer(lineup, role) {
  if (role === 'GK') return lineup.find(p => p.keeper) || lineup[0];
  if (role === 'DEF') return lineup.find(p => ['RB','RCB','LCB','LB'].includes(p.position)) || lineup[1];
  if (role === 'MID') return lineup.find(p => ['RCM','CDM','LCM'].includes(p.position)) || lineup[5];
  if (role === 'FWD') return lineup.find(p => ['RW','ST','LW'].includes(p.position)) || lineup[9];
  return lineup[Math.floor(Math.random() * lineup.length)];
}

// ── Build keyframes for each event type ──
function buildGoalScene(ke) {
  const isHome = ke.isHome;
  const lineup = isHome ? homeLineup : awayLineup;
  const dir = isHome ? 1 : -1; // attack direction

  const def = pickPlayer(lineup, 'DEF');
  const mid = pickPlayer(lineup, 'MID');
  const fwd = pickPlayer(lineup, 'FWD');
  const defP = plrPos(def, isHome);
  const midP = plrPos(mid, isHome);
  const fwdP = plrPos(fwd, isHome);
  const goalX = isHome ? 117 : 3;
  const goalY = 37 + Math.random() * 6;
  const shotX = isHome ? 95 + Math.random() * 10 : 15 - Math.random() * 10;
  const shotY = 25 + Math.random() * 30;

  return [
    { t: 0,   bx: defP.x, by: defP.y, carrier: def, trail: null, label: null, effect: null },
    { t: 1.2, bx: midP.x, by: midP.y, carrier: mid, trail: { fx: defP.x, fy: defP.y, tx: midP.x, ty: midP.y }, label: null, effect: null },
    { t: 2.5, bx: fwdP.x, by: fwdP.y, carrier: fwd, trail: { fx: midP.x, fy: midP.y, tx: fwdP.x, ty: fwdP.y }, label: null, effect: null },
    { t: 3.8, bx: shotX,  by: shotY,  carrier: fwd, trail: { fx: fwdP.x, fy: fwdP.y, tx: shotX, ty: shotY }, label: null, effect: null },
    { t: 4.8, bx: goalX,  by: goalY,  carrier: fwd, trail: { fx: shotX, fy: shotY, tx: goalX, ty: goalY }, label: null, effect: 'shot' },
    { t: 5.5, bx: goalX,  by: goalY,  carrier: fwd, trail: null, label: `⚽ GOAL! ${ke.player}`, effect: 'burst' },
    { t: 7.5, bx: goalX,  by: goalY,  carrier: null, trail: null, label: null, effect: null },
  ];
}

function buildPassScene(ke) {
  // Passing sequence — team keeps possession in their half
  const isHome = ke.isHome;
  const lineup = isHome ? homeLineup : awayLineup;
  const outfield = lineup.filter(p => !p.keeper);
  const frames = [];
  let t = 0;
  // Pick 4 random outfield players to pass between
  const passers = [];
  const used = new Set();
  for (let i = 0; i < 4; i++) {
    let idx;
    do { idx = Math.floor(Math.random() * outfield.length); } while (used.has(idx));
    used.add(idx);
    passers.push(outfield[idx]);
  }

  for (let i = 0; i < passers.length; i++) {
    const p = passers[i];
    const pos = plrPos(p, isHome);
    const prev = i > 0 ? plrPos(passers[i - 1], isHome) : null;
    frames.push({
      t, bx: pos.x, by: pos.y, carrier: p,
      trail: prev ? { fx: prev.x, fy: prev.y, tx: pos.x, ty: pos.y } : null,
      label: null, effect: null
    });
    t += 1.0 + Math.random() * 0.5;
  }
  return frames;
}

function buildFoulScene(ke) {
  const isHome = ke.isHome;
  // The fouled team's player has the ball, fouler from the OTHER team tackles them
  const victimLineup = isHome ? homeLineup : awayLineup;  // team that gets fouled = ke's team
  const foulerLineup = isHome ? awayLineup : homeLineup;  // opposing team commits foul
  const victim = victimLineup.filter(p => !p.keeper)[Math.floor(Math.random() * 8)];
  const fouler = foulerLineup.filter(p => !p.keeper)[Math.floor(Math.random() * 8)];

  // Collision point in a realistic area
  const collX = 35 + Math.sin(ke.minute * 2.7) * 25;
  const collY = 20 + Math.cos(ke.minute * 3.1) * 30;

  // Victim starts with the ball, fouler chases from behind/side
  const victimStartX = collX + (isHome ? -20 : 20);
  const victimStartY = collY + Math.sin(ke.minute * 5) * 8;
  const foulerStartX = collX + (isHome ? 10 : -10);
  const foulerStartY = collY + Math.cos(ke.minute * 4) * 12;

  const cardLabel = ke.type === 'red' ? '🟥 RED CARD' : '🟨 YELLOW CARD';

  return [
    // 1. Victim dribbling with ball, fouler approaching from other direction
    { t: 0,   bx: victimStartX, by: victimStartY, carrier: victim, label: null, effect: null,
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: victimStartX, vy: victimStartY, fx: foulerStartX, fy: foulerStartY } },
    // 2. Both converging toward collision point
    { t: 1.0, bx: (victimStartX + collX) / 2, by: (victimStartY + collY) / 2, carrier: victim, label: null, effect: null,
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: (victimStartX + collX) / 2, vy: (victimStartY + collY) / 2, fx: (foulerStartX + collX) / 2, fy: (foulerStartY + collY) / 2 } },
    // 3. COLLISION! Both at same point
    { t: 1.5, bx: collX, by: collY, carrier: null, label: null, effect: 'collision', collisionData: { x: collX, y: collY },
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: collX, vy: collY, fx: collX, fy: collY } },
    // 4. Shake!
    { t: 1.8, bx: collX, by: collY, carrier: null, label: null, effect: 'collision_shake', collisionData: { x: collX, y: collY },
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: collX - 2, vy: collY + 3, fx: collX + 2, fy: collY - 3 } },
    // 5. More shake
    { t: 2.2, bx: collX, by: collY, carrier: null, label: null, effect: 'collision_shake', collisionData: { x: collX, y: collY },
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: collX + 3, vy: collY - 2, fx: collX - 3, fy: collY + 2 } },
    // 6. Victim down, fouler backs away
    { t: 2.8, bx: collX, by: collY, carrier: null, label: null, effect: 'player_down', collisionData: { x: collX, y: collY },
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: collX, vy: collY, fx: collX + (isHome ? -5 : 5), fy: collY - 3 } },
    // 7. Card shown
    { t: 3.5, bx: collX, by: collY, carrier: null, label: `${cardLabel}\n${ke.player}`, effect: ke.type, collisionData: { x: collX, y: collY },
      foulPlayers: { victim, fouler, victimIsHome: isHome, foulerIsHome: !isHome, vx: collX, vy: collY, fx: collX + (isHome ? -8 : 8), fy: collY - 5 } },
    // 8. End
    { t: 5.5, bx: collX, by: collY, carrier: null, label: null, effect: null },
  ];
}

function buildCornerScene(ke) {
  const isHome = ke.isHome;
  const lineup = isHome ? homeLineup : awayLineup;

  // Corner kick position: near opponent's goal corner flag
  const cornerX = isHome ? 119 : 1;
  const cornerTop = Math.random() > 0.5; // top or bottom corner
  const cornerY = cornerTop ? 1 : 79;

  // Penalty area target for the cross
  const targetX = isHome ? 108 + Math.random() * 6 : 6 + Math.random() * 6;
  const targetY = 30 + Math.random() * 20; // inside penalty box

  // Header/clearance outcome
  const headerX = targetX + (Math.random() - 0.5) * 8;
  const headerY = targetY + (Math.random() - 0.5) * 10;

  const kicker = pickPlayer(lineup, 'MID');
  const header = pickPlayer(lineup, 'FWD');

  const clearX = targetX + (isHome ? -25 : 25) + Math.sin(ke.minute * 3.7) * 10;
  const clearY = targetY + Math.cos(ke.minute * 5.3) * 15;

  // Ball starts deep in opponent half (near their goal), cross/shot deflected out
  const oppLineup = isHome ? awayLineup : homeLineup;
  const attacker = pickPlayer(lineup, 'FWD');
  const winger = pickPlayer(lineup, 'MID');
  // Home attacks RIGHT (toward x=120), Away attacks LEFT (toward x=0)
  const deepAttackX = isHome ? 95 + Math.random() * 10 : 15 - Math.random() * 10;
  const deepAttackY = cornerTop ? 15 + Math.random() * 10 : 55 + Math.random() * 10;
  const nearGoalX = isHome ? 110 : 10;
  const nearGoalY = cornerTop ? 10 : 70;
  // Ball goes past the goal line (out of bounds)
  const outX = isHome ? 122 : -2;
  const outY = cornerTop ? -2 : 82;

  return [
    // 1. Ball deep in opponent half — winger on the flank
    { t: 0,   bx: deepAttackX, by: deepAttackY, carrier: winger, label: null, effect: null },
    // 2. Cross/shot attempt toward goal area
    { t: 1.0, bx: nearGoalX, by: nearGoalY, carrier: attacker, label: null, effect: null },
    // 3. Defender deflects — ball flies out past goal line!
    { t: 1.8, bx: outX, by: outY, carrier: null, label: null, effect: 'ball_out' },
    // 4. Brief pause — referee signals corner
    { t: 2.5, bx: cornerX, by: cornerY, carrier: null, label: `🚩 CORNER KICK\n${ke.team}`, effect: 'corner_flag' },
    // 4. Kicker sets up at corner flag, players get into position
    { t: 3.5, bx: cornerX, by: cornerY, carrier: kicker, label: null, effect: 'corner_setup' },
    // 5. Cross into the box! Ball arcs high
    { t: 4.3, bx: (cornerX + targetX) / 2, by: (cornerY + targetY) / 2, carrier: null, label: null, effect: 'cross_flight' },
    // 6. Ball arrives in box — header contest
    { t: 5.0, bx: targetX, by: targetY, carrier: header, label: null, effect: 'header_contest' },
    // 7. Header contact — clearance
    { t: 5.5, bx: headerX, by: headerY, carrier: null, label: null, effect: 'header_contact' },
    // 8. Ball lands nearby after clearance
    { t: 6.5, bx: Math.max(5, Math.min(115, clearX)), by: Math.max(5, Math.min(75, clearY)), carrier: null, label: null, effect: null },
  ];
}

// ── Scene Player ──
function playEventScene(idx) {
  if (idx < 0 || idx >= keyEvents.length) return;
  stopScene();
  currentKeyIdx = idx;
  const ke = keyEvents[idx];

  // Update match time
  totalMatchSeconds = ke.matchSeconds;
  currentMatchMinute = ke.minute;
  currentPeriod = ke.matchSeconds < 2700 ? 1 : 2;
  renderScoreBar();
  updateTimeDisplay();
  document.getElementById('poss-team-name').textContent = ke.team;
  document.getElementById('timeline-progress').style.width = ((ke.matchSeconds / maxMatchSeconds) * 100) + '%';
  document.getElementById('seek-slider').value = (ke.matchSeconds / maxMatchSeconds) * 1000;

  // Build scene keyframes
  let keyframes;
  if (ke.type === 'goal') {
    keyframes = buildGoalScene(ke);
  } else if (ke.type === 'yellow' || ke.type === 'red') {
    keyframes = buildFoulScene(ke);
  } else if (ke.type === 'corner') {
    keyframes = buildCornerScene(ke);
  } else {
    keyframes = buildPassScene(ke);
  }

  currentScene = { keyframes, ke, duration: keyframes[keyframes.length - 1].t };
  sceneStart = performance.now();

  // Run scene at 30fps
  sceneTimer = setInterval(() => {
    const elapsed = (performance.now() - sceneStart) / 1000;
    renderSceneFrame(elapsed);
    if (elapsed >= currentScene.duration) {
      stopScene();
      // Auto advance if playing
      if (isAutoPlaying) {
        setTimeout(() => {
          if (!isAutoPlaying) return;
          currentKeyIdx++;
          if (currentKeyIdx < keyEvents.length) {
            // Play a passing scene before next key event
            playPassThenEvent(currentKeyIdx);
          } else {
            stopAutoPlay();
          }
        }, 800);
      }
    }
  }, 33);
}

function playPassThenEvent(idx) {
  // Play a short passing animation, then the key event
  const ke = keyEvents[idx];
  const passKe = { ...ke, type: 'pass' };
  const passFrames = buildPassScene(passKe);
  currentScene = { keyframes: passFrames, ke: passKe, duration: passFrames[passFrames.length - 1].t };
  sceneStart = performance.now();

  sceneTimer = setInterval(() => {
    const elapsed = (performance.now() - sceneStart) / 1000;
    renderSceneFrame(elapsed);
    if (elapsed >= currentScene.duration) {
      stopScene();
      setTimeout(() => {
        if (isAutoPlaying) playEventScene(idx);
      }, 300);
    }
  }, 33);
}

function renderSceneFrame(elapsed) {
  if (!currentScene) return;
  const { keyframes, ke } = currentScene;

  // Find current keyframe pair
  let kfA = keyframes[0], kfB = keyframes[0];
  for (let i = 0; i < keyframes.length - 1; i++) {
    if (elapsed >= keyframes[i].t && elapsed < keyframes[i + 1].t) {
      kfA = keyframes[i];
      kfB = keyframes[i + 1];
      break;
    }
    if (i === keyframes.length - 2) {
      kfA = kfB = keyframes[keyframes.length - 1];
    }
  }

  // Interpolate
  const segDur = kfB.t - kfA.t || 1;
  const t = Math.min((elapsed - kfA.t) / segDur, 1);
  const smooth = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

  ballX = kfA.bx + (kfB.bx - kfA.bx) * smooth;
  ballY = kfA.by + (kfB.by - kfA.by) * smooth;

  // Update player positions with current carrier
  const carrier = kfB.carrier || kfA.carrier;
  const fakeEv = {
    playerId: carrier?.playerId || 0,
    teamId: ke.teamId,
    period: currentPeriod
  };
  updatePlayerPositions(fakeEv);

  // Draw
  drawPitch();

  // Draw pass trail
  const trail = kfA.trail || kfB.trail;
  if (trail && t < 1) {
    drawPassTrail(trail.fx, trail.fy, trail.tx, trail.ty, 1);
  }

  // Draw collision / foul effects
  const effect = kfA.effect;
  const ctx = pitchCtx;
  const collData = kfA.collisionData || kfB.collisionData;

  if (effect === 'collision' || effect === 'collision_shake' || effect === 'player_down') {
    const cx = px(collData?.x || ballX), cy = py(collData?.y || ballY);

    if (effect === 'collision' || effect === 'collision_shake') {
      // Screen shake - offset the entire canvas drawing
      const shakeAmt = effect === 'collision_shake' ? 6 : 3;
      const shakeX = Math.sin(elapsed * 40) * shakeAmt;
      const shakeY = Math.cos(elapsed * 35) * shakeAmt;
      ctx.save();
      ctx.translate(shakeX, shakeY);

      // Impact burst - big explosion
      const burstR = 30 + Math.sin(elapsed * 15) * 10;
      ctx.beginPath();
      ctx.arc(cx, cy, burstR, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(cx, cy, 3, cx, cy, burstR);
      g.addColorStop(0, 'rgba(255,80,30,0.8)');
      g.addColorStop(0.4, 'rgba(255,150,50,0.4)');
      g.addColorStop(1, 'rgba(255,100,50,0)');
      ctx.fillStyle = g;
      ctx.fill();

      // Impact lines radiating outward
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + elapsed * 3;
        const innerR = 12;
        const outerR = 25 + Math.random() * 10;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
        ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
        ctx.strokeStyle = 'rgba(255,200,50,0.7)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.restore();
    }

    if (effect === 'player_down') {
      // Player on the ground - draw an "X" mark
      ctx.strokeStyle = 'rgba(255,80,30,0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 10, cy - 10); ctx.lineTo(cx + 10, cy + 10);
      ctx.moveTo(cx + 10, cy - 10); ctx.lineTo(cx - 10, cy + 10);
      ctx.stroke();
    }
  }
  if (effect === 'shot') {
    const sx = px(kfA.bx), sy = py(kfA.by);
    const gx = px(kfB.bx), gy = py(kfB.by);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(px(ballX), py(ballY));
    ctx.strokeStyle = 'rgba(255,220,50,0.8)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  if (effect === 'burst') {
    const gx = px(ballX), gy = py(ballY);
    const burstR = 25 + Math.sin(elapsed * 8) * 5;
    ctx.beginPath();
    ctx.arc(gx, gy, burstR, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(gx, gy, 2, gx, gy, burstR);
    g.addColorStop(0, 'rgba(255,220,50,0.9)');
    g.addColorStop(0.5, 'rgba(255,180,0,0.4)');
    g.addColorStop(1, 'rgba(255,220,50,0)');
    ctx.fillStyle = g;
    ctx.fill();
  }
  if (effect === 'yellow' || effect === 'red') {
    const cardColor = effect === 'yellow' ? '#f5c542' : '#e74c3c';
    const cx = px(ballX), cy = py(ballY) - 25;
    ctx.fillStyle = cardColor;
    ctx.fillRect(cx - 8, cy - 12, 16, 24);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cx - 8, cy - 12, 16, 24);
  }

  // Ball out of play
  if (effect === 'ball_out') {
    // Don't draw ball (it's off the pitch), just show an indicator at the edge
    const edgeX = Math.max(0, Math.min(120, ballX));
    const edgeY = Math.max(0, Math.min(80, ballY));
    const ex = px(edgeX), ey = py(edgeY);
    // Flash at boundary
    ctx.beginPath();
    ctx.arc(ex, ey, 10 + Math.sin(elapsed * 12) * 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Corner kick effects
  if (effect === 'corner_flag') {
    // Draw corner flag marker
    const cx = px(ballX), cy = py(ballY);
    ctx.fillStyle = '#f55';
    ctx.beginPath(); ctx.moveTo(cx, cy - 15); ctx.lineTo(cx + 10, cy - 10); ctx.lineTo(cx, cy - 5); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 15); ctx.stroke();
  }
  if (effect === 'corner_setup') {
    // Dotted arc showing intended cross trajectory
    const cx = px(ballX), cy = py(ballY);
    const isHome = ke.isHome;
    const targetX = isHome ? 108 : 12;
    const tx = px(targetX), ty = py(40);
    ctx.beginPath();
    const cpx = (cx + tx) / 2, cpy = Math.min(cy, ty) - 40;
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(cpx, cpy, tx, ty);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (effect === 'cross_flight') {
    // Ball in the air - draw arc trail
    const bpx = px(ballX), bpy = py(ballY);
    ctx.beginPath();
    ctx.arc(bpx, bpy - 8, 12, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(bpx, bpy - 8, 2, bpx, bpy - 8, 12);
    g.addColorStop(0, 'rgba(255,255,255,0.5)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fill();
  }
  if (effect === 'header_contest') {
    // Multiple players contesting - show cluster indicator
    const cx = px(ballX), cy = py(ballY);
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,200,50,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  if (effect === 'header_contact') {
    // Header impact
    const cx = px(ballX), cy = py(ballY);
    const burstR = 15 + Math.sin(elapsed * 12) * 5;
    ctx.beginPath();
    ctx.arc(cx, cy, burstR, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, burstR);
    g.addColorStop(0, 'rgba(255,255,200,0.6)');
    g.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = g;
    ctx.fill();
  }

  drawPlayers(currentPlayers);
  // Only draw ball if it's on the pitch
  const ballOnPitch = ballX >= 0 && ballX <= 120 && ballY >= 0 && ballY <= 80;
  if (ballOnPitch) drawBall(ballX, ballY);

  // Label overlay
  const overlay = document.getElementById('event-overlay');
  const label = kfA.label || (t > 0.8 ? kfB.label : null);
  if (label) {
    overlay.style.display = '';
    const parts = label.split('\n');
    const iconMatch = parts[0].match(/^(⚽|🟨|🟥)/);
    document.getElementById('event-icon').textContent = iconMatch ? iconMatch[0] : '';
    document.getElementById('event-minute').textContent = ke.minute + "'";
    document.getElementById('event-text').textContent = iconMatch ? parts[0].substring(iconMatch[0].length).trim() : parts.join(' ');
    if (!overlay.dataset.shown) {
      overlay.style.animation = 'none';
      void overlay.offsetHeight;
      overlay.style.animation = 'eventPop 0.4s ease-out';
      overlay.dataset.shown = '1';
    }
  } else {
    overlay.style.display = 'none';
    delete overlay.dataset.shown;
  }
}

function stopScene() {
  if (sceneTimer) { clearInterval(sceneTimer); sceneTimer = null; }
  currentScene = null;
  document.getElementById('event-overlay').style.display = 'none';

let scFrames = [];           // compact tracking frames
let scPlayerMap = {};        // trackable_object -> {name, number, team_id}
let scInfo = null;           // match info
let scFrameIdx = 0;
let scPitchL = 105, scPitchW = 68;
let scGoals = [];

async function loadSkillCornerMatch(matchId) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading').querySelector('.text').textContent = 'Loading tracking data (4MB)...';
  pausePlayback();
  stopScene();
  isAutoPlaying = false;
  totalMatchSeconds = 0;
  scFrameIdx = 0;
  smoothedPlayers = [];

  try {
    const data = await fetchJSON(`data/${matchId}_compact.json`);
    scInfo = data.info;
    scFrames = data.frames;
    scPlayerMap = scInfo.players;
    scPitchL = scInfo.pitch_length;
    scPitchW = scInfo.pitch_width;

    homeTeam = scInfo.home_team;
    awayTeam = scInfo.away_team;
    homeId = scInfo.home_id;
    awayId = scInfo.away_id;

    // Set team info in UI
    document.getElementById('home-name').textContent = homeTeam;
    document.getElementById('away-name').textContent = awayTeam;
    document.getElementById('home-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${scInfo.home_color};border:2px solid rgba(255,255,255,0.3)"></span>`;
    document.getElementById('away-flag').innerHTML = `<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:${scInfo.away_color};border:2px solid rgba(255,255,255,0.3)"></span>`;
    document.getElementById('home-score').textContent = '0';
    document.getElementById('away-score').textContent = '0';

    // Build goal timeline for score tracking
    scGoals = (scInfo.goals || []).sort((a, b) => a.frame - b.frame);

    // Calculate max match seconds from last frame timestamp
    // SkillCorner timestamps already include full match time
    const lastFrame = scFrames[scFrames.length - 1];
    maxMatchSeconds = parseTimestamp(lastFrame.t);

    // Render timeline
    updateTimeAxisLabels();
    renderSCTimeline();

    resizePitch();
    scPlayTime = 0;
    renderSkillCornerFrameInterp(0, 1, 0);
    document.getElementById('loading').classList.add('hidden');
  } catch (err) {
    console.error('Error loading SkillCorner:', err);
    document.getElementById('loading').querySelector('.text').textContent = 'Error: ' + err.message;
  }
}

// SkillCorner playback via setInterval with interpolation
let scPlayInterval = null;
let scPlayTime = 0;       // continuous time in "data frames" (float)

function startSCPlayback() {
  if (scPlayInterval) clearInterval(scPlayInterval);
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  isPlaying = true;
  scPlayTime = scFrameIdx;

  let scLastTick = performance.now();
  scPlayInterval = setInterval(() => {
    if (!isPlaying) return;
    const now = performance.now();
    const dt = (now - scLastTick) / 1000; // actual seconds elapsed
    scLastTick = now;
    // Original data = 2fps, so 2 data frames = 1 second real time
    const advance = dt * 2 * playSpeed;
    scPlayTime += advance;

    if (scPlayTime >= scFrames.length - 1) {
      scPlayTime = scFrames.length - 1;
      pauseSCPlayback();
      return;
    }

    // Interpolate between two data frames
    const idxA = Math.floor(scPlayTime);
    const idxB = Math.min(idxA + 1, scFrames.length - 1);
    const t = scPlayTime - idxA;
    renderSkillCornerFrameInterp(idxA, idxB, t);
  }, 33);
}

function renderSkillCornerFrameInterp(idxA, idxB, t) {
  const frameA = scFrames[idxA];
  const frameB = scFrames[idxB];
  scFrameIdx = idxA;

  // Update time from frameA
  // SkillCorner timestamps already include match time (P2 starts at 45:00)
  if (frameA.t) {
    totalMatchSeconds = parseTimestamp(frameA.t);
  }
  currentPeriod = frameA.p;
  currentMatchMinute = Math.floor(totalMatchSeconds / 60);
  updateTimeDisplay();

  // Possession - show underline on team name in score bar
  const possHome = frameA.ps === 'home team';
  const possAway = frameA.ps === 'away team';
  document.getElementById('home-name').classList.toggle('has-possession', possHome);
  document.getElementById('away-name').classList.toggle('has-possession', possAway);

  // Interpolate ball
  if (frameA.b && frameB.b) {
    ballX = ((frameA.b[0] + (frameB.b[0] - frameA.b[0]) * t) / scPitchL + 0.5) * 120;
    ballY = ((frameA.b[1] + (frameB.b[1] - frameA.b[1]) * t) / scPitchW + 0.5) * 80;
  } else if (frameA.b) {
    ballX = (frameA.b[0] / scPitchL + 0.5) * 120;
    ballY = (frameA.b[1] / scPitchW + 0.5) * 80;
  }

  // Interpolate players - match by player_id
  const playersA = {};
  frameA.d.forEach(([x, y, pid]) => { playersA[pid] = { x, y }; });

  const targets = frameB.d.map(([xB, yB, pid]) => {
    const pInfo = scPlayerMap[String(pid)] || {};
    const isHome = pInfo.team_id === homeId;
    const a = playersA[pid];
    let x, y;
    if (a) {
      x = (( a.x + (xB - a.x) * t ) / scPitchL + 0.5) * 120;
      y = (( a.y + (yB - a.y) * t ) / scPitchW + 0.5) * 80;
    } else {
      x = (xB / scPitchL + 0.5) * 120;
      y = (yB / scPitchW + 0.5) * 80;
    }
    return { x, y, teammate: isHome, keeper: pInfo.position === 'GK', actor: false, jersey: pInfo.number || 0 };
  });

  currentPlayers = targets;

  // Draw
  drawPitch();
  drawPlayers(currentPlayers);
  if (ballX >= 0 && ballX <= 120 && ballY >= 0 && ballY <= 80) drawBall(ballX, ballY);

  // Update slider & time indicator — use time-based percentage for consistency
  const timePct = Math.min((totalMatchSeconds / maxMatchSeconds) * 100, 100);
  document.getElementById('seek-slider').value = (scPlayTime / scFrames.length) * 1000;
  document.getElementById('timeline-progress').style.width = timePct + '%';
  const timeIndicator = document.getElementById('timeline-time-indicator');
  if (timeIndicator) {
    timeIndicator.style.left = timePct + '%';
    timeIndicator.textContent = currentMatchMinute + "'";
  }

  // Update score based on current time + activate goal labels
  let hs = 0, as = 0;
  document.querySelectorAll('#timeline-track .timeline-event').forEach((el, i) => {
    const g = scGoals[i];
    if (!g) return;
    const reached = currentMatchMinute >= g.minute;
    if (reached) { hs = g.home_score; as = g.away_score; }
    // Show label for 3 minutes after goal
    el.classList.toggle('active', reached && currentMatchMinute < g.minute + 3);
  });
  document.getElementById('home-score').textContent = hs;
  document.getElementById('away-score').textContent = as;
}

function updateTimeAxisLabels() {
  const el = document.getElementById('time-axis-labels');
  if (!el) return;
  // Check if match has extra time periods (period 3/4)
  const hasExtraTime = scFrames.length > 0 && scFrames.some(f => f.p >= 3);
  let labels;
  if (hasExtraTime) {
    labels = ["0'", "15'", "30'", "HT", "60'", "75'", "90'", "105'", "120'"];
  } else {
    labels = ["0'", "15'", "30'", "HT", "60'", "75'", "90'"];
  }
  el.innerHTML = labels.map(l => `<span>${l}</span>`).join('');
}

function renderSCTimeline() {
  const track = document.getElementById('timeline-track');
  // Clear old content
  track.querySelectorAll('.timeline-event, .timeline-half').forEach(el => el.remove());

  // Build two halves with team name backgrounds
  const homeHalf = document.createElement('div');
  homeHalf.className = 'timeline-half home';
  homeHalf.innerHTML = `<span class="team-name-bg">${homeTeam}</span>`;
  track.appendChild(homeHalf);

  const awayHalf = document.createElement('div');
  awayHalf.className = 'timeline-half away';
  awayHalf.innerHTML = `<span class="team-name-bg">${awayTeam}</span>`;
  track.appendChild(awayHalf);

  // Add goal events — position by minute/maxMatchSeconds for accuracy
  const totalFrames = scFrames.length;
  scGoals.forEach(g => {
    const pct = (g.minute * 60 / maxMatchSeconds) * 100;
    const isHome = g.team === 'home';
    const shortName = g.player.split(' ').pop();

    // Find closest data index for click-to-seek
    let dataIdx = 0;
    for (let i = 0; i < scFrames.length; i++) {
      if (scFrames[i].f >= g.frame) { dataIdx = i; break; }
    }

    const div = document.createElement('div');
    div.className = `timeline-event ${isHome ? 'home' : 'away'}`;
    div.style.left = pct + '%';
    div.innerHTML = `⚽`;
    div.dataset.label = `${g.minute}' ${shortName}`;
    div.title = `${g.minute}' ${g.player} (${g.home_score}-${g.away_score})`;
    div.onclick = () => {
      scPlayTime = dataIdx;
      scFrameIdx = dataIdx;
      renderSkillCornerFrameInterp(dataIdx, Math.min(dataIdx + 1, totalFrames - 1), 0);
    };
    track.appendChild(div);
  });
}

function pauseSCPlayback() {
  isPlaying = false;
  if (scPlayInterval) { clearInterval(scPlayInterval); scPlayInterval = null; }
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'none';
}

// PITCH DRAWING
// ═══════════════════════════════════════════════════════════
const pitchCanvas = document.getElementById('pitchCanvas');
const pitchCtx = pitchCanvas.getContext('2d');

const PITCH_W = 120, PITCH_H = 80;
let canvasW, canvasH, scaleX, scaleY, offsetX = 0, offsetY = 0;

function resizePitch() {
  const container = document.getElementById('pitch-container');
  const maxW = container.clientWidth - 40;
  const maxH = Math.min(340, window.innerHeight * 0.42);
  const ratio = PITCH_H / PITCH_W;

  // Fit within max dimensions
  canvasW = maxW;
  canvasH = maxW * ratio;
  if (canvasH > maxH) {
    canvasH = maxH;
    canvasW = maxH / ratio;
  }

  pitchCanvas.width = canvasW * 2;  // 2x for retina
  pitchCanvas.height = canvasH * 2;
  pitchCanvas.style.width = canvasW + 'px';
  pitchCanvas.style.height = canvasH + 'px';
  scaleX = (canvasW * 2) / PITCH_W;
  scaleY = (canvasH * 2) / PITCH_H;
}

function px(x) { return x * scaleX; }
function py(y) { return y * scaleY; }

function drawPitch() {
  const ctx = pitchCtx;
  const w = pitchCanvas.width, h = pitchCanvas.height;
  ctx.clearRect(0, 0, w, h);

  // Striped grass
  const stripeCount = 12;
  const stripeW = w / stripeCount;
  for (let i = 0; i < stripeCount; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2d8a4e' : '#34a058';
    ctx.fillRect(i * stripeW, 0, stripeW, h);
  }

  // Lines
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;

  // Outline
  ctx.strokeRect(px(0.5), py(0.5), px(119), py(79));

  // Center line
  ctx.beginPath();
  ctx.moveTo(px(60), py(0.5));
  ctx.lineTo(px(60), py(79.5));
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(px(60), py(40), px(9.15), 0, Math.PI * 2);
  ctx.stroke();

  // Center spot
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(px(60), py(40), 3, 0, Math.PI * 2);
  ctx.fill();

  // Penalty areas
  // Left
  ctx.strokeRect(px(0.5), py(18), px(16.5), py(44));
  ctx.strokeRect(px(0.5), py(30), px(5.5), py(20));
  // Right
  ctx.strokeRect(px(103), py(18), px(16.5), py(44));
  ctx.strokeRect(px(114), py(30), px(5.5), py(20));

  // Penalty spots
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(px(12), py(40), 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px(108), py(40), 3, 0, Math.PI * 2);
  ctx.fill();

  // Penalty arcs
  ctx.beginPath();
  ctx.arc(px(12), py(40), px(9.15), -0.7, 0.7);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(px(108), py(40), px(9.15), Math.PI - 0.7, Math.PI + 0.7);
  ctx.stroke();

  // Corner arcs
  const cornerR = px(1.5);
  ctx.beginPath(); ctx.arc(px(0.5), py(0.5), cornerR, 0, Math.PI / 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px(119.5), py(0.5), cornerR, Math.PI / 2, Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(px(119.5), py(79.5), cornerR, Math.PI, Math.PI * 1.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(px(0.5), py(79.5), cornerR, Math.PI * 1.5, Math.PI * 2); ctx.stroke();

  // Goals
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 3;
  ctx.strokeRect(px(-2), py(36), px(2.5), py(8));
  ctx.strokeRect(px(119.5), py(36), px(2.5), py(8));
  ctx.lineWidth = 2;
}

function drawBall(x, y) {
  const ctx = pitchCtx;
  const bx = px(x), by = py(y);

  // Glow
  const glow = ctx.createRadialGradient(bx, by, 2, bx, by, 18);
  glow.addColorStop(0, 'rgba(255,255,255,0.5)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(bx, by, 22, 0, Math.PI * 2);
  ctx.fill();

  // Ball
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(bx, by, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawPlayers(players) {
  const ctx = pitchCtx;
  const r = Math.max(14, scaleX * 2.0); // player circle radius

  players.forEach(p => {
    const x = px(p.x), y = py(p.y);
    const isHome = p.teammate;

    // Player circle
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (p.keeper) {
      ctx.fillStyle = isHome ? 'rgba(245,220,50,0.9)' : 'rgba(50,220,100,0.9)';
    } else {
      ctx.fillStyle = isHome ? 'rgba(91,163,245,0.9)' : 'rgba(245,166,35,0.9)';
    }
    ctx.fill();
    ctx.strokeStyle = isHome ? '#2a5eb0' : '#b0721a';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Actor highlight ring (ball carrier)
    if (p.actor) {
      ctx.beginPath();
      ctx.arc(x, y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Jersey number
    if (p.jersey) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(9, r * 0.85)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.jersey, x, y + 0.5);
    }
  });
}

// ═══════════════════════════════════════════════════════════
// PROCESS EVENTS
// ═══════════════════════════════════════════════════════════
function parseTimestamp(ts) {
  // "00:12:34.567" -> seconds within period
  const parts = ts.split(':');
  return parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
}

function eventToMatchSeconds(ev) {
  const periodOffset = ev.period === 1 ? 0 : ev.period === 2 ? 2700 : ev.period === 3 ? 5400 : ev.period === 4 ? 6300 : 7200;
  return periodOffset + parseTimestamp(ev.timestamp);
}

function processEvents(events) {
  // Sort by index
  events.sort((a, b) => a.index - b.index);

  // Extract animation events (with locations)
  // Normalize ALL coordinates to screen space:
  //   Home team attacks RIGHT (x=120) in period 1/3
  //   Home team attacks LEFT in period 2/4
  // StatsBomb always has attacking team toward x=120
  // So we flip when: (isHomeTeam XOR isFirstHalf) is false
  //   P1 home: no flip | P1 away: flip | P2 home: flip | P2 away: no flip
  animEvents = events.filter(e => e.location).map(e => {
    let endLoc = null;
    if (e.pass && e.pass.end_location) endLoc = e.pass.end_location;
    else if (e.carry && e.carry.end_location) endLoc = e.carry.end_location;
    else if (e.shot && e.shot.end_location) endLoc = e.shot.end_location;

    const isHome = e.team && e.team.id === homeId;
    const isSecondHalf = e.period === 2 || e.period === 4;
    const shouldFlip = isHome === isSecondHalf; // flip when both true or both false... actually:
    // P1 home: isHome=T, isSecondHalf=F → T===F → false → no flip ✓
    // P1 away: isHome=F, isSecondHalf=F → F===F → true → flip ✓
    // P2 home: isHome=T, isSecondHalf=T → T===T → true → flip ✓
    // P2 away: isHome=F, isSecondHalf=T → F===T → false → no flip ✓

    let sx = e.location[0], sy = e.location[1];
    let sex = endLoc ? endLoc[0] : null, sey = endLoc ? endLoc[1] : null;
    if (shouldFlip) {
      sx = 120 - sx; sy = 80 - sy;
      if (sex !== null) { sex = 120 - sex; sey = 80 - sey; }
    }

    return {
      id: e.id,
      index: e.index,
      type: e.type.name,
      typeId: e.type.id,
      period: e.period,
      timestamp: e.timestamp,
      matchSeconds: eventToMatchSeconds(e),
      minute: e.minute,
      second: e.second,
      team: e.team ? e.team.name : '',
      teamId: e.team ? e.team.id : 0,
      player: e.player ? e.player.name : '',
      playerId: e.player ? e.player.id : 0,
      x: sx,
      y: sy,
      endX: sex,
      endY: sey,
      shouldFlip: shouldFlip,
      possession_team: e.possession_team ? e.possession_team.name : '',
      duration: e.duration || 0.5,
      raw: e
    };
  });

  // Max match seconds
  if (animEvents.length > 0) {
    maxMatchSeconds = animEvents[animEvents.length - 1].matchSeconds + 1;
  }

  // Extract goals
  goalEvents = events.filter(e => e.shot && e.shot.outcome && e.shot.outcome.name === 'Goal')
    .map(e => ({
      minute: e.minute,
      team: e.team.name,
      teamId: e.team.id,
      player: e.player.name,
      matchSeconds: eventToMatchSeconds(e)
    }));

  // Extract cards
  cardEvents = [];
  events.forEach(e => {
    if (e.foul_committed && e.foul_committed.card) {
      cardEvents.push({
        minute: e.minute,
        team: e.team.name,
        teamId: e.team.id,
        player: e.player.name,
        card: e.foul_committed.card.name,
        matchSeconds: eventToMatchSeconds(e)
      });
    }
    if (e.bad_behaviour && e.bad_behaviour.card) {
      cardEvents.push({
        minute: e.minute,
        team: e.team.name,
        teamId: e.team.id,
        player: e.player.name,
        card: e.bad_behaviour.card.name,
        matchSeconds: eventToMatchSeconds(e)
      });
    }
  });

  // Calculate stats
  computeStats(events);
  computeMomentum(events);
}

function computeStats(events) {
  const s = {
    home: { possession: 0, attacks: 0, dangerousAttacks: 0, shots: 0, shotsOnTarget: 0, shotsOff: 0, corners: 0, fouls: 0, yellowCards: 0, redCards: 0 },
    away: { possession: 0, attacks: 0, dangerousAttacks: 0, shots: 0, shotsOnTarget: 0, shotsOff: 0, corners: 0, fouls: 0, yellowCards: 0, redCards: 0 }
  };

  // Possession: count events per team
  let homeCount = 0, awayCount = 0;
  events.forEach(e => {
    if (!e.team) return;
    const side = e.team.id === homeId ? 'home' : 'away';
    if (e.team.id === homeId) homeCount++; else awayCount++;

    if (e.type.name === 'Shot') {
      s[side].shots++;
      if (e.shot) {
        const outcome = e.shot.outcome ? e.shot.outcome.name : '';
        if (outcome === 'Goal' || outcome === 'Saved' || outcome === 'Saved To Post') s[side].shotsOnTarget++;
        else s[side].shotsOff++;
      }
    }
    if (e.type.name === 'Pass' && e.pass && e.pass.type && e.pass.type.name === 'Corner') {
      s[side].corners++;
    }
    if (e.type.name === 'Foul Committed') {
      s[side].fouls++;
    }

    // Attacks: possession sequences entering final third
    if (e.location && e.location[0] > 60) {
      s[side].attacks++;
      if (e.location[0] > 80) s[side].dangerousAttacks++;
    }
  });

  // Cards
  cardEvents.forEach(c => {
    const side = c.teamId === homeId ? 'home' : 'away';
    if (c.card.includes('Yellow')) s[side].yellowCards++;
    if (c.card.includes('Red')) s[side].redCards++;
  });

  const total = homeCount + awayCount || 1;
  s.home.possession = Math.round((homeCount / total) * 100);
  s.away.possession = 100 - s.home.possession;

  stats = s;
}

function computeMomentum(events) {
  // Every 5 minutes, count events per team
  momentumData = [];
  const bucketSize = 300; // 5 min in seconds
  const buckets = Math.ceil(maxMatchSeconds / bucketSize);
  for (let i = 0; i < buckets; i++) {
    const from = i * bucketSize;
    const to = from + bucketSize;
    let h = 0, a = 0;
    animEvents.forEach(e => {
      if (e.matchSeconds >= from && e.matchSeconds < to) {
        if (e.teamId === homeId) h++;
        else a++;
      }
    });
    const total = h + a || 1;
    momentumData.push({ home: h / total, away: a / total });
  }
}

function renderTimeline() {
