*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06060f;font-family:'Noto Serif TC',serif}
#game-canvas{display:block;width:100%;height:100%}
/* Setup overlay */
#setup-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(6,6,15,.95);
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
#setup-overlay.active{display:flex}
.setup-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.25);border-radius:20px;
  padding:40px;max-width:540px;width:100%;
}
.setup-title{
  font-family:'Cinzel Decorative',serif;font-size:1.4rem;
  color:#c9a84c;text-align:center;margin-bottom:6px;
}
.setup-subtitle{font-size:.8rem;color:rgba(240,232,216,.55);text-align:center;letter-spacing:.2em;margin-bottom:32px}
.setup-flag{font-size:40px;text-align:center;margin-bottom:8px}
.player-count-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.count-btn{
  width:52px;height:52px;border-radius:50%;border:2px solid rgba(201,168,76,.25);
  background:transparent;color:rgba(240,232,216,.55);font-size:1.2rem;
  cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif;
}
.count-btn:hover{border-color:#c9a84c;color:#c9a84c}
.count-btn.selected{background:#c9a84c;border-color:#c9a84c;color:#1a1000;font-weight:700}
.player-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.player-input-row{display:flex;align-items:center;gap:10px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.player-input-row input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.25);
  border-radius:8px;padding:10px 14px;color:#f0e8d8;
  font-family:'Noto Serif TC',serif;font-size:.9rem;
  transition:border-color .2s;outline:none;
}
.player-input-row input:focus{border-color:#c9a84c}
.ai-badge{
  font-size:.7rem;padding:4px 8px;border-radius:20px;
  background:rgba(255,255,255,.08);color:rgba(240,232,216,.55);
  border:1px solid rgba(201,168,76,.25);cursor:pointer;white-space:nowrap;transition:all .2s;
}
.ai-badge.ai-on{background:rgba(201,168,76,.2);color:#c9a84c;border-color:rgba(201,168,76,.3)}
.btn{
  padding:12px 24px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;
  transition:all .2s;letter-spacing:.05em;
}
.btn-gold{
  background:linear-gradient(135deg,#c9a84c,#f0d060,#c9a84c);
  color:#1a1000;width:100%;
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.35)}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.25);color:rgba(240,232,216,.55)}
.btn-outline:hover{border-color:#c9a84c;color:#c9a84c}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;color:rgba(240,232,216,.55);cursor:pointer;
  font-family:'Noto Serif TC',serif;font-size:.85rem;
  transition:color .2s;margin-top:16px;text-align:center;width:100%;justify-content:center;
}
.back-link:hover{color:#c9a84c}
</style>

// ║              TWEEN ENGINE                        ║
// ╚══════════════════════════════════════════════════╝
const tweens=[];
function tween(obj,props,dur,ease){
  return new Promise(resolve=>{
    const start={};
    for(const k in props){
      // 支援巢狀屬性如 scale.x
      if(k.includes('.')){
        const [p,c]=k.split('.');
        start[k]=obj[p][c];
      } else {
        start[k]=obj[k]!=null?obj[k]:0;
      }
    }
    const t={obj,props,start,dur,elapsed:0,ease:ease||easeOutCubic,resolve};
    tweens.push(t);
  });
}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){const c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}
function easeInOutQuad(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function updateTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){
    const t=tweens[i];
    t.elapsed+=dt;
    const p=Math.min(t.elapsed/t.dur,1);
    const ep=t.ease(p);
    for(const k in t.props){
      const val=t.start[k]+(t.props[k]-t.start[k])*ep;
      if(k.includes('.')){
        const [pk,ck]=k.split('.');
        t.obj[pk][ck]=val;
      } else {
        t.obj[k]=val;
      }
    }
    if(p>=1){tweens.splice(i,1);t.resolve();}
  }
}

async function initPixi(){
  // 等待字體
  await document.fonts.load('16px "Noto Serif TC"');
  await document.fonts.load('16px "Cinzel Decorative"');

  app = new PIXI.Application();
  await app.init({
    canvas: document.getElementById('game-canvas'),
    resizeTo: window,
    antialias: true,
    resolution: Math.min(window.devicePixelRatio, 2),
    autoDensity: true,
    backgroundColor: DARK_BG,
  });

  rootContainer = new PIXI.Container();
  app.stage.addChild(rootContainer);

  // 使用 setInterval 驅動 tween 引擎（確保在所有環境中運作）
  let lastTweenTime=performance.now();
  setInterval(()=>{
    const now=performance.now();
    const dt=now-lastTweenTime;
    lastTweenTime=now;
    if(tweens.length>0) updateTweens(dt);
  },16);

  showWelcomeScreen();
  window.addEventListener('resize', onResize);
  onResize();
}

function onResize(){
  if(welcomeScene && welcomeScene.parent) layoutWelcome();
  if(gameScene && gameScene.parent) layoutGame();
}

function layoutWelcome(){
  if(!welcomeScene) return;
  const w=app.screen.width, h=app.screen.height;
  const sc=welcomeScene;
  const isPortrait=w<h;
  const cardW=isPortrait?Math.min(160,(w-60)/2):180;
  const cardH=cardW*1.44;
  const cols=isPortrait?2:4;
  const gap=isPortrait?16:20;
  const totalW=cols*cardW+(cols-1)*gap;
  const startX=(w-totalW)/2;

  // 標題位置
  const topY = isPortrait ? h*0.06 : h*0.08;
  sc._kicker.x=w/2; sc._kicker.y=topY;
  sc._title.x=w/2; sc._title.y=topY+30;
  sc._title.style.fontSize=isPortrait?36:52;
  sc._sub.x=w/2; sc._sub.y=topY+(isPortrait?76:100);
  sc._divider.x=w/2; sc._divider.y=topY+(isPortrait?100:130);

  const cardsY=topY+(isPortrait?130:170);
  sc._cards.forEach((card,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    // 重繪卡片大小
    const bg=card.getChildAt(0);
    const ov=card.getChildAt(1);
    bg.clear();bg.roundRect(0,0,cardW,cardH,16);
    const countries=['japan','taiwan','bangkok','korea'];
    const cc={japan:[0x5a0025,0xc0392b],taiwan:[0x004535,0x16a085],bangkok:[0x5a3400,0xe67e22],korea:[0x001848,0x2980b9]};
    bg.fill({color:cc[countries[i]][0]});
    ov.clear();ov.roundRect(0,cardH*0.4,cardW,cardH*0.6,16);
    ov.fill({color:cc[countries[i]][1],alpha:0.5});

    // 文字位置
    card.getChildAt(2).x=cardW/2;card.getChildAt(2).y=cardH*0.32;card.getChildAt(2).style.fontSize=isPortrait?36:48;
    card.getChildAt(3).x=cardW/2;card.getChildAt(3).y=cardH*0.55;card.getChildAt(3).style.fontSize=isPortrait?22:28;
    card.getChildAt(4).x=cardW/2;card.getChildAt(4).y=cardH*0.67;

    card.x=startX+col*(cardW+gap);
    card.y=cardsY+row*(cardH+gap);
    card.scale.set(1);
  });
}

function spaceToGrid(idx){
  if(idx===0) return [10,10];
  if(idx<=9)  return [10,10-idx];
  if(idx===10)return [10,0];
  if(idx<=19) return [10-(idx-10),0];
  if(idx===20)return [0,0];
  if(idx<=29) return [0,idx-20];
  if(idx===30)return [0,10];
  if(idx<=39) return [idx-30,10];
  return [0,0];
}

function cellPixelPos(idx){
  const [r,c]=spaceToGrid(idx);
  let x=0,y=0;
  for(let i=0;i<c;i++) x+=COL_W[i];
  for(let i=0;i<r;i++) y+=ROW_H[i];
  return {x,y,w:COL_W[c],h:ROW_H[r]};
}

function cellCenter(idx){
  const p=cellPixelPos(idx);
  return {x:p.x+p.w/2, y:p.y+p.h/2};
}

function hexToNum(hex){
  if(typeof hex==='number') return hex;
  return parseInt(hex.replace('#',''),16);
}

function showGameScreen(){

}

function layoutGame(){
  if(!gameScene) return;
  const w=app.screen.width, h=app.screen.height;
  const isPortrait=w<h;

  if(isPortrait){
    // 直向：棋盤上方，控制面板下方
    const scale=Math.min((w-20)/boardSize,(h*0.55)/boardSize);
    boardContainer.scale.set(scale);
    boardContainer.x=(w-boardSize*scale)/2;
    boardContainer.y=10;
    tokenLayer.scale.set(scale);
    tokenLayer.x=boardContainer.x;
    tokenLayer.y=boardContainer.y;
    // 側邊欄在棋盤下方
    const sideY=boardSize*scale+20;
    sidebarContainer.x=10;
    sidebarContainer.y=sideY;
    renderSidebar(w-20,h-sideY-10,true);
  } else {
    // 橫向：棋盤左側，側邊欄右側
    const sideW=Math.min(300,w*0.3);
    const boardAvail=w-sideW-30;
    const scale=Math.min(boardAvail/boardSize,(h-20)/boardSize);
    boardContainer.scale.set(scale);
    boardContainer.x=10;
    boardContainer.y=(h-boardSize*scale)/2;
    tokenLayer.scale.set(scale);
    tokenLayer.x=boardContainer.x;
    tokenLayer.y=boardContainer.y;
    sidebarContainer.x=boardSize*scale+20;
    sidebarContainer.y=10;
    renderSidebar(sideW,h-20,false);
  }
}

function renderBoard(){
  boardContainer.removeChildren();
  cellContainers=[];
  const meta=COUNTRY_META[G.country];

  // 棋盤底色
  const boardBg=new PIXI.Graphics();
  boardBg.rect(0,0,boardSize,boardSize).fill(BOARD_BG);
  boardContainer.addChild(boardBg);

  // 中心區域
  const centerX=COL_W[0], centerY=ROW_H[0];
  const centerW=boardSize-COL_W[0]-COL_W[10];
  const centerH=boardSize-ROW_H[0]-ROW_H[10];
  const center=new PIXI.Container();
  const centerBg=new PIXI.Graphics();
  centerBg.rect(0,0,centerW,centerH).fill({color:meta.cc});
  center.addChild(centerBg);

  // 中心裝飾
  const decoText=new PIXI.Text({text:meta.center,style:{fontSize:50}});
  decoText.anchor.set(0.5);decoText.x=centerW/2;decoText.y=centerH*0.35;
  center.addChild(decoText);

  const countryName=new PIXI.Text({text:meta.name,style:{
    fontFamily:'Cinzel Decorative',fontSize:32,fontWeight:'bold',
    fill:hexToNum(meta.accent),
  }});
  countryName.anchor.set(0.5);countryName.x=centerW/2;countryName.y=centerH*0.55;
  center.addChild(countryName);

  const subtitle=new PIXI.Text({text:meta.en+' Monopoly',style:{
    fontFamily:'Playfair Display',fontStyle:'italic',fontSize:14,
    fill:0x888888, letterSpacing:4,
  }});
  subtitle.anchor.set(0.5);subtitle.x=centerW/2;subtitle.y=centerH*0.68;
  center.addChild(subtitle);

  center.x=centerX;center.y=centerY;
  boardContainer.addChild(center);

  // 繪製每個格子
  G.spaces.forEach(s=>{
    const [r,c]=spaceToGrid(s.id);
    const pos=cellPixelPos(s.id);
    const cell=new PIXI.Container();
    cell.x=pos.x;cell.y=pos.y;
    cell._spaceId=s.id;

    // 格子底色
    const bg=new PIXI.Graphics();
    let bgColor=BOARD_BG;
    if(s.type==='chance') bgColor=0xfff9e6;
    else if(s.type==='comm') bgColor=0xebf5fb;
    else if(s.type==='tax') bgColor=0xfef9f9;
    bg.rect(0,0,pos.w,pos.h).fill(bgColor);
    bg.rect(0,0,pos.w,pos.h).stroke({color:0xc8bfa0,width:0.5});
    cell.addChild(bg);

    // 色帶
    if(s.group && (s.type==='prop'||s.type==='rr'||s.type==='util')){
      const band=new PIXI.Graphics();
      const bColor=hexToNum(GROUPS[s.group].hex);
      const bSize=22;
      if(r===10&&c>0&&c<10){band.rect(0,0,pos.w,bSize).fill(bColor);}
      else if(c===0&&r>0&&r<10){band.rect(pos.w-bSize,0,bSize,pos.h).fill(bColor);}
      else if(r===0&&c>0&&c<10){band.rect(0,pos.h-bSize,pos.w,bSize).fill(bColor);}
      else if(c===10&&r>0&&r<10){band.rect(0,0,bSize,pos.h).fill(bColor);}
      cell.addChild(band);
    }

    // 文字內容
    if(s.type==='go'){
      drawCornerCell(cell,pos,'▶','出發點','領取$200','#2ecc71');
    } else if(s.type==='jail'){
      drawCornerCell(cell,pos,'⛓','監獄','僅經過','#95a5a6');
    } else if(s.type==='free'){
      drawCornerCell(cell,pos,'🅿','免費停車','','#3498db');
    } else if(s.type==='gotojail'){
      drawCornerCell(cell,pos,'🚔','前往監獄','','#c0392b');
    } else if(s.type==='prop'||s.type==='rr'||s.type==='util'){
      drawPropertyCell(cell,s,r,c,pos);
      cell.eventMode='static';cell.cursor='pointer';
      cell.on('pointertap',()=>showPropInfo(s.id));
    } else if(s.type==='chance'){
      drawSpecialCell(cell,s,r,c,pos,'?',0xe67e22);
    } else if(s.type==='comm'){
      drawSpecialCell(cell,s,r,c,pos,'📦',0x2980b9);
    } else if(s.type==='tax'){
      drawSpecialCell(cell,s,r,c,pos,s.id===4?'📋':'💎',0xc0392b);
    }

    boardContainer.addChild(cell);
    cellContainers[s.id]=cell;
  });

  // 金色邊框
  const border=new PIXI.Graphics();
  border.rect(0,0,boardSize,boardSize).stroke({color:GOLD,width:3});
  boardContainer.addChild(border);
}

function drawCornerCell(cell,pos,icon,label,sub,color){
  const iconText=new PIXI.Text({text:icon,style:{fontSize:24}});
  iconText.anchor.set(0.5);iconText.x=pos.w/2;iconText.y=pos.h*0.35;
  cell.addChild(iconText);

  const labelText=new PIXI.Text({text:label,style:{
    fontFamily:'Noto Serif TC',fontSize:10,fontWeight:'bold',
    fill:0x2a2218,align:'center',
  }});
  labelText.anchor.set(0.5);labelText.x=pos.w/2;labelText.y=pos.h*0.6;
  cell.addChild(labelText);

  if(sub){
    const subText=new PIXI.Text({text:sub,style:{
      fontFamily:'Noto Serif TC',fontSize:7,fill:hexToNum(color),
    }});
    subText.anchor.set(0.5);subText.x=pos.w/2;subText.y=pos.h*0.78;
    cell.addChild(subText);
  }
}

function drawPropertyCell(cell,s,r,c,pos){
  const isVert=(c===0||c===10)&&r>0&&r<10;
  const inner=new PIXI.Container();

  const nameText=new PIXI.Text({text:s.name.replace('\n',' '),style:{
    fontFamily:'Noto Serif TC',fontSize:isVert?7:8,fontWeight:'bold',
    fill:0x2a2218,align:'center',wordWrap:true,wordWrapWidth:isVert?pos.h-28:pos.w-6,
  }});
  nameText.anchor.set(0.5);

  const priceText=new PIXI.Text({text:s.price?`$${s.price}`:'',style:{
    fontFamily:'Noto Serif TC',fontSize:6.5,fill:0x7a6a50,
  }});
  priceText.anchor.set(0.5);

  if(isVert){
    // 旋轉文字
    const rot=c===0?Math.PI/2:-Math.PI/2;
    inner.rotation=rot;
    inner.x=pos.w/2;inner.y=pos.h/2;
    nameText.x=0;nameText.y=-6;
    priceText.x=0;priceText.y=6;
  } else {
    inner.x=pos.w/2;inner.y=pos.h/2;
    // 底部行：文字在色帶下面
    if(r===10){
      nameText.x=0;nameText.y=4;
      priceText.x=0;priceText.y=16;
    } else {
      nameText.x=0;nameText.y=-8;
      priceText.x=0;priceText.y=4;
    }
  }

  inner.addChild(nameText,priceText);
  cell.addChild(inner);

  // 建築容器
  const bldContainer=new PIXI.Container();
  bldContainer.label='buildings';
  cell.addChild(bldContainer);

  // 擁有者圓點容器
  const ownerDot=new PIXI.Graphics();
  ownerDot.label='ownerDot';
  ownerDot.visible=false;
  cell.addChild(ownerDot);
}

function drawSpecialCell(cell,s,r,c,pos,icon,color){
  const isVert=(c===0||c===10)&&r>0&&r<10;
  const inner=new PIXI.Container();

  const iconText=new PIXI.Text({text:icon,style:{fontSize:14}});
  iconText.anchor.set(0.5);

  const nameText=new PIXI.Text({text:s.name,style:{
    fontFamily:'Noto Serif TC',fontSize:7.5,fontWeight:'bold',fill:color,
  }});
  nameText.anchor.set(0.5);

  if(s.type==='tax'){
    const priceText=new PIXI.Text({text:s.id===4?'$200':'$75',style:{
      fontFamily:'Noto Serif TC',fontSize:6.5,fill:0x7a6a50,
    }});
    priceText.anchor.set(0.5);
    priceText.y=12;
    inner.addChild(priceText);
  }

  if(isVert){
    const rot=c===0?Math.PI/2:-Math.PI/2;
    inner.rotation=rot;
    inner.x=pos.w/2;inner.y=pos.h/2;
    iconText.y=-8;nameText.y=6;
  } else {
    inner.x=pos.w/2;inner.y=pos.h/2;
    iconText.y=-8;nameText.y=6;
  }

  inner.addChild(iconText,nameText);
  cell.addChild(inner);
}

function updateBuildings(){
  if(!G) return;
  G.spaces.forEach(s=>{
    const cell=cellContainers[s.id];
    if(!cell) return;

    // 更新建築
    const bld=cell.children.find(c=>c.label==='buildings');
    if(bld){
      bld.removeChildren();
      if(s.type==='prop'&&s.buildings>0){
        const [r,c]=spaceToGrid(s.id);
        const pos=cellPixelPos(s.id);
        for(let i=0;i<(s.buildings===5?1:s.buildings);i++){
          const b=new PIXI.Graphics();
          if(s.buildings===5){
            b.rect(0,0,12,8).fill(0xc0392b);
          } else {
            b.rect(0,0,7,6).fill(0x1a7a1a);
          }
          b.x=pos.w/2-((s.buildings===5?1:s.buildings)*9)/2+i*9;
          b.y=r===10?pos.h-10:r===0?2:(c===0?pos.w-10:2);
          bld.addChild(b);
        }
      }
    }

    // 更新擁有者圓點
    const dot=cell.children.find(c=>c.label==='ownerDot');
    if(dot){
      dot.clear();
      if(s.owner!==null){
        const pos=cellPixelPos(s.id);
        dot.circle(pos.w-6,pos.h-6,4).fill(hexToNum(G.players[s.owner].color));
        dot.circle(pos.w-6,pos.h-6,4).stroke({color:0xffffff,width:0.5});
        dot.visible=true;
      } else {
        dot.visible=false;
      }
    }
  });
}

function updateTokens(animate=false){
  if(!G) return;
  tokenLayer.removeChildren();
  tokenSprites=[];

  const byPos={};
  G.players.forEach(p=>{
    if(!p.bankrupt){
      if(!byPos[p.position])byPos[p.position]=[];
      byPos[p.position].push(p);
    }
  });

  G.players.forEach(p=>{
    if(p.bankrupt) return;
    const {x,y}=cellCenter(p.position);
    const slot=byPos[p.position].indexOf(p);
    const offsets=[[-6,-6],[6,-6],[-6,6],[6,6]];
    const [ox,oy]=offsets[slot]||[0,0];

    const tok=new PIXI.Container();
    const circle=new PIXI.Graphics();
    circle.circle(0,0,12).fill(hexToNum(p.color));
    circle.circle(0,0,12).stroke({color:0xffffff,width:2});
    tok.addChild(circle);

    const avatar=new PIXI.Text({text:p.avatar,style:{fontSize:12}});
    avatar.anchor.set(0.5);avatar.y=-1;
    tok.addChild(avatar);

    tok.x=x+ox;tok.y=y+oy;
    tok._playerId=p.id;
    tokenLayer.addChild(tok);
    tokenSprites[p.id]=tok;
  });
}

async function animateTokenMove(player,oldPos,newPos){
  const tok=tokenSprites[player.id];
  if(!tok) return;

  // 先把代幣放回舊位置
  const startPos=cellCenter(oldPos);
  tok.x=startPos.x;tok.y=startPos.y;

  // 計算路徑，逐格移動
  const numSteps=((newPos-oldPos)+40)%40;
  for(let i=1;i<=numSteps;i++){
    const p=(oldPos+i)%40;
    const {x,y}=cellCenter(p);
    await tween(tok,{x,y},80,easeOutCubic);
    // 每步檢查 tok 是否仍在顯示列表中
    if(!tok.parent) return;
  }
}

function drawDice(container,d1,d2){
  container.removeChildren();
  const dieSize=46;
  [-30,30].forEach((ox,i)=>{
    const val=i===0?d1:d2;
    const die=new PIXI.Container();
    const bg=new PIXI.Graphics();
    bg.roundRect(-dieSize/2,-dieSize/2,dieSize,dieSize,8).fill(0xffffff);
    bg.roundRect(-dieSize/2,-dieSize/2,dieSize,dieSize,8).stroke({color:0xcccccc,width:1});
    die.addChild(bg);

    // 畫點
    const dotR=4;
    const dotPositions={
      1:[[0,0]],
      2:[[-10,-10],[10,10]],
      3:[[-10,-10],[0,0],[10,10]],
      4:[[-10,-10],[10,-10],[-10,10],[10,10]],
      5:[[-10,-10],[10,-10],[0,0],[-10,10],[10,10]],
      6:[[-10,-10],[10,-10],[-10,0],[10,0],[-10,10],[10,10]],
    };
    const dots=new PIXI.Graphics();
    (dotPositions[val]||dotPositions[1]).forEach(([dx,dy])=>{
      dots.circle(dx,dy,dotR).fill(0x222222);
    });
    die.addChild(dots);
    die.x=ox;
    container.addChild(die);
  });
}

function createButton(text,w,h,bgColor,textColor,onClick){
  const btn=new PIXI.Container();
  btn.eventMode='static';btn.cursor='pointer';

  const bg=new PIXI.Graphics();
  bg.roundRect(0,0,w,h,8).fill(bgColor);
  btn.addChild(bg);

  const label=new PIXI.Text({text,style:{
    fontFamily:'Noto Serif TC',fontSize:14,fontWeight:'bold',fill:textColor,
  }});
  label.anchor.set(0.5);label.x=w/2;label.y=h/2;
  btn.addChild(label);

  btn.on('pointerover',()=>{bg.alpha=0.8;});
  btn.on('pointerout',()=>{bg.alpha=1;});
  btn.on('pointertap',onClick);

  return btn;
}

let isRolling=false, isMoving=false;
async function doRoll(){
  if(G.phase!=='roll'||isRolling||isMoving) return;
  const cur=G.players[G.current];
  if(cur.bankrupt){doEndTurn();return;}
  isRolling=true;

  const d1=1+Math.floor(Math.random()*6);
  const d2=1+Math.floor(Math.random()*6);

  // 骰子動畫：用 tween 做震動效果
  const dc=sidebarElements.diceContainer;
  if(dc){
    for(let i=0;i<8;i++){
      drawDice(dc,1+Math.floor(Math.random()*6),1+Math.floor(Math.random()*6));
      await tween(dc,{'scale.x':0.95+Math.random()*0.1,'scale.y':0.95+Math.random()*0.1},60);
    }
    dc.scale.set(1);
    drawDice(dc,d1,d2);
  }

  G.dice=[d1,d2];
  G.doublesRolled=(d1===d2);
  isRolling=false;
  refreshSidebar();
  afterRoll(d1,d2);
}

function afterRoll(d1,d2){
  const cur=G.players[G.current];
  const total=d1+d2;

  if(cur.inJail){
    if(G.doublesRolled){
      cur.inJail=false;cur.jailTurns=0;
      addLog(`${cur.name} 擲出雙胞胎，出獄了！`,'good');
    } else {
      cur.jailTurns++;
      if(cur.jailTurns>=3){
        cur.inJail=false;cur.jailTurns=0;
        addLog(`${cur.name} 服滿刑期，繳 $50 出獄。`,'warn');
        cur.money-=50;
      } else {
        addLog(`${cur.name} 在監獄裡（第${cur.jailTurns}回合）。`);
        G.phase='post';renderSidebar();autoAIEndTurn();return;
      }
    }
  }

  if(G.doublesRolled){
    cur.doublesCount=(cur.doublesCount||0)+1;
    if(cur.doublesCount>=3){
      addLog(`${cur.name} 連擲三次雙胞胎，進監獄！`,'warn');
      goToJailDirect();return;
    }
  } else {cur.doublesCount=0;}

  movePlayer(cur,total);
}

async function movePlayer(player,steps){
  isMoving=true;
  const oldPos=player.position;
  let newPos=(player.position+steps)%40;
  if(newPos<oldPos||(oldPos+steps>=40)){
    player.money+=200;
    addLog(`${player.name} 經過出發點，領取 $200！`,'good');
  }
  player.position=newPos;
  updateTokens();

  // 代幣移動動畫
  try{
    await animateTokenMove(player,oldPos,newPos);
  }catch(e){}
  updateTokens();
  isMoving=false;
  landOn(player);
}

function landOn(player){
  const space=G.spaces[player.position];
  addLog(`${player.name} 停在 【${space.name}】`);

  switch(space.type){
    case 'go': G.phase='post';renderSidebar();autoAIEndTurn();break;
    case 'jail': G.phase='post';renderSidebar();autoAIEndTurn();break;
    case 'free': G.phase='post';renderSidebar();autoAIEndTurn();break;
    case 'gotojail': goToJailDirect();break;
    case 'tax':
      const amt=space.id===4?200:75;
      player.money-=amt;
      addLog(`${player.name} 繳稅 $${amt}。`,'warn');
      checkBankrupt(player);
      G.phase='post';renderSidebar();autoAIEndTurn();break;
    case 'chance': drawCard('chance',player);break;
    case 'comm': drawCard('comm',player);break;
    case 'prop':case 'rr':case 'util':
      handlePropertyLand(player,space);break;
    default: G.phase='post';renderSidebar();autoAIEndTurn();
  }
}

// AI 自動結束回合（在設定 phase='post' 後呼叫）
function autoAIEndTurn(){
  if(G.phase==='post'&&G.players[G.current].isAI){
    setTimeout(()=>doEndTurn(),600);
  }
}

// ╔══════════════════════════════════════════════════╗
// ║              PROPERTY LOGIC                      ║
// ╚══════════════════════════════════════════════════╝
function handlePropertyLand(player,space){
  if(space.mortgaged){addLog(`${space.name} 已抵押，免收租金。`);G.phase='post';renderSidebar();autoAIEndTurn();return;}
  if(space.owner===null){
    if(player.money>=space.price) promptBuy(player,space);
    else {addLog(`${player.name} 資金不足，無法購買 ${space.name}。`,'warn');G.phase='post';renderSidebar();autoAIEndTurn();}
  } else if(space.owner===player.id){
    addLog(`${player.name} 停在自己的地產上。`);G.phase='post';renderSidebar();autoAIEndTurn();
  } else {
    const owner=G.players[space.owner];
    const rent=calcRent(space,G.dice[0]+G.dice[1]);
    addLog(`${player.name} 向 ${owner.name} 支付租金 $${rent}！`,'warn');
    player.money-=rent;owner.money+=rent;
    showRentModal(player,owner,space,rent);
    checkBankrupt(player);
    G.phase='post';renderSidebar();
    // showRentModal 有 AI 自動關閉功能，會呼叫 doEndTurn
  }
}

function calcRent(space,diceTotal){
  if(space.type==='rr'){
    const ownerRRs=G.spaces.filter(s=>s.type==='rr'&&s.owner===space.owner).length;
    return RR_RENT[ownerRRs-1]||25;
  }
  if(space.type==='util'){
    const ownerUtils=G.spaces.filter(s=>s.type==='util'&&s.owner===space.owner).length;
    return diceTotal*(ownerUtils===2?10:4);
  }
  if(space.type==='prop'){
    if(space.buildings>0) return space.rent[space.buildings];
    const grpSpaces=G.spaces.filter(s=>s.group===space.group);
    const hasMonopoly=grpSpaces.every(s=>s.owner===space.owner);
    return hasMonopoly?space.rent[0]*2:space.rent[0];
  }
  return 0;
}

function promptBuy(player,space){
  if(player.isAI){
    if(player.money>=space.price+200){doBuySpace(player,space);}
    else {addLog(`${player.name}（電腦）決定不購買 ${space.name}。`);G.phase='post';renderSidebar();autoAIEndTurn();}
    return;
  }
  pendingBuy={player,space};
  showBuyModal(player,space);
}

function doBuySpace(player,space){
  player.money-=space.price;
  space.owner=player.id;
  addLog(`${player.name} 購買了 ${space.name}（$${space.price}）！`,'gold');
  updateBuildings();
  G.phase='post';renderSidebar();
  if(player.isAI){
    setTimeout(()=>{aiBuild(player);setTimeout(()=>doEndTurn(),500);},400);
  }
}

// ╔══════════════════════════════════════════════════╗
// ║              BUILDING                            ║
// ╚══════════════════════════════════════════════════╝
function canBuild(player,space){
  if(space.type!=='prop'||space.owner!==player.id||space.mortgaged) return false;
  if(space.buildings>=5) return false;
  const grp=GROUPS[space.group];
  if(!grp||grp.buildCost===0) return false;
  const grpSpaces=G.spaces.filter(s=>s.group===space.group);
  if(!grpSpaces.every(s=>s.owner===player.id)) return false;
  const minBld=Math.min(...grpSpaces.map(s=>s.buildings));
  if(space.buildings>minBld) return false;
  if(player.money<grp.buildCost) return false;
  return true;
}

function aiBuild(player){
  G.spaces.forEach(s=>{
    if(canBuild(player,s)&&player.money>s.price+300){
      const grp=GROUPS[s.group];
      player.money-=grp.buildCost;s.buildings++;
      addLog(`${player.name}（電腦）在 ${s.name} 建造了${s.buildings===5?'旅館':'房屋'}！`,'gold');
      updateBuildings();renderSidebar();
    }
  });
}

function aiBuildCheck(player){
  G.spaces.forEach(s=>{
    if(canBuild(player,s)&&player.money>s.price+400){
      const grp=GROUPS[s.group];
      player.money-=grp.buildCost;s.buildings++;
      addLog(`${player.name} 在 ${s.name} 建造了${s.buildings===5?'旅館':'房屋'}！`,'gold');
      updateBuildings();renderSidebar();
    }
  });
}

function doBuildOn(space){
  const cur=G.players[G.current];
  if(!canBuild(cur,space)) return;
  const grp=GROUPS[space.group];
  cur.money-=grp.buildCost;space.buildings++;
  addLog(`${cur.name} 在 ${space.name} 建造了${space.buildings===5?'旅館':'房屋'}！`,'gold');
  updateBuildings();renderSidebar();
}

function doSellBuilding(space){
  const cur=G.players[G.current];
  if(space.buildings===0) return;
  const grp=GROUPS[space.group];
  cur.money+=Math.floor(grp.buildCost/2);space.buildings--;
  addLog(`${cur.name} 從 ${space.name} 拆除了建築。`);
  updateBuildings();renderSidebar();
}

function showModal(content){
  modalLayer.removeChildren();
  modalLayer.visible=true;

  // 背景遮罩
  const overlay=new PIXI.Graphics();
  overlay.rect(0,0,app.screen.width*2,app.screen.height*2).fill({color:0x000000,alpha:0.8});
  overlay.eventMode='static'; // 阻擋穿透點擊
  modalLayer.addChild(overlay);

  // 彈窗容器
  const box=new PIXI.Container();
  const boxW=340, boxH=content._boxH||380;
  const boxBg=new PIXI.Graphics();
  boxBg.roundRect(0,0,boxW,boxH,16).fill({color:0x141428});
  boxBg.roundRect(0,0,boxW,boxH,16).stroke({color:GOLD,width:1.5});
  box.addChild(boxBg);

  // 添加內容
  content.x=0;content.y=0;
  box.addChild(content);

  // 置中
  box.x=(app.screen.width-boxW)/2;
  box.y=(app.screen.height-boxH)/2;

  // 彈出動畫
  box.scale.set(0.85);box.alpha=0;
  tween(box,{'scale.x':1,'scale.y':1,alpha:1},250,easeOutBack);

  modalLayer.addChild(box);
  modalLayer._box=box;
}

function hideModal(callback){
  if(!modalLayer.visible) {if(callback)callback();return;}
  const box=modalLayer._box;
  if(box){
    tween(box,{'scale.x':0.85,'scale.y':0.85,alpha:0},150,easeInOutQuad).then(()=>{
      modalLayer.visible=false;
      modalLayer.removeChildren();
      if(callback) callback();
    });
  } else {
    modalLayer.visible=false;
    modalLayer.removeChildren();
    if(callback) callback();
  }
}

// ╔══════════════════════════════════════════════════╗
// ║              CARD EFFECTS                        ║
// ╚══════════════════════════════════════════════════╝
function gainMoney(player,amt){player.money+=amt;addLog(`${player.name} 獲得 $${amt}。`,'good');G.phase='post';renderSidebar();autoAIEndTurn();}
function loseMoney(player,amt){player.money-=amt;addLog(`${player.name} 支付 $${amt}。`,'warn');checkBankrupt(player);G.phase='post';renderSidebar();autoAIEndTurn();}
function advanceTo(player,pos,collectGO){
  if(collectGO&&pos<player.position){player.money+=200;addLog(`${player.name} 領取出發點 $200。`,'good');}
  player.position=pos;updateTokens();
  setTimeout(()=>landOn(player),300);
}
function repairTax(player,houseAmt,hotelAmt){
  const houses=G.spaces.filter(s=>s.owner===player.id&&s.buildings>0&&s.buildings<5).reduce((a,s)=>a+s.buildings,0);
  const hotels=G.spaces.filter(s=>s.owner===player.id&&s.buildings===5).length;
  const total=houses*houseAmt+hotels*hotelAmt;
  player.money-=total;
  addLog(`${player.name} 維修費 $${total}（${houses}棟×$${houseAmt} + ${hotels}旅館×$${hotelAmt}）`,'warn');
  checkBankrupt(player);G.phase='post';renderSidebar();autoAIEndTurn();
}
function advanceNearestRR(player){
  const rrPos=[5,15,25,35];
  const next=rrPos.find(p=>p>player.position)||rrPos[0];
  advanceTo(player,next,next<player.position);
}
function advanceNearestUtil(player){
  const uPos=[12,28];
  const next=uPos.find(p=>p>player.position)||uPos[0];
  advanceTo(player,next,next<player.position);
}
function collectFromAll(player,amt){
  G.players.forEach(p=>{
    if(p.id!==player.id&&!p.bankrupt){p.money-=amt;player.money+=amt;}
  });
  addLog(`${player.name} 向每位玩家收取 $${amt}。`,'gold');
  G.phase='post';renderSidebar();autoAIEndTurn();
}
function goToJail(player){goToJailDirect();}

function goToJailDirect(){
  const cur=G.players[G.current];
  cur.position=10;cur.inJail=true;cur.jailTurns=0;cur.doublesCount=0;
  updateTokens();
  addLog(`${cur.name} 進入監獄！`,'warn');
  G.phase='post';renderSidebar();
  autoAIEndTurn();
}

function doBailJail(){
  const cur=G.players[G.current];
  if(!cur.inJail) return;
  cur.money-=50;cur.inJail=false;cur.jailTurns=0;
  addLog(`${cur.name} 繳保釋金 $50 出獄。`);
  renderSidebar();
}

// ╔══════════════════════════════════════════════════╗
// ║              BANKRUPTCY                          ║
// ╚══════════════════════════════════════════════════╝
function checkBankrupt(player){
  if(player.money<0){
    player.bankrupt=true;
    G.spaces.forEach(s=>{if(s.owner===player.id){s.owner=null;s.buildings=0;}});
    addLog(`💸 ${player.name} 破產出局！`,'warn');
    updateBuildings();
    checkWinner();
  }
}

function checkWinner(){
  const active=G.players.filter(p=>!p.bankrupt);
  if(active.length===1){
    const w=active[0];
    showWinnerModal(w);
  }
}

// ╔══════════════════════════════════════════════════╗
// ║              TURN FLOW                           ║
// ╚══════════════════════════════════════════════════╝
function doEndTurn(){
  if(G.phase!=='post') return;
  const cur=G.players[G.current];
  if(!cur.isAI) aiBuildCheck(cur);

  if(G.doublesRolled&&!cur.inJail&&cur.doublesCount>0&&cur.doublesCount<3){
    addLog(`${cur.name} 擲出雙胞胎，再擲一次！`);
    G.phase='roll';renderSidebar();
    if(cur.isAI) setTimeout(()=>doRoll(),800);
    return;
  }

  G.doublesRolled=false;
  let next=(G.current+1)%G.players.length;
  let tries=0;
  while(G.players[next].bankrupt&&tries<G.players.length){next=(next+1)%G.players.length;tries++;}
  if(tries>=G.players.length){checkWinner();return;}
  G.current=next;
  G.phase='roll';
  renderSidebar();
  addLog(`─── ${G.players[G.current].name} 的回合 ───`);
  maybeAI();
}

function maybeAI(){
  const cur=G.players[G.current];
  if(cur.isAI&&!cur.bankrupt){
    setTimeout(()=>doRoll(),900);
  }
}
