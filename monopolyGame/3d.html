<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>亞洲大富翁 3D · Asia Monopoly 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a2a1a;font-family:'Noto Serif TC',serif}
canvas{display:block}

/* 歡迎+設定 overlay */
#welcome-overlay,#setup-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(6,6,15,.95);
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
#welcome-overlay.active,#setup-overlay.active{display:flex}
.welcome-title{font-size:2.5rem;font-weight:700;color:#c9a84c;text-align:center;margin-bottom:8px}
.welcome-sub{font-size:.9rem;color:#888;text-align:center;margin-bottom:40px;letter-spacing:4px}
.country-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:500px;width:100%}
@media(min-width:640px){.country-grid{grid-template-columns:repeat(4,1fr)}}
.country-card{
  height:180px;border-radius:16px;cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.1);transition:all .3s;
}
.country-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.5);border-color:rgba(201,168,76,.5)}
.cc-flag{font-size:40px;margin-bottom:8px}
.cc-name{font-size:1.4rem;font-weight:700;color:#fff}
.cc-en{font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:3px;margin-top:4px}

.setup-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:40px;max-width:540px;width:100%}
.setup-title{font-size:1.4rem;color:#c9a84c;text-align:center;margin-bottom:6px}
.setup-subtitle{font-size:.8rem;color:rgba(240,232,216,.55);text-align:center;letter-spacing:.2em;margin-bottom:32px}
.setup-flag{font-size:40px;text-align:center;margin-bottom:8px}
.player-count-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.count-btn{width:52px;height:52px;border-radius:50%;border:2px solid rgba(201,168,76,.25);background:transparent;color:rgba(240,232,216,.55);font-size:1.2rem;cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif}
.count-btn:hover{border-color:#c9a84c;color:#c9a84c}
.count-btn.selected{background:#c9a84c;border-color:#c9a84c;color:#1a1000;font-weight:700}
.player-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.player-input-row{display:flex;align-items:center;gap:10px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.player-input-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:10px 14px;color:#f0e8d8;font-family:'Noto Serif TC',serif;font-size:.9rem;outline:none}
.player-input-row input:focus{border-color:#c9a84c}
.ai-badge{font-size:.7rem;padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.08);color:rgba(240,232,216,.55);border:1px solid rgba(201,168,76,.25);cursor:pointer;white-space:nowrap;transition:all .2s}
.ai-badge.ai-on{background:rgba(201,168,76,.2);color:#c9a84c;border-color:rgba(201,168,76,.3)}
.btn{padding:12px 24px;border:none;border-radius:10px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;transition:all .2s;letter-spacing:.05em}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#f0d060,#c9a84c);color:#1a1000;width:100%}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.35)}
.back-link{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:rgba(240,232,216,.55);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.85rem;margin-top:16px;text-align:center;width:100%;justify-content:center}
.back-link:hover{color:#c9a84c}

/* 遊戲 UI 覆蓋層 */
#game-ui{display:none;position:fixed;inset:0;z-index:10;pointer-events:none}
#game-ui.active{display:block}
#side-panel{
  position:absolute;right:0;top:0;bottom:0;width:300px;
  background:rgba(10,10,25,.92);border-left:1px solid rgba(201,168,76,.2);
  pointer-events:auto;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
}
@media(max-width:768px){
  #side-panel{right:auto;left:0;right:0;top:auto;bottom:0;width:100%;height:auto;max-height:45vh;
    border-left:none;border-top:1px solid rgba(201,168,76,.2);flex-direction:column}
}
.sp-title{font-size:.7rem;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:6px}
.pcard{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid transparent;margin-bottom:4px}
.pcard.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.2)}
.pcard.bankrupt{opacity:.3;filter:grayscale(1)}
.p-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;border:2px solid rgba(255,255,255,.3)}
.p-info{flex:1;min-width:0}
.p-name{font-size:.75rem;font-weight:600;color:#f0e8d8}
.p-money{font-size:.7rem;color:#c9a84c;font-weight:700}
.p-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.p-badge{font-size:.55rem;padding:1px 5px;border-radius:10px;background:rgba(255,255,255,.07);color:rgba(240,232,216,.55)}
.active-dot{width:6px;height:6px;border-radius:50%;background:#c9a84c;box-shadow:0 0 6px #c9a84c}
.dice-area{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0}
.dice-row{display:flex;gap:12px}
.die-display{width:48px;height:48px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:2px 2px 0 #bbb,0 4px 8px rgba(0,0,0,.3)}
.dice-total{font-size:.9rem;color:#c9a84c;font-weight:700}
.btn-action{padding:10px;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;width:100%;margin-top:4px}
.btn-roll{background:linear-gradient(135deg,#c9a84c,#f0d060);color:#1a1000}
.btn-end{background:rgba(50,50,80,.8);color:#f0e8d8;border:1px solid rgba(201,168,76,.2)}
.btn-bail{background:rgba(50,50,50,.6);color:#aaa;border:1px solid rgba(255,255,255,.1);font-size:.8rem;padding:6px}
#game-log{max-height:140px;overflow-y:auto;font-size:.7rem;background:rgba(0,0,0,.3);border-radius:8px;padding:8px;color:rgba(240,232,216,.55);scrollbar-width:thin}
.log-line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.4}
.log-good{color:#2ecc71}.log-warn{color:#e74c3c}.log-gold{color:#c9a84c}
.btn-menu{background:rgba(30,30,50,.6);color:#888;border:1px solid rgba(255,255,255,.1);padding:6px;font-size:.75rem;width:100%;border-radius:6px;cursor:pointer;font-family:'Noto Serif TC',serif}

/* 彈窗 */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;pointer-events:auto}
#modal-overlay.active{display:flex}
.modal-box{background:linear-gradient(160deg,#141428,#0e0e20);border:1px solid #c9a84c;border-radius:20px;padding:28px;max-width:360px;width:90%;text-align:center;animation:modalpop .25s ease-out}
@keyframes modalpop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.modal-band{height:8px;border-radius:4px;margin-bottom:14px}
.modal-icon{font-size:40px;margin-bottom:10px}
.modal-title{font-size:1.1rem;color:#c9a84c;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:.8rem;color:#888;margin-bottom:16px;line-height:1.5}
.modal-details{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;margin-bottom:16px;text-align:left}
.detail-row{display:flex;justify-content:space-between;font-size:.8rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.detail-row:last-child{border-bottom:none}
.detail-label{color:#888}.detail-val{color:#f0e8d8;font-weight:600}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns .btn{padding:10px 20px;font-size:.85rem}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.25);color:rgba(240,232,216,.55)}
.btn-red{background:#c0392b;color:#fff}
.card-header{border-radius:8px;padding:8px;margin-bottom:12px;color:#fff;font-weight:700;font-size:.9rem;text-align:center}
.card-body{background:rgba(0,0,0,.2);border-radius:8px;padding:14px;margin:14px 0;font-size:.95rem;line-height:1.6;color:#f0e8d8;text-align:center}
</style>
</head>
<body>

<!-- 歡迎畫面 -->
<div id="welcome-overlay" class="active">

  <div class="welcome-sub">選擇你的旅程 · Choose Your Journey</div>
  <div class="country-grid">
    <div class="country-card" style="background:linear-gradient(155deg,#5a0025,#c0392b)" onclick="selectCountry('japan')">
      <div class="cc-flag">🇯🇵</div><div class="cc-name">日本</div><div class="cc-en">Japan</div>
    </div>
    <div class="country-card" style="background:linear-gradient(155deg,#004535,#16a085)" onclick="selectCountry('taiwan')">
      <div class="cc-flag">🇹🇼</div><div class="cc-name">台灣</div><div class="cc-en">Taiwan</div>
    </div>
    <div class="country-card" style="background:linear-gradient(155deg,#5a3400,#e67e22)" onclick="selectCountry('bangkok')">

    </div>
    <div class="country-card" style="background:linear-gradient(155deg,#001848,#2980b9)" onclick="selectCountry('korea')">
      <div class="cc-flag">🇰🇷</div><div class="cc-name">韓國</div><div class="cc-en">Korea</div>
    </div>
  </div>
</div>

<!-- 設定畫面 -->
<div id="setup-overlay">
  <div class="setup-card">
    <div id="setup-flag" class="setup-flag"></div>
    <div class="setup-title" id="setup-title">選擇玩家</div>
    <div class="setup-subtitle">選擇人數 · 輸入名稱</div>
    <div class="player-count-row">
      <button class="count-btn" onclick="setPlayerCount(1)">1</button>
      <button class="count-btn selected" onclick="setPlayerCount(2)">2</button>
      <button class="count-btn" onclick="setPlayerCount(3)">3</button>
      <button class="count-btn" onclick="setPlayerCount(4)">4</button>
    </div>
    <div class="player-inputs" id="player-inputs"></div>
    <button class="btn btn-gold" onclick="startGame()">開始遊戲 ▶</button>
    <button class="back-link" onclick="goBackToWelcome()">← 返回選擇地區</button>
  </div>
</div>

<!-- 遊戲 UI 覆蓋 -->
<div id="game-ui">
  <div id="side-panel"></div>
</div>

<!-- 彈窗 -->
<div id="modal-overlay"><div class="modal-box" id="modal-content"></div></div>

// 簡易軌道控制器（支援焦點追蹤）
function createOrbitControls(cam,el){
  let phi=Math.PI/3.5,theta=0,dist=28;
  let dragging=false,lastX=0,lastY=0;
  // 攝影機焦點（可動態改變）
  const target={x:0,y:0,z:0};
  // 當前插值用的實際焦點
  const curTarget={x:0,y:0,z:0};
  let followSpeed=0.04; // 追蹤平滑度

  function updateCam(){
    // 平滑插值到目標焦點
    curTarget.x+=(target.x-curTarget.x)*followSpeed;
    curTarget.y+=(target.y-curTarget.y)*followSpeed;
    curTarget.z+=(target.z-curTarget.z)*followSpeed;
    cam.position.set(
      curTarget.x+dist*Math.sin(phi)*Math.sin(theta),
      curTarget.y+dist*Math.cos(phi),
      curTarget.z+dist*Math.sin(phi)*Math.cos(theta)
    );
    cam.lookAt(curTarget.x,curTarget.y,curTarget.z);
    needsRender=true;
  }
  // 持續更新插值（使用較大閾值避免微抖動）
  setInterval(()=>{
    const dx=Math.abs(target.x-curTarget.x)+Math.abs(target.z-curTarget.z);
    if(dx>0.05) updateCam();
    else if(dx>0.001){
      // 接近目標時直接 snap，避免無限微小移動
      curTarget.x=target.x;curTarget.y=target.y;curTarget.z=target.z;
      updateCam();
    }
  },16);

  el.addEventListener('pointerdown',e=>{if(e.target.closest('#side-panel,#modal-overlay'))return;dragging=true;lastX=e.clientX;lastY=e.clientY;});
  window.addEventListener('pointermove',e=>{if(!dragging)return;
    theta+=(e.clientX-lastX)*0.008;phi=Math.max(0.3,Math.min(1.4,phi-(e.clientY-lastY)*0.008));
    lastX=e.clientX;lastY=e.clientY;updateCam();
  });
  window.addEventListener('pointerup',()=>dragging=false);
  el.addEventListener('wheel',e=>{e.preventDefault();dist=Math.max(14,Math.min(45,dist+e.deltaY*0.03));updateCam();},{passive:false});
  // 觸控縮放
  let touchDist=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===2){touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}});
  el.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);dist=Math.max(14,Math.min(45,dist-(d-touchDist)*0.05));touchDist=d;updateCam();}});
  updateCam();
  return{
    update:updateCam,
    // 設定攝影機追蹤焦點（平滑移動過去）
    lookAt(x,y,z){target.x=x;target.y=y||0;target.z=z;},
    // 拉近到某格（近距離觀看）
    zoomTo(x,z,d){target.x=x;target.z=z;dist=d||18;},
    // 重置到全景
    resetView(){target.x=0;target.y=0;target.z=0;dist=28;},
    dispose:()=>{}
  };
}
// 攝影機追蹤玩家位置
function cameraFollowPlayer(playerIdx){
  if(!G||!controls)return;
  const p=G.players[playerIdx];
  if(!p||p.bankrupt)return;
  const{x,z}=cellCenter3D(p.position);
  // 焦點偏向玩家，但不完全移到玩家（保留一些棋盤可見度）
  controls.lookAt(x*0.5,0,z*0.5);
}

function initThree(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x2d4a2d);
  scene.fog=new THREE.Fog(0x2d4a2d,40,80);

  camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,200);
  camera.position.set(0,22,18);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;
  document.body.prepend(renderer.domElement);

  // 燈光
  const amb=new THREE.AmbientLight(0xffffff,0.6);
  scene.add(amb);
  const dir=new THREE.DirectionalLight(0xfff8e0,1.0);
  dir.position.set(8,20,12);
  dir.castShadow=true;
  dir.shadow.mapSize.set(1024,1024);
  dir.shadow.camera.left=-15;dir.shadow.camera.right=15;
  dir.shadow.camera.top=15;dir.shadow.camera.bottom=-15;
  scene.add(dir);
  const point=new THREE.PointLight(0xfff0c0,0.4,40);
  point.position.set(0,10,0);
  scene.add(point);

  // 自製攝影機軌道控制（取代 OrbitControls）
  controls=createOrbitControls(camera,renderer.domElement);

  // 桌面
  const tableGeo=new THREE.PlaneGeometry(50,50);
  const tableMat=new THREE.MeshStandardMaterial({color:0x3d2b1f,roughness:0.85,metalness:0.05});
  const table=new THREE.Mesh(tableGeo,tableMat);
  table.rotation.x=-Math.PI/2;table.position.y=-0.1;
  table.receiveShadow=true;
  scene.add(table);

  boardGroup=new THREE.Group();
  tokenGroup=new THREE.Group();
  buildingGroup=new THREE.Group();
  diceGroup=new THREE.Group();
  scene.add(boardGroup,tokenGroup,buildingGroup,diceGroup);

  // 骰子初始化
  createDice();

  window.addEventListener('resize',onResize);
  animate();
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  needsRender=true;
}

function animate(){
  controls.update();
  // 骰子物理每幀跑多步加速收斂
  if(diceRolling) for(let i=0;i<3;i++) updateDicePhysics();
  if(needsRender||diceRolling){
    renderer.render(scene,camera);
    needsRender=false;
  }
  requestAnimationFrame(animate);
}

function spaceToGrid(idx){
  if(idx===0)return[10,10];if(idx<=9)return[10,10-idx];if(idx===10)return[10,0];
  if(idx<=19)return[10-(idx-10),0];if(idx===20)return[0,0];if(idx<=29)return[0,idx-20];
  if(idx===30)return[0,10];if(idx<=39)return[idx-30,10];return[0,0];
}

function gridToWorld(r,c){
  // 計算格子中心的世界座標
  const sizes=[];
  for(let i=0;i<11;i++) sizes.push(i===0||i===10?CORNER_3D:EDGE_3D);
  let x=-B;
  for(let i=0;i<c;i++) x+=sizes[i];
  x+=sizes[c]/2;
  let z=-B;
  for(let i=0;i<r;i++) z+=sizes[i];
  z+=sizes[r]/2;
  return{x,z};
}

function cellCenter3D(idx){
  const[r,c]=spaceToGrid(idx);
  const{x,z}=gridToWorld(r,c);
  return{x,y:CELL_H+0.1,z};
}

function cellSize(r,c){
  const w=(c===0||c===10)?CORNER_3D:EDGE_3D;
  const h=(r===0||r===10)?CORNER_3D:EDGE_3D;
  return{w,h};
}

function renderBoard3D(){
  boardGroup.clear();
  cellMeshes=[];

  // 棋盤邊框（最底層）
  const frameGeo=new THREE.BoxGeometry(B*2+0.5,CELL_H+0.1,B*2+0.5);
  const frameMat=new THREE.MeshStandardMaterial({color:0x6B5335,roughness:0.7});
  const frame=new THREE.Mesh(frameGeo,frameMat);
  frame.position.y=(CELL_H+0.1)/2;frame.receiveShadow=true;
  boardGroup.add(frame);

  // 棋盤底板（在邊框上，明確分層）
  const baseGeo=new THREE.BoxGeometry(B*2+0.15,0.08,B*2+0.15);
  const baseMat=new THREE.MeshStandardMaterial({color:0xf5eed8,roughness:0.9});
  const base=new THREE.Mesh(baseGeo,baseMat);
  base.position.y=CELL_H+0.04;base.receiveShadow=true;

  // 中心裝飾建築群
  buildCityCenter(meta);

  // 繪製每個格子
  G.spaces.forEach(s=>{
    const[r,c]=spaceToGrid(s.id);
    const{x,z}=gridToWorld(r,c);
    const{w,h}=cellSize(r,c);

    // 格子表面（用 PlaneGeometry 避免與底板 Z-fighting）
    const cellGeo=new THREE.PlaneGeometry(w-0.06,h-0.06);
    cellGeo.rotateX(-Math.PI/2);
    let color=0xf5eed8;
    if(s.type==='chance')color=0xfff3cc;
    else if(s.type==='comm')color=0xd6ecf5;
    else if(s.type==='tax')color=0xfce4e4;
    else if(s.type==='go')color=0xd4edda;
    else if(s.type==='jail')color=0xf8d7da;
    else if(s.type==='free')color=0xd6d8f6;
    else if(s.type==='gotojail')color=0xf8d7da;
    const cellMat=new THREE.MeshStandardMaterial({color,roughness:0.85,polygonOffset:true,polygonOffsetFactor:1,polygonOffsetUnits:1});
    const cellMesh=new THREE.Mesh(cellGeo,cellMat);
    cellMesh.position.set(x,CELL_H+0.09,z);
    cellMesh.receiveShadow=true;
    cellMesh.userData.spaceId=s.id;
    boardGroup.add(cellMesh);
    cellMeshes[s.id]=cellMesh;

    // 格子邊線（用細邊框代替 EdgesGeometry 避免抖動）
    const borderGeo=new THREE.PlaneGeometry(w,h);
    borderGeo.rotateX(-Math.PI/2);
    const borderMat=new THREE.MeshStandardMaterial({color:0xb8a880,roughness:0.9,polygonOffset:true,polygonOffsetFactor:2,polygonOffsetUnits:2});
    const border=new THREE.Mesh(borderGeo,borderMat);
    border.position.set(x,CELL_H+0.085,z);
    boardGroup.add(border);

    // 色帶
    if(s.group&&(s.type==='prop'||s.type==='rr'||s.type==='util')){
      const bandColor=parseInt(GROUPS[s.group].hex.replace('#',''),16);
      const bandH=0.08;
      let bGeo,bx=x,bz=z;
      if(r===10&&c>0&&c<10){bGeo=new THREE.BoxGeometry(w-0.04,bandH,h*0.35);bz=z-h/2+h*0.175;}
      else if(c===0&&r>0&&r<10){bGeo=new THREE.BoxGeometry(w*0.35,bandH,h-0.04);bx=x+w/2-w*0.175;}
      else if(r===0&&c>0&&c<10){bGeo=new THREE.BoxGeometry(w-0.04,bandH,h*0.35);bz=z+h/2-h*0.175;}
      else if(c===10&&r>0&&r<10){bGeo=new THREE.BoxGeometry(w*0.35,bandH,h-0.04);bx=x-w/2+w*0.175;}
      if(bGeo){
        const bMat=new THREE.MeshStandardMaterial({color:bandColor,roughness:0.6});
        const band=new THREE.Mesh(bGeo,bMat);
        band.position.set(bx,CELL_H+0.1+bandH/2,bz);
        band.castShadow=true;
        boardGroup.add(band);
      }
    }

    // 格子標籤（用 canvas 貼圖）
    addCellLabel(s,x,z,w,h,r,c);

}

function addCellLabel(s,x,z,w,h,r,c){
  const canvas=document.createElement('canvas');
  const isCorner=(r===0||r===10)&&(c===0||c===10);
  const isVert=(c===0||c===10)&&!isCorner;
  // 高解析度 canvas（4x 提升清晰度）
  const scale=4;
  const cw=isCorner?128*scale:64*scale;
  const ch=isCorner?128*scale:64*scale;
  canvas.width=cw;canvas.height=ch;
  const ctx=canvas.getContext('2d');

  // 使用黑體字（sans-serif），加粗加大
  const fontBase='bold sans-serif';
  const fontName=`bold ${20*scale}px "Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif`;
  const fontPrice=`${16*scale}px "Noto Sans TC","Microsoft JhengHei",sans-serif`;
  const fontSmall=`${14*scale}px "Noto Sans TC","Microsoft JhengHei",sans-serif`;

  ctx.fillStyle='#1a1206';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  const name=s.name.replace('\n',' ');
  if(isCorner){
    ctx.font=`${32*scale}px serif`;
    ctx.fillText(s.icon||'',cw/2,ch*0.32);
    ctx.font=`bold ${16*scale}px "Noto Sans TC","Microsoft JhengHei",sans-serif`;
    ctx.fillText(name,cw/2,ch*0.58);
    if(s.type==='go'){ctx.fillStyle='#1a8a3e';ctx.font=`bold ${13*scale}px "Noto Sans TC",sans-serif`;ctx.fillText('領取$200',cw/2,ch*0.76);}
    if(s.type==='gotojail'){ctx.fillStyle='#c0392b';ctx.font=`bold ${13*scale}px "Noto Sans TC",sans-serif`;ctx.fillText('⚠',cw/2,ch*0.76);}
  } else {
    ctx.font=fontName;
    ctx.fillText(name,cw/2,ch*0.34);
    if(s.price){ctx.font=fontPrice;ctx.fillStyle='#5a4a30';ctx.fillText('$'+s.price,cw/2,ch*0.68);}
    else if(s.type==='chance'){ctx.font=`${28*scale}px serif`;ctx.fillText('❓',cw/2,ch*0.68);}
    else if(s.type==='comm'){ctx.font=`${24*scale}px serif`;ctx.fillText('📦',cw/2,ch*0.68);}
    else if(s.type==='tax'){ctx.font=`bold ${16*scale}px "Noto Sans TC",sans-serif`;ctx.fillStyle='#c0392b';ctx.fillText(s.id===4?'$200':'$75',cw/2,ch*0.68);}
  }

  const tex=new THREE.CanvasTexture(canvas);
  tex.minFilter=THREE.LinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
  const labelGeo=new THREE.PlaneGeometry(isCorner?CORNER_3D*0.85:EDGE_3D*0.9,isCorner?CORNER_3D*0.85:(isVert?EDGE_3D*0.9:EDGE_3D*0.85));
  const labelMat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,polygonOffset:true,polygonOffsetFactor:-1,polygonOffsetUnits:-1});
  const label=new THREE.Mesh(labelGeo,labelMat);
  label.rotation.x=-Math.PI/2;
  if(isVert){
    if(c===0) label.rotation.z=Math.PI/2;
    else label.rotation.z=-Math.PI/2;
  }
  label.position.set(x,CELL_H+0.12,z);
  boardGroup.add(label);
}

function buildCityCenter(meta){
  // low-poly 城市建築群
  const accentColor=parseInt(meta.accent.replace('#',''),16);
  const count=15+Math.floor(Math.random()*10);
  const range=B-CORNER_3D-1;
  for(let i=0;i<count;i++){
    const bw=0.3+Math.random()*0.6;

    if(Math.random()<0.3) color.set(accentColor);
    const mat=new THREE.MeshStandardMaterial({color,roughness:0.7,metalness:0.1});

    mesh.position.set(
      (Math.random()-0.5)*range*1.2,

      (Math.random()-0.5)*range*1.2

    mesh.receiveShadow=true;

}

let diceRolling=false;

function createDieFace(val){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,128,128);
  // 圓角邊
  ctx.strokeStyle='#ddd';ctx.lineWidth=4;
  ctx.beginPath();ctx.roundRect(4,4,120,120,12);ctx.stroke();
  ctx.fillStyle='#222';
  const dots={1:[[64,64]],2:[[36,36],[92,92]],3:[[36,36],[64,64],[92,92]],4:[[36,36],[92,36],[36,92],[92,92]],5:[[36,36],[92,36],[64,64],[36,92],[92,92]],6:[[36,36],[92,36],[36,64],[92,64],[36,92],[92,92]]};
  (dots[val]||[]).forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(dx,dy,10,0,Math.PI*2);ctx.fill();});
  return new THREE.CanvasTexture(c);
}

function createDice(){
  // Three.js BoxGeometry face order: +X,-X,+Y,-Y,+Z,-Z
  // 標準骰子對面和=7: 1↔6, 2↔5, 3↔4
  // 材質順序: [+X=3, -X=4, +Y=1, -Y=6, +Z=2, -Z=5]
  const faceMap=[3,4,1,6,2,5];
  const mats=faceMap.map(v=>new THREE.MeshStandardMaterial({map:createDieFace(v),roughness:0.4,metalness:0.05}));

  const size=0.7;
  const geo=new THREE.BoxGeometry(size,size,size);

  const m1=new THREE.Mesh(geo,mats);m1.castShadow=true;
  const m2=new THREE.Mesh(geo,mats.map(m=>m.clone()));m2.castShadow=true;
  diceGroup.add(m1,m2);

  die1State={mesh:m1,pos:new THREE.Vector3(-1.5,0.4,6),vel:new THREE.Vector3(),angVel:new THREE.Vector3(),quat:new THREE.Quaternion(),settled:true,targetVal:1};
  die2State={mesh:m2,pos:new THREE.Vector3(1.5,0.4,6),vel:new THREE.Vector3(),angVel:new THREE.Vector3(),quat:new THREE.Quaternion(),settled:true,targetVal:1};
  m1.position.copy(die1State.pos);m1.position.y=0.4;
  m2.position.copy(die2State.pos);m2.position.y=0.4;
}

function launchDice(d1,d2){
  diceRolling=true;
  [die1State,die2State].forEach((d,i)=>{
    d.pos.set(-1+i*2,5,7);
    d.vel.set((Math.random()-0.5)*5,-2,-10-Math.random()*4);
    d.angVel.set((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20);
    d.quat.set(Math.random(),Math.random(),Math.random(),Math.random()).normalize();
    d.settled=false;
    d.targetVal=i===0?d1:d2;
  });
}

const GRAVITY=-30,FLOOR_Y=0.5,BOUNCE=0.3,FRICTION=0.94,ANG_FRIC=0.92;

function updateDicePhysics(){
  if(!diceRolling)return;
  const dt=0.016; // 固定步長 ~60fps

  let allSettled=true;
  [die1State,die2State].forEach(d=>{
    if(d.settled)return;
    allSettled=false;
    d.vel.y+=GRAVITY*dt;
    d.pos.addScaledVector(d.vel,dt);
    // 地板碰撞
    if(d.pos.y<FLOOR_Y){
      d.pos.y=FLOOR_Y;
      d.vel.y=-d.vel.y*BOUNCE;
      d.vel.x*=FRICTION;d.vel.z*=FRICTION;
      d.angVel.x+=d.vel.z*3;d.angVel.z-=d.vel.x*3;
    }
    // 邊界
    ['x','z'].forEach(a=>{if(Math.abs(d.pos[a])>7){d.pos[a]=Math.sign(d.pos[a])*7;d.vel[a]*=-0.4;}});
    // 旋轉
    const angMag=d.angVel.length();
    if(angMag>0.001){
      const axis=d.angVel.clone().normalize();
      const dq=new THREE.Quaternion().setFromAxisAngle(axis,angMag*dt);
      d.quat.premultiply(dq).normalize();
    }
    d.angVel.multiplyScalar(ANG_FRIC);
    d.vel.multiplyScalar(0.998);
    // 判定停止
    if(d.pos.y<=FLOOR_Y+0.02&&d.vel.length()<0.3&&d.angVel.length()<0.5){
      d.settled=true;
      snapDieToFace(d);
    }
    d.mesh.position.copy(d.pos);
    d.mesh.quaternion.copy(d.quat);
  });

  if(allSettled&&diceRolling){
    diceRolling=false;
    onDiceSettled();
  }
  needsRender=true;
}

function snapDieToFace(d){
  // 找到最朝上的面，然後旋轉到目標值
  // 簡單做法：直接設定骰子旋轉使目標面朝上
  const rotations={
    1:new THREE.Quaternion(), // +Y 朝上（默認）
    2:new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),Math.PI/2),
    3:new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),-Math.PI/2),
    4:new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),Math.PI/2),
    5:new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),-Math.PI/2),
    6:new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),Math.PI),
  };
  d.quat.copy(rotations[d.targetVal]||rotations[1]);
  d.mesh.quaternion.copy(d.quat);
}

let diceCallback=null;
function onDiceSettled(){
  if(diceCallback){const cb=diceCallback;diceCallback=null;cb();}
}

function updateTokens3D(){
  if(!G)return;
  tokenGroup.clear();
  tokenMeshes=[];
  const byPos={};
  G.players.forEach(p=>{if(!p.bankrupt){if(!byPos[p.position])byPos[p.position]=[];byPos[p.position].push(p);}});

  G.players.forEach(p=>{
    if(p.bankrupt)return;
    const{x,y,z}=cellCenter3D(p.position);
    const slot=byPos[p.position].indexOf(p);
    const offsets=[[-0.3,-0.3],[0.3,-0.3],[-0.3,0.3],[0.3,0.3]];
    const[ox,oz]=offsets[slot]||[0,0];

    // 棋子：圓錐底座
    const color=parseInt(p.color.replace('#',''),16);
    const bodyGeo=new THREE.CylinderGeometry(0.15,0.25,0.5,8);
    const bodyMat=new THREE.MeshStandardMaterial({color,roughness:0.4,metalness:0.3});
    const body=new THREE.Mesh(bodyGeo,bodyMat);
    body.castShadow=true;

    // 頭部球體
    const headGeo=new THREE.SphereGeometry(0.18,8,6);
    const head=new THREE.Mesh(headGeo,bodyMat);
    head.position.y=0.4;
    head.castShadow=true;

    const group=new THREE.Group();
    group.add(body,head);
    group.position.set(x+ox,y+0.25,z+oz);
    group.userData.playerId=p.id;

    tokenGroup.add(group);
    tokenMeshes[p.id]=group;
  });
  needsRender=true;
}

function updateBuildings3D(){
  if(!G)return;
  buildingGroup.clear();
  G.spaces.forEach(s=>{
    if(s.type!=='prop'||s.buildings===0)return;
    const{x,y,z}=cellCenter3D(s.id);
    const[r,c]=spaceToGrid(s.id);
    for(let i=0;i<(s.buildings===5?1:s.buildings);i++){
      const isHotel=s.buildings===5;
      const bw=isHotel?0.4:0.2;
      const bh=isHotel?0.5:0.3;
      const geo=new THREE.BoxGeometry(bw,bh,bw);
      const mat=new THREE.MeshStandardMaterial({color:isHotel?0xc0392b:0x1a7a1a,roughness:0.6});
      const mesh=new THREE.Mesh(geo,mat);
      const offset=(i-(isHotel?0:s.buildings/2-0.5))*0.3;
      let bx=x,bz=z;
      if(r===10)bz-=0.5;else if(r===0)bz+=0.5;else if(c===0)bx+=0.5;else if(c===10)bx-=0.5;
      if(r===10||r===0)bx+=offset;else bz+=offset;
      mesh.position.set(bx,y+bh/2,bz);
      mesh.castShadow=true;
      buildingGroup.add(mesh);
    }
    // 擁有者標記
    if(s.owner!==null){
      const oGeo=new THREE.SphereGeometry(0.08,6,4);
      const oMat=new THREE.MeshStandardMaterial({color:parseInt(G.players[s.owner].color.replace('#',''),16),emissive:parseInt(G.players[s.owner].color.replace('#',''),16),emissiveIntensity:0.5});
      const oMesh=new THREE.Mesh(oGeo,oMat);
      const{w,h}=cellSize(r,c);
      oMesh.position.set(x+w/2-0.2,CELL_H+0.15,z+h/2-0.2);
      buildingGroup.add(oMesh);
    }
  });
  needsRender=true;
}

// ╚══════════════════════════════════════════════════╝
const tweens=[];
function tw(obj,props,dur,ease){
  return new Promise(resolve=>{
    const start={};
    for(const k in props) start[k]=obj[k]!=null?obj[k]:0;
    tweens.push({obj,props,start,dur,elapsed:0,ease:ease||(t=>1-Math.pow(1-t,3)),resolve});
  });
}
setInterval(()=>{
  if(!tweens.length)return;
  const now=performance.now();
  for(let i=tweens.length-1;i>=0;i--){
    const t=tweens[i];
    t.elapsed+=16;
    const p=Math.min(t.elapsed/t.dur,1);
    const ep=t.ease(p);
    for(const k in t.props) t.obj[k]=t.start[k]+(t.props[k]-t.start[k])*ep;
    if(p>=1){tweens.splice(i,1);t.resolve();}
  }
  needsRender=true;
},16);

  updateBuildings3D();
  renderUI();
  addLog('🎮 遊戲開始！地區：'+COUNTRY_META[selectedCountry].name);
  // 攝影機聚焦到第一位玩家（出發點）
  cameraFollowPlayer(0);
  maybeAI();
}

// ╔══════════════════════════════════════════════════╗
// ║              HTML UI (側邊欄+日誌)                 ║
// ╚══════════════════════════════════════════════════╝
function renderUI(){
  if(!G)return;
  const panel=document.getElementById('side-panel');
  const cur=G.players[G.current];

  let html='<div class="sp-title">玩家狀況</div>';
  G.players.forEach((p,i)=>{
    const props=G.spaces.filter(s=>s.owner===i);
    html+=`<div class="pcard${i===G.current?' active':''}${p.bankrupt?' bankrupt':''}">
      <div class="p-avatar" style="background:${p.color}">${p.avatar}</div>
      <div class="p-info">
        <div class="p-name">${p.name}${p.isAI?' 🤖':''}</div>
        <div class="p-money">$${p.money}</div>
        <div class="p-badges">
          ${props.length?`<span class="p-badge">🏠×${props.length}</span>`:''}
          ${p.inJail?'<span class="p-badge" style="color:#e74c3c">⛓ 監獄</span>':''}
          ${p.bankrupt?'<span class="p-badge" style="color:#e74c3c">💸 破產</span>':''}
        </div>
      </div>
      ${i===G.current&&!p.bankrupt?'<div class="active-dot"></div>':''}
    </div>`;
  });

  html+=`<div class="sp-title">${cur.name} 的回合</div>`;
  html+=`<div class="dice-area">
    <div class="dice-row">
      <div class="die-display">${DIE_FACES[G.dice[0]-1]}</div>
      <div class="die-display">${DIE_FACES[G.dice[1]-1]}</div>
    </div>
    <div class="dice-total">合計：${G.dice[0]+G.dice[1]}${G.doublesRolled?' 🎉 雙胞胎！':''}</div>
  </div>`;

  if(G.phase==='roll'){
    html+=`<button class="btn-action btn-roll" onclick="doRoll()">🎲 擲骰子</button>`;
    if(cur.inJail) html+=`<button class="btn-action btn-bail" onclick="doBailJail()">繳保釋金 $50</button>`;
  }
  if(G.phase==='post'){
    html+=`<button class="btn-action btn-end" onclick="doEndTurn()">結束回合 →</button>`;
  }

  html+=`<div class="sp-title" style="margin-top:8px">遊戲紀錄</div>`;
  html+=`<div id="game-log">`;
  G.log.slice(0,20).forEach(e=>{
    let cls='log-line';
    if(e.type==='good')cls+=' log-good';if(e.type==='warn')cls+=' log-warn';if(e.type==='gold')cls+=' log-gold';
    html+=`<div class="${cls}">${e.msg}</div>`;
  });
  html+=`</div>`;
  html+=`<button class="btn-menu" onclick="backToMenu()">↩ 回主選單</button>`;

  panel.innerHTML=html;
}

function addLog(msg,type=''){
  if(!G)return;
  G.log.unshift({msg,type});
  if(G.log.length>50)G.log.pop();
  renderUI();
}

function backToMenu(){
  G=null;
  document.getElementById('game-ui').classList.remove('active');
  document.getElementById('welcome-overlay').classList.add('active');
  boardGroup.clear();tokenGroup.clear();buildingGroup.clear();
  needsRender=true;
}

// ╔══════════════════════════════════════════════════╗
// ║              MODAL SYSTEM (HTML)                 ║
// ╚══════════════════════════════════════════════════╝
function showModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('active');
}
function hideModal(cb){
  document.getElementById('modal-overlay').classList.remove('active');
  if(cb)setTimeout(cb,100);
}

function showBuyModal(player,space){
  const g=GROUPS[space.group];
  showModal(`
    <div class="modal-band" style="background:${g?g.hex:'#888'}"></div>
    <div class="modal-icon">${space.type==='rr'?'🚄':space.type==='util'?'⚡':'🏠'}</div>
    <div class="modal-title">${space.name}</div>
    <div class="modal-sub">${player.name}，是否要購買這塊地產？</div>
    <div class="modal-details">
      <div class="detail-row"><span class="detail-label">售價</span><span class="detail-val">$${space.price}</span></div>
      ${space.type==='prop'?`
      <div class="detail-row"><span class="detail-label">基本租金</span><span class="detail-val">$${space.rent[0]}</span></div>
      <div class="detail-row"><span class="detail-label">旅館租金</span><span class="detail-val">$${space.rent[5]}</span></div>
      <div class="detail-row"><span class="detail-label">建造費用</span><span class="detail-val">$${g?g.buildCost:0}/棟</span></div>`:''}
      <div class="detail-row"><span class="detail-label">你的資金</span><span class="detail-val" style="color:#2ecc71">$${player.money}</span></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gold" style="width:auto" onclick="doBuyFromModal()">購買</button>
      <button class="btn btn-outline" onclick="skipBuyFromModal()">不購買</button>
    </div>
  `);
}
function doBuyFromModal(){hideModal(()=>{if(pendingBuy){doBuySpace(pendingBuy.player,pendingBuy.space);pendingBuy=null;}});}
function skipBuyFromModal(){hideModal(()=>{pendingBuy=null;G.phase='post';renderUI();autoAIEndTurn();});}

function showCardModal(type,card){
  showModal(`
    <div class="card-header" style="background:${type==='chance'?'#e67e22':'#2980b9'}">${type==='chance'?'🃏 機會卡':'📦 命運卡'}</div>
    <div class="modal-icon">${type==='chance'?'🃏':'📦'}</div>
    <div class="card-body">${card.text}</div>
    <button class="btn btn-gold" style="width:100%" onclick="closeCardModal()">確認</button>
  `);
  if(G.players[G.current].isAI) setTimeout(()=>closeCardModal(),1200);
}
function closeCardModal(){hideModal(()=>{if(pendingCard){const{card,player}=pendingCard;pendingCard=null;card.fn(player);}});}

function showRentModal(payer,owner,space,rent){
  showModal(`
    <div class="modal-icon">💸</div>
    <div class="modal-title">支付租金</div>
    <div class="modal-sub">${payer.name} 支付 $${rent} 給 ${owner.name}（${space.name}）${payer.money<0?'<br>⚠️ 資金不足，宣告破產！':''}</div>
    <button class="btn btn-gold" style="width:100%" onclick="closeRentModal()">確認</button>
  `);
  if(G.players[G.current].isAI) setTimeout(()=>closeRentModal(),1000);
}
function closeRentModal(){hideModal(()=>{renderUI();autoAIEndTurn();});}

function showPropInfo(id){
  const s=G.spaces[id];if(!s||!G)return;
  const g=s.group?GROUPS[s.group]:null;
  const owner=s.owner!==null?G.players[s.owner]:null;
  const cur=G.players[G.current];
  let btns='';
  if(G.phase==='post'&&s.owner===G.current&&!cur.isAI){
    if(canBuild(cur,s)) btns+=`<button class="btn btn-gold" style="width:auto" onclick="hideModal(()=>doBuildOn(G.spaces[${id}]))">建造($${g.buildCost})</button>`;
    if(s.buildings>0) btns+=`<button class="btn btn-red" style="width:auto" onclick="hideModal(()=>doSellBuilding(G.spaces[${id}]))">拆除出售</button>`;
  }
  btns+=`<button class="btn btn-outline" onclick="hideModal()">關閉</button>`;
  showModal(`
    <div class="modal-band" style="background:${g?g.hex:'#888'}"></div>
    <div class="modal-icon">${s.type==='rr'?'🚄':s.type==='util'?'⚡':'🏠'}</div>
    <div class="modal-title">${s.name}</div>
    <div class="modal-sub">${owner?'擁有者：'+owner.name:'尚未購買'}</div>
    <div class="modal-details">
      <div class="detail-row"><span class="detail-label">售價</span><span class="detail-val">$${s.price}</span></div>
      ${s.type==='prop'?`
      <div class="detail-row"><span class="detail-label">基本租金</span><span class="detail-val">$${s.rent[0]}</span></div>
      <div class="detail-row"><span class="detail-label">旅館</span><span class="detail-val">$${s.rent[5]}</span></div>
      <div class="detail-row"><span class="detail-label">建設</span><span class="detail-val">${s.buildings===0?'無':s.buildings===5?'旅館🏨':s.buildings+'棟🏠'}</span></div>`:''}
    </div>
    <div class="modal-btns">${btns}</div>
  `);
}

function showWinnerModal(w){
  showModal(`
    <div class="modal-icon" style="font-size:60px">🏆</div>
    <div class="modal-title" style="font-size:1.3rem">${w.name} 獲勝！</div>
    <div class="modal-sub">恭喜成為亞洲大富翁！<br>資產：$${w.money}</div>
    <button class="btn btn-gold" style="width:100%" onclick="hideModal(()=>backToMenu())">再玩一局</button>
  `);
}

// ╔══════════════════════════════════════════════════╗
// ║              GAME LOGIC                          ║
// ╚══════════════════════════════════════════════════╝
function doRoll(){
  if(G.phase!=='roll'||diceRolling)return;
  const cur=G.players[G.current];
  if(cur.bankrupt){doEndTurn();return;}

  const d1=1+Math.floor(Math.random()*6);
  const d2=1+Math.floor(Math.random()*6);
  G.dice=[d1,d2];G.doublesRolled=(d1===d2);

  // 啟動 3D 骰子
  launchDice(d1,d2);
  diceCallback=()=>{
    renderUI();
    afterRoll(d1,d2);
  };
}

function afterRoll(d1,d2){
  const cur=G.players[G.current];const total=d1+d2;
  if(cur.inJail){
    if(G.doublesRolled){cur.inJail=false;cur.jailTurns=0;addLog(`${cur.name} 擲出雙胞胎，出獄了！`,'good');}
    else{cur.jailTurns++;if(cur.jailTurns>=3){cur.inJail=false;cur.jailTurns=0;addLog(`${cur.name} 服滿刑期，繳 $50 出獄。`,'warn');cur.money-=50;}
    else{addLog(`${cur.name} 在監獄裡（第${cur.jailTurns}回合）。`);G.phase='post';renderUI();autoAIEndTurn();return;}}
  }
  if(G.doublesRolled){cur.doublesCount=(cur.doublesCount||0)+1;if(cur.doublesCount>=3){addLog(`${cur.name} 連擲三次雙胞胎，進監獄！`,'warn');goToJailDirect();return;}}
  else{cur.doublesCount=0;}
  movePlayer(cur,total);
}

async function movePlayer(player,steps){
  const oldPos=player.position;
  let newPos=(player.position+steps)%40;
  if(newPos<oldPos||(oldPos+steps>=40)){player.money+=200;addLog(`${player.name} 經過出發點，領取 $200！`,'good');}
  player.position=newPos;
  updateTokens3D();

  // 動畫移動代幣 + 攝影機跟隨
  const tok=tokenMeshes[player.id];
  if(tok){
    const startP=cellCenter3D(oldPos);
    tok.position.set(startP.x,startP.y+0.25,startP.z);
    const numSteps=((newPos-oldPos)+40)%40;
    for(let i=1;i<=numSteps;i++){
      const p=(oldPos+i)%40;
      const{x,y,z}=cellCenter3D(p);
      // 攝影機追蹤代幣
      controls.lookAt(x*0.5,0,z*0.5);
      await tw(tok.position,{x,y:y+0.25+0.4,z},60);
      await tw(tok.position,{y:y+0.25},40);
    }
  }
  updateTokens3D();
  // 到達後攝影機聚焦
  cameraFollowPlayer(player.id);
  landOn(player);
}

function landOn(player){
  const space=G.spaces[player.position];
  addLog(`${player.name} 停在 【${space.name}】`);
  switch(space.type){
    case 'go':case 'jail':case 'free':G.phase='post';renderUI();autoAIEndTurn();break;
    case 'gotojail':goToJailDirect();break;
    case 'tax':const amt=space.id===4?200:75;player.money-=amt;addLog(`${player.name} 繳稅 $${amt}。`,'warn');checkBankrupt(player);G.phase='post';renderUI();autoAIEndTurn();break;
    case 'chance':drawCard('chance',player);break;
    case 'comm':drawCard('comm',player);break;
    case 'prop':case 'rr':case 'util':handlePropertyLand(player,space);break;
    default:G.phase='post';renderUI();autoAIEndTurn();
  }
}

function autoAIEndTurn(){if(G.phase==='post'&&G.players[G.current].isAI)setTimeout(()=>doEndTurn(),600);}

function handlePropertyLand(player,space){
  if(space.mortgaged){addLog(`${space.name} 已抵押，免收租金。`);G.phase='post';renderUI();autoAIEndTurn();return;}
  if(space.owner===null){
    if(player.money>=space.price)promptBuy(player,space);
    else{addLog(`${player.name} 資金不足，無法購買 ${space.name}。`,'warn');G.phase='post';renderUI();autoAIEndTurn();}
  }else if(space.owner===player.id){
    addLog(`${player.name} 停在自己的地產上。`);G.phase='post';renderUI();autoAIEndTurn();
  }else{
    const owner=G.players[space.owner];const rent=calcRent(space,G.dice[0]+G.dice[1]);
    addLog(`${player.name} 向 ${owner.name} 支付租金 $${rent}！`,'warn');
    player.money-=rent;owner.money+=rent;
    showRentModal(player,owner,space,rent);
    checkBankrupt(player);G.phase='post';renderUI();
  }
}

function calcRent(space,diceTotal){
  if(space.type==='rr'){const n=G.spaces.filter(s=>s.type==='rr'&&s.owner===space.owner).length;return RR_RENT[n-1]||25;}
  if(space.type==='util'){const n=G.spaces.filter(s=>s.type==='util'&&s.owner===space.owner).length;return diceTotal*(n===2?10:4);}
  if(space.type==='prop'){if(space.buildings>0)return space.rent[space.buildings];const grp=G.spaces.filter(s=>s.group===space.group);return grp.every(s=>s.owner===space.owner)?space.rent[0]*2:space.rent[0];}
  return 0;
}

function promptBuy(player,space){
  if(player.isAI){if(player.money>=space.price+200)doBuySpace(player,space);else{addLog(`${player.name}（電腦）決定不購買 ${space.name}。`);G.phase='post';renderUI();autoAIEndTurn();}return;}
  pendingBuy={player,space};showBuyModal(player,space);
}

function doBuySpace(player,space){
  player.money-=space.price;space.owner=player.id;
  addLog(`${player.name} 購買了 ${space.name}（$${space.price}）！`,'gold');
  updateBuildings3D();G.phase='post';renderUI();
  if(player.isAI)setTimeout(()=>{aiBuild(player);setTimeout(()=>doEndTurn(),500);},400);
}

function canBuild(player,space){
  if(space.type!=='prop'||space.owner!==player.id||space.mortgaged||space.buildings>=5)return false;
  const grp=GROUPS[space.group];if(!grp||grp.buildCost===0)return false;
  const grpS=G.spaces.filter(s=>s.group===space.group);
  if(!grpS.every(s=>s.owner===player.id))return false;
  if(space.buildings>Math.min(...grpS.map(s=>s.buildings)))return false;
  return player.money>=grp.buildCost;
}

function aiBuild(player){
  G.spaces.forEach(s=>{if(canBuild(player,s)&&player.money>s.price+300){
    const grp=GROUPS[s.group];player.money-=grp.buildCost;s.buildings++;
    addLog(`${player.name}（電腦）在 ${s.name} 建造了${s.buildings===5?'旅館':'房屋'}！`,'gold');
    updateBuildings3D();renderUI();
  }});
}

function doBuildOn(space){
  const cur=G.players[G.current];if(!canBuild(cur,space))return;
  const grp=GROUPS[space.group];cur.money-=grp.buildCost;space.buildings++;
  addLog(`${cur.name} 在 ${space.name} 建造了${space.buildings===5?'旅館':'房屋'}！`,'gold');
  updateBuildings3D();renderUI();
}

function doSellBuilding(space){
  const cur=G.players[G.current];if(space.buildings===0)return;
  const grp=GROUPS[space.group];cur.money+=Math.floor(grp.buildCost/2);space.buildings--;
  addLog(`${cur.name} 從 ${space.name} 拆除了建築。`);
  updateBuildings3D();renderUI();
}

function drawCard(type,player){
  const deck=type==='chance'?chanceCards:commCards;const card=deck[0];deck.push(deck.shift());
  addLog(`${player.name} 抽到${type==='chance'?'機會':'命運'}卡：${card.text}`);
  pendingCard={card,player};showCardModal(type,card);
}

function gainMoney(p,amt){p.money+=amt;addLog(`${p.name} 獲得 $${amt}。`,'good');G.phase='post';renderUI();autoAIEndTurn();}
function loseMoney(p,amt){p.money-=amt;addLog(`${p.name} 支付 $${amt}。`,'warn');checkBankrupt(p);G.phase='post';renderUI();autoAIEndTurn();}
function advanceTo(p,pos,go){if(go&&pos<p.position){p.money+=200;addLog(`${p.name} 領取出發點 $200。`,'good');}p.position=pos;updateTokens3D();cameraFollowPlayer(p.id);setTimeout(()=>landOn(p),300);}
function repairTax(p,h,ho){const houses=G.spaces.filter(s=>s.owner===p.id&&s.buildings>0&&s.buildings<5).reduce((a,s)=>a+s.buildings,0);const hotels=G.spaces.filter(s=>s.owner===p.id&&s.buildings===5).length;const t=houses*h+hotels*ho;p.money-=t;addLog(`${p.name} 維修費 $${t}`,'warn');checkBankrupt(p);G.phase='post';renderUI();autoAIEndTurn();}
function advanceNearestRR(p){const rr=[5,15,25,35];const n=rr.find(x=>x>p.position)||rr[0];advanceTo(p,n,n<p.position);}
function advanceNearestUtil(p){const u=[12,28];const n=u.find(x=>x>p.position)||u[0];advanceTo(p,n,n<p.position);}
function collectFromAll(p,amt){G.players.forEach(o=>{if(o.id!==p.id&&!o.bankrupt){o.money-=amt;p.money+=amt;}});addLog(`${p.name} 向每位玩家收取 $${amt}。`,'gold');G.phase='post';renderUI();autoAIEndTurn();}
function goToJail(p){goToJailDirect();}

function goToJailDirect(){
  const cur=G.players[G.current];
  cur.position=10;cur.inJail=true;cur.jailTurns=0;cur.doublesCount=0;
  updateTokens3D();cameraFollowPlayer(G.current);
  addLog(`${cur.name} 進入監獄！`,'warn');
  G.phase='post';renderUI();autoAIEndTurn();
}

function doBailJail(){
  const cur=G.players[G.current];if(!cur.inJail)return;
  cur.money-=50;cur.inJail=false;cur.jailTurns=0;
  addLog(`${cur.name} 繳保釋金 $50 出獄。`);renderUI();
}

function checkBankrupt(player){
  if(player.money<0){player.bankrupt=true;G.spaces.forEach(s=>{if(s.owner===player.id){s.owner=null;s.buildings=0;}});
  addLog(`💸 ${player.name} 破產出局！`,'warn');updateBuildings3D();checkWinner();}
}

function checkWinner(){
  const active=G.players.filter(p=>!p.bankrupt);
  if(active.length===1)showWinnerModal(active[0]);
}

function doEndTurn(){
  if(G.phase!=='post')return;const cur=G.players[G.current];
  if(!cur.isAI){G.spaces.forEach(s=>{if(canBuild(cur,s)&&cur.money>s.price+400){const grp=GROUPS[s.group];cur.money-=grp.buildCost;s.buildings++;addLog(`${cur.name} 在 ${s.name} 建造！`,'gold');updateBuildings3D();renderUI();}});}
  if(G.doublesRolled&&!cur.inJail&&cur.doublesCount>0&&cur.doublesCount<3){
    addLog(`${cur.name} 擲出雙胞胎，再擲一次！`);G.phase='roll';renderUI();
    if(cur.isAI)setTimeout(()=>doRoll(),800);return;
  }
  G.doublesRolled=false;
  let next=(G.current+1)%G.players.length;let tries=0;
  while(G.players[next].bankrupt&&tries<G.players.length){next=(next+1)%G.players.length;tries++;}
  if(tries>=G.players.length){checkWinner();return;}
  G.current=next;G.phase='roll';renderUI();
  addLog(`─── ${G.players[G.current].name} 的回合 ───`);
  // 攝影機追蹤到下一位玩家
  cameraFollowPlayer(G.current);
  maybeAI();
}

function maybeAI(){const cur=G.players[G.current];if(cur.isAI&&!cur.bankrupt)setTimeout(()=>doRoll(),900);}

// 點擊棋盤格子查看資訊
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
document.addEventListener('click',(e)=>{
  if(!G||e.target.closest('#side-panel,#modal-overlay,#setup-overlay,#welcome-overlay'))return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(cellMeshes.filter(Boolean));
  if(hits.length>0){const id=hits[0].object.userData.spaceId;if(id!=null)showPropInfo(id);}
});

// 鍵盤
document.addEventListener('keydown',(e)=>{
  if(e.key===' '&&G&&G.phase==='roll'&&!G.players[G.current].isAI&&!diceRolling){e.preventDefault();doRoll();}
});

// ╔══════════════════════════════════════════════════╗
// ║              INIT                                ║
// ╚══════════════════════════════════════════════════╝
// 備用渲染/物理迴圈（rAF 在某些環境不觸發）
setInterval(()=>{
  if(!scene||!renderer)return;
  controls?.update();
  if(diceRolling) for(let i=0;i<3;i++) updateDicePhysics();
  if(needsRender||diceRolling){try{renderer.render(scene,camera);needsRender=false;}catch(e){}}
},16);

setPlayerCount(2);
// Three.js UMD 已同步載入，直接初始化
Promise.all([
  document.fonts.load('16px "Noto Sans TC"'),
  document.fonts.load('16px "Noto Serif TC"')
]).then(()=>initThree()).catch(()=>initThree());
</script>
