<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亞洲大富翁 · Asia Monopoly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+TC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060f;
  --gold: #c9a84c;
  --gold-light: #f0d060;
  --gold-dim: rgba(201,168,76,0.3);
  --text: #f0e8d8;
  --text-dim: rgba(240,232,216,0.55);
  --border: rgba(201,168,76,0.25);
  --board-bg: #f5f0e0;
  --accent: #c9a84c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ── WELCOME ─────────────────────────────────── */
#screen-welcome{
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.12) 0%,transparent 70%);
}
.welcome-kicker{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:.95rem;letter-spacing:.35em;color:var(--text-dim);
  margin-bottom:10px;text-transform:uppercase;
}
.welcome-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.2rem,5vw,4rem);
  background:linear-gradient(135deg,#c9a84c 0%,#f0d060 40%,#c9a84c 70%,#a07028 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;letter-spacing:.08em;
  filter:drop-shadow(0 0 30px rgba(201,168,76,.4));
  margin-bottom:4px;
}
.welcome-sub{
  font-size:.85rem;letter-spacing:.5em;color:var(--text-dim);text-align:center;
  margin-bottom:56px;text-transform:uppercase;
}
.welcome-divider{
  width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 56px;
}
.country-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:20px;
  max-width:820px;width:100%;
}
@media(min-width:640px){.country-grid{grid-template-columns:repeat(4,1fr)}}
.country-card{
  position:relative;height:300px;border-radius:20px;cursor:pointer;
  overflow:hidden;border:1px solid rgba(255,255,255,.08);
  transition:transform .35s cubic-bezier(.23,1,.32,1),box-shadow .35s;
}
.country-card:hover{transform:translateY(-10px) scale(1.025);box-shadow:0 24px 60px rgba(0,0,0,.6)}
.cc-bg{position:absolute;inset:0;transition:transform .6s cubic-bezier(.23,1,.32,1)}
.country-card:hover .cc-bg{transform:scale(1.08)}
.country-card[data-c="japan"] .cc-bg{background:linear-gradient(155deg,#1c0010 0%,#5a0025 45%,#c0392b 100%)}
.country-card[data-c="taiwan"] .cc-bg{background:linear-gradient(155deg,#001811 0%,#004535 45%,#16a085 100%)}
.country-card[data-c="bangkok"] .cc-bg{background:linear-gradient(155deg,#1a0f00 0%,#5a3400 45%,#e67e22 100%)}
.country-card[data-c="korea"] .cc-bg{background:linear-gradient(155deg,#00081a 0%,#001848 45%,#2980b9 100%)}
.cc-noise{
  position:absolute;inset:0;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}
.cc-shine{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform .7s;
}
.country-card:hover .cc-shine{transform:translateX(100%)}
.cc-content{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;
}
.cc-flag{font-size:52px;margin-bottom:14px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.cc-name{font-size:2rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.cc-en{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:rgba(255,255,255,.6);letter-spacing:.25em;margin-top:4px}
.cc-spots{margin-top:14px;font-size:.7rem;color:rgba(255,255,255,.4);text-align:center;letter-spacing:.05em;line-height:1.6}

/* ── SETUP ───────────────────────────────────── */
#screen-setup{flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;
  background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(201,168,76,.06) 0%,transparent 70%)}
.setup-card{
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;
  padding:40px;max-width:540px;width:100%;
}
.setup-title{
  font-family:'Cinzel Decorative',serif;font-size:1.4rem;
  color:var(--gold);text-align:center;margin-bottom:6px;
}
.setup-subtitle{font-size:.8rem;color:var(--text-dim);text-align:center;letter-spacing:.2em;margin-bottom:32px}
.setup-flag{font-size:40px;text-align:center;margin-bottom:8px}
.player-count-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.count-btn{
  width:52px;height:52px;border-radius:50%;border:2px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:1.2rem;
  cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif;
}
.count-btn:hover{border-color:var(--gold);color:var(--gold)}
.count-btn.selected{background:var(--gold);border-color:var(--gold);color:#1a1000;font-weight:700}
.player-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.player-input-row{display:flex;align-items:center;gap:10px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.player-input-row input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--text);
  font-family:'Noto Serif TC',serif;font-size:.9rem;
  transition:border-color .2s;outline:none;
}
.player-input-row input:focus{border-color:var(--gold)}
.ai-badge{
  font-size:.7rem;padding:4px 8px;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text-dim);
  border:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all .2s;
}
.ai-badge.ai-on{background:rgba(201,168,76,.2);color:var(--gold);border-color:var(--gold-dim)}
.btn{
  padding:12px 24px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;
  transition:all .2s;letter-spacing:.05em;
}
.btn-gold{
  background:linear-gradient(135deg,#c9a84c,#f0d060,#c9a84c);
  color:#1a1000;width:100%;
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.35)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-red{background:#c0392b;color:#fff}
.btn-red:hover{background:#e74c3c}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-family:'Noto Serif TC',serif;font-size:.85rem;
  transition:color .2s;margin-top:16px;text-align:center;width:100%;justify-content:center;
}
.back-link:hover{color:var(--gold)}

/* ── GAME ────────────────────────────────────── */
#screen-game{
  flex-direction:row;align-items:flex-start;justify-content:center;
  padding:20px;gap:18px;flex-wrap:wrap;
}
/* Board wrapper */
#board-wrap{position:relative;flex-shrink:0}
#board{
  display:grid;
  grid-template-columns:90px repeat(9,54px) 90px;
  grid-template-rows:90px repeat(9,54px) 90px;
  width:672px;height:672px;
  border:3px solid var(--gold);
  box-shadow:0 0 0 1px rgba(201,168,76,.15),0 0 80px rgba(0,0,0,.7),inset 0 0 80px rgba(0,0,0,.1);
}
.cell{
  position:relative;background:var(--board-bg);
  border:1px solid #c8bfa0;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding:2px;cursor:default;
}
.cell.prop-cell{cursor:pointer}
.cell.prop-cell:hover{background:#ece5d0;z-index:5}
/* color band */
.cband{position:absolute;background:#000}
/* top band (bottom-row cells) */
.band-t{top:0;left:0;right:0;height:22px}
/* bottom band (top-row cells) */
.band-b{bottom:0;left:0;right:0;height:22px}
/* right band (left-col cells) */
.band-r{top:0;right:0;bottom:0;width:22px}
/* left band (right-col cells) */
.band-l{top:0;left:0;bottom:0;width:22px}

.cell-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  width:100%;height:100%;padding:2px;
}
.cell-name{
  font-size:7.5px;text-align:center;color:#2a2218;
  line-height:1.25;font-weight:600;
  word-break:break-all;margin-top:24px;z-index:1;
}
.cell-price{font-size:6.5px;color:#7a6a50;margin-top:1px;z-index:1}
/* rotated cells */
.rot-cw .cell-inner{transform:rotate(90deg);width:100%;height:100%;transform-origin:center center}
.rot-ccw .cell-inner{transform:rotate(-90deg);width:100%;height:100%;transform-origin:center center}
/* corner cells */
.cell.corner{justify-content:center;cursor:default}
.corner-inner{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;gap:4px;
  padding:6px;width:100%;height:100%;
}
.corner-icon{font-size:22px}
.corner-label{font-size:8px;color:#4a3a28;font-weight:700;line-height:1.3;text-align:center}
/* special cells */
.cell.tax-cell .cell-inner{justify-content:center}
.cell.card-cell .cell-inner{justify-content:center}
.cell-icon{font-size:16px;margin-bottom:2px}
.cell.prop-cell .buildings{
  position:absolute;bottom:2px;left:0;right:0;
  display:flex;gap:1px;justify-content:center;flex-wrap:wrap;z-index:2;
}
.bld-house{width:7px;height:6px;background:#1a7a1a;border-radius:1px 1px 0 0}
.bld-hotel{width:10px;height:7px;background:#c0392b;border-radius:2px 2px 0 0}
/* board center */
.board-center{
  grid-column:2/11;grid-row:2/11;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;overflow:hidden;position:relative;
}
.bc-country{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1rem,2vw,1.6rem);
  text-align:center;line-height:1.5;
}
.bc-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:.75rem;letter-spacing:.25em;margin-top:4px;text-align:center;opacity:.7;
}
.bc-deco{font-size:40px;margin-bottom:8px}
/* owned indicator */
.owner-dot{
  position:absolute;bottom:3px;right:3px;
  width:8px;height:8px;border-radius:50%;
  border:1px solid rgba(255,255,255,.5);z-index:3;
}

/* Tokens */
#token-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}
.token{
  position:absolute;width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  border:2px solid rgba(255,255,255,.6);
  box-shadow:0 2px 6px rgba(0,0,0,.4);
  transition:top .5s cubic-bezier(.23,1,.32,1),left .5s cubic-bezier(.23,1,.32,1);
  z-index:20;pointer-events:none;
}

/* ── SIDEBAR ─────────────────────────────────── */
#sidebar{
  width:270px;flex-shrink:0;
  display:flex;flex-direction:column;gap:12px;
}
.sidebar-section{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:14px;
}
.ss-title{
  font-size:.7rem;letter-spacing:.2em;color:var(--gold);
  text-transform:uppercase;margin-bottom:10px;
}
/* player cards */
.pcard{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:8px;border:1px solid transparent;
  transition:all .25s;margin-bottom:6px;cursor:default;
}
.pcard:last-child{margin-bottom:0}
.pcard.active{background:rgba(201,168,76,.1);border-color:var(--gold-dim)}
.pcard.bankrupt{opacity:.35;filter:grayscale(1)}
.p-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  border:2px solid rgba(255,255,255,.3);
}
.p-info{flex:1;min-width:0}
.p-name{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-money{font-size:.75rem;color:var(--gold);font-weight:700}
.p-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.p-badge{
  font-size:.6rem;padding:1px 5px;border-radius:10px;
  background:rgba(255,255,255,.07);color:var(--text-dim);
}
.active-indicator{
  width:6px;height:6px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 6px var(--gold);flex-shrink:0;
}
/* Dice */
.dice-row{display:flex;gap:14px;justify-content:center;margin:6px 0}
.die{
  width:52px;height:52px;background:#fff;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  box-shadow:2px 2px 0 #bbb,0 4px 10px rgba(0,0,0,.3);
  transition:transform .15s;user-select:none;
}
.die.rolling{animation:dieroll .12s infinite}
@keyframes dieroll{0%{transform:rotate(-8deg) scale(.92)}50%{transform:rotate(8deg) scale(1.08)}100%{transform:rotate(-8deg) scale(.92)}}
.dice-total{text-align:center;font-size:1.1rem;color:var(--gold);font-weight:700;min-height:1.4em}
.btn-full{width:100%;margin-bottom:6px}
/* Log */
#game-log{
  height:130px;overflow-y:auto;font-size:.75rem;
  background:rgba(0,0,0,.25);border-radius:8px;padding:8px;
  color:var(--text-dim);scrollbar-width:thin;
}
#game-log::-webkit-scrollbar{width:4px}
#game-log::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.log-line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.4}
.log-line:last-child{border-bottom:none}
.log-highlight{color:var(--gold)}
.log-warn{color:#e74c3c}
.log-good{color:#2ecc71}

/* ── MODALS ──────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-bg.hidden{display:none}
.modal-box{
  background:linear-gradient(160deg,#141428 0%,#0e0e20 100%);
  border:1px solid var(--gold);border-radius:20px;
  padding:32px;max-width:380px;width:100%;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:modalpop .25s cubic-bezier(.23,1,.32,1);
}
@keyframes modalpop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.modal-icon{font-size:44px;margin-bottom:12px}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--gold);margin-bottom:6px}
.modal-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:20px;line-height:1.5}
.modal-prop-band{height:8px;border-radius:4px;margin-bottom:16px}
.modal-prop-details{background:rgba(0,0,0,.2);border-radius:8px;padding:12px;margin-bottom:16px;text-align:left}
.prop-detail-row{display:flex;justify-content:space-between;font-size:.8rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.prop-detail-row:last-child{border-bottom:none}
.prop-detail-label{color:var(--text-dim)}
.prop-detail-val{color:var(--text);font-weight:600}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.card-modal-body{
  background:rgba(0,0,0,.2);border-radius:8px;padding:16px;
  margin:16px 0;font-size:.95rem;line-height:1.6;color:var(--text);
}

/* ── CHANCE/COMMUNITY COLORS ─────────────────── */
.chance-header{background:linear-gradient(135deg,#e67e22,#f39c12);border-radius:8px;padding:8px;margin-bottom:12px}
.comm-header{background:linear-gradient(135deg,#2980b9,#3498db);border-radius:8px;padding:8px;margin-bottom:12px}

/* ── WINNER ──────────────────────────────────── */
#modal-winner .modal-box{border-color:var(--gold-light);background:linear-gradient(160deg,#1a1500 0%,#0a0a00 100%)}
.winner-glow{animation:winnerglow 2s infinite alternate}
@keyframes winnerglow{0%{filter:drop-shadow(0 0 10px var(--gold))}100%{filter:drop-shadow(0 0 30px var(--gold))}}

/* ── PROPERTY DEED ───────────────────────────── */
#modal-prop-info .modal-box{max-width:320px}

/* ── RESPONSIVE ──────────────────────────────── */
@media(max-width:1100px){
  #board{
    grid-template-columns:70px repeat(9,42px) 70px;
    grid-template-rows:70px repeat(9,42px) 70px;
    width:518px;height:518px;
  }
  .cell-name{font-size:6.5px}
  .band-t,.band-b{height:18px}
  .band-l,.band-r{width:18px}
  .cband{--bsz:18px}
  #sidebar{width:240px}
}
@media(max-width:820px){
  #screen-game{flex-direction:column;align-items:center}
  #sidebar{width:100%;max-width:672px}
}
</style>
</head>
<body>

<!-- ════ WELCOME SCREEN ════ -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-kicker">亞洲 · 大富翁</div>
  <div class="welcome-title">ASIA MONOPOLY</div>
  <div class="welcome-sub">選擇你的旅程 · Choose Your Journey</div>
  <div class="welcome-divider"></div>
  <div class="country-grid">
    <div class="country-card" data-c="japan" onclick="selectCountry('japan')">
      <div class="cc-bg"></div><div class="cc-noise"></div><div class="cc-shine"></div>
      <div class="cc-content">
        <div class="cc-flag">🇯🇵</div>
        <div class="cc-name">日本</div>
        <div class="cc-en">Japan</div>
        <div class="cc-spots">東京 · 京都 · 大阪 · 富士山</div>
      </div>
    </div>
    <div class="country-card" data-c="taiwan" onclick="selectCountry('taiwan')">
      <div class="cc-bg"></div><div class="cc-noise"></div><div class="cc-shine"></div>
      <div class="cc-content">
        <div class="cc-flag">🇹🇼</div>
        <div class="cc-name">台灣</div>
        <div class="cc-en">Taiwan</div>
        <div class="cc-spots">台北101 · 九份 · 日月潭 · 阿里山</div>
      </div>
    </div>
    <div class="country-card" data-c="bangkok" onclick="selectCountry('bangkok')">
      <div class="cc-bg"></div><div class="cc-noise"></div><div class="cc-shine"></div>
      <div class="cc-content">
        <div class="cc-flag">🇹🇭</div>
        <div class="cc-name">曼谷</div>
        <div class="cc-en">Bangkok</div>
        <div class="cc-spots">大皇宮 · 暹羅 · 普吉島 · 清邁</div>
      </div>
    </div>
    <div class="country-card" data-c="korea" onclick="selectCountry('korea')">
      <div class="cc-bg"></div><div class="cc-noise"></div><div class="cc-shine"></div>
      <div class="cc-content">
        <div class="cc-flag">🇰🇷</div>
        <div class="cc-name">韓國</div>
        <div class="cc-en">Korea</div>
        <div class="cc-spots">景福宮 · 明洞 · 江南 · 濟州島</div>
      </div>
    </div>
  </div>
</div>

<!-- ════ SETUP SCREEN ════ -->
<div id="screen-setup" class="screen">
  <div class="setup-card">
    <div id="setup-flag" class="setup-flag"></div>
    <div class="setup-title" id="setup-title">選擇玩家</div>
    <div class="setup-subtitle">選擇人數 · 輸入名稱</div>

    <div class="player-count-row">
      <button class="count-btn" onclick="setPlayerCount(1)">1</button>
      <button class="count-btn selected" onclick="setPlayerCount(2)">2</button>
      <button class="count-btn" onclick="setPlayerCount(3)">3</button>
      <button class="count-btn" onclick="setPlayerCount(4)">4</button>
    </div>

let G=null;
let selectedCountry=null;
let playerCount=2;
let pendingBuy=null;
let pendingCard=null;
let chanceCards=[];
let commCards=[];

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={welcome:'screen-welcome',setup:'screen-setup',game:'screen-game'};
  document.getElementById(map[name]).classList.add('active');
}

function selectCountry(c){
  selectedCountry=c;
  const meta=COUNTRY_META[c];
  document.getElementById('setup-flag').textContent=meta.flag;
  document.getElementById('setup-title').textContent=meta.name+' · 玩家設定';
  setPlayerCount(playerCount);
  showScreen('setup');
}

function setPlayerCount(n){
  playerCount=n;
  document.querySelectorAll('.count-btn').forEach((b,i)=>{
    b.classList.toggle('selected',i+1===n);
  });
  renderPlayerInputs();
}

const DEFAULT_NAMES=['玩家一','玩家二','玩家三','玩家四'];
function renderPlayerInputs(){
  const el=document.getElementById('player-inputs');
  el.innerHTML='';
  for(let i=0;i<playerCount;i++){
    const row=document.createElement('div');
    row.className='player-input-row';
    const dot=document.createElement('div');
    dot.className='player-dot';
    dot.style.background=PLAYER_COLORS[i];
    const inp=document.createElement('input');
    inp.type='text';inp.placeholder=DEFAULT_NAMES[i];
    inp.id='pname-'+i;
    inp.value=i===0?DEFAULT_NAMES[0]:'';
    const ai=document.createElement('button');
    ai.className='ai-badge';ai.id='ai-'+i;
    ai.textContent=i===0?'👤 真人':'🤖 電腦';
    if(i>0)ai.classList.add('ai-on');
    ai.onclick=()=>{
      ai.classList.toggle('ai-on');
      ai.textContent=ai.classList.contains('ai-on')?'🤖 電腦':'👤 真人';
    };
    row.append(dot,inp,ai);
    el.appendChild(row);
  }
}

function startGame(){
  const boards=makeBoard(selectedCountry);
  const spaces=boards[selectedCountry].map(s=>({...s,rent:[...s.rent]}));

  const players=[];
  for(let i=0;i<playerCount;i++){
    const nameEl=document.getElementById('pname-'+i);
    const aiEl=document.getElementById('ai-'+i);
    players.push({
      id:i,
      name:nameEl.value||DEFAULT_NAMES[i],
      color:PLAYER_COLORS[i],
      emoji:PLAYER_EMOJIS[i],
      isAI:aiEl.classList.contains('ai-on'),
      money:1500,
      position:0,
      inJail:false,
      jailTurns:0,
      bankrupt:false,
      doublesCount:0,
    });
  }

  chanceCards=shuffleArr([...CHANCE_CARDS]);
  commCards=shuffleArr([...COMM_CARDS]);

  G={
    country:selectedCountry,
    spaces,
    players,
    current:0,
    phase:'roll',
    dice:[1,1],
    doublesRolled:false,
    log:[],
  };

  renderBoard();
  renderSidebar();
  updateTokens();
  showScreen('game');
  addLog(`🎮 遊戲開始！地區：${COUNTRY_META[selectedCountry].name}`);
  maybeAI();
}

// Space index → grid position [row, col] (0-indexed)
function spaceToGrid(idx){
  if(idx===0) return [10,10];
  if(idx<=9)  return [10,10-idx];
  if(idx===10)return [10,0];
  if(idx<=19) return [10-(idx-10),0];
  if(idx===20)return [0,0];
  if(idx<=29) return [0,idx-20];
  if(idx===30)return [0,10];
  if(idx<=39) return [idx-30,10];
  return [0,0];
}
// Get pixel center of a cell
function cellCenter(idx){
  const [r,c]=spaceToGrid(idx);
  const board=document.getElementById('board');
  const rect=board.getBoundingClientRect();
  // grid cols: 90 + 9×54 + 90 = 672
  const colWidths=[90,...Array(9).fill(54),90];
  const rowHeights=[90,...Array(9).fill(54),90];
  let x=0,y=0;
  for(let i=0;i<c;i++) x+=colWidths[i];
  for(let i=0;i<r;i++) y+=rowHeights[i];
  x+=colWidths[c]/2;
  y+=rowHeights[r]/2;
  return {x,y};
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const meta=COUNTRY_META[G.country];
  board.style.background='#f5f0e0';

  // Build a 11×11 grid mapping
  const grid=Array.from({length:11},()=>Array(11).fill(null));
  G.spaces.forEach(s=>{
    const [r,c]=spaceToGrid(s.id);
    grid[r][c]=s;
  });
  // Center
  grid[5][5]={id:-1,type:'center'};

  for(let r=0;r<11;r++){
    for(let c=0;c<11;c++){
      const s=grid[r][c];
      const cell=document.createElement('div');
      cell.className='cell';
      if(r===0&&c===0||r===0&&c===10||r===10&&c===0||r===10&&c===10){
        cell.classList.add('corner');
      }
      // inner area
      if(r>=1&&r<=9&&c>=1&&c<=9){
        if(r===1&&c===1&&r===c){/* not center */ }
        if(s&&s.id===-1){
          // Center cell spanning 9×9
          cell.style.gridColumn='2/11';cell.style.gridRow='2/11';
          cell.className='cell board-center';
          const meta2=COUNTRY_META[G.country];
          cell.innerHTML=`<div class="bc-deco">${meta2.center.split('\n')[0]}</div>
            <div class="bc-country" style="color:${meta2.accent}">${meta2.name}</div>
            <div class="bc-sub">${meta2.en} Monopoly</div>`;
          cell.style.background=meta2.cc;
          board.appendChild(cell);
          r=9;c=9;// skip rest of inner
          continue;
        }
        if(!s||s.id===-1) continue;
      }
      if(!s) {board.appendChild(cell);continue;}

      if(s.id===-1){board.appendChild(cell);continue;}

      // Determine band direction based on position
      // bottom row (r=10): band at top of cell
      // left col (c=0): band at right
      // top row (r=0): band at bottom
      // right col (c=10): band at left
      let bandPos='none';
      if(r===10&&c>0&&c<10) bandPos='top';
      else if(c===0&&r>0&&r<10) bandPos='right';
      else if(r===0&&c>0&&c<10) bandPos='bottom';
      else if(c===10&&r>0&&r<10) bandPos='left';

      // Rotation for column cells
      if(c===0&&r>0&&r<10) cell.classList.add('rot-cw');
      if(c===10&&r>0&&r<10) cell.classList.add('rot-ccw');

      if(s.type==='prop'||s.type==='rr'||s.type==='util'){
        if(s.type==='prop') cell.classList.add('prop-cell');
        cell.setAttribute('data-id',s.id);
        if(s.type==='prop') cell.addEventListener('click',()=>showPropInfo(s.id));

        if(s.group&&bandPos!=='none'){
          const band=document.createElement('div');
          band.className=`cband band-${bandPos.charAt(0)}`;
          band.style.background=GROUPS[s.group].hex;
          cell.appendChild(band);
        }

        const inner=document.createElement('div');
        inner.className='cell-inner';
        inner.id=`ci-${s.id}`;

        const nameEl=document.createElement('div');
        nameEl.className='cell-name';
        nameEl.textContent=s.name;

        const priceEl=document.createElement('div');
        priceEl.className='cell-price';
        priceEl.textContent=s.price?`$${s.price}`:'';

        const blds=document.createElement('div');
        blds.className='buildings';blds.id=`bld-${s.id}`;

        inner.append(nameEl,priceEl);
        cell.append(inner,blds);

      } else if(s.type==='go'){
        cell.classList.add('corner');
        cell.innerHTML=`<div class="corner-inner">
          <div class="corner-icon">▶</div>
          <div class="corner-label">出發點<br><span style="color:#c0392b;font-size:7px">領取$200</span></div>
        </div>`;
      } else if(s.type==='jail'){
        cell.classList.add('corner');
        cell.innerHTML=`<div class="corner-inner">
          <div class="corner-icon">⛓</div>
          <div class="corner-label">監獄<br><span style="font-size:7px;color:#666">僅經過</span></div>
        </div>`;
      } else if(s.type==='free'){
        cell.classList.add('corner');
        cell.innerHTML=`<div class="corner-inner">
          <div class="corner-icon">🅿</div>
          <div class="corner-label">免費停車</div>
        </div>`;
      } else if(s.type==='gotojail'){
        cell.classList.add('corner');
        cell.innerHTML=`<div class="corner-inner">
          <div class="corner-icon">🚔</div>
          <div class="corner-label" style="color:#c0392b">前往<br>監獄</div>
        </div>`;
      } else if(s.type==='chance'){
        let rot='';
        if(c===0) rot='rot-cw';if(c===10) rot='rot-ccw';
        cell.innerHTML=`<div class="cell-inner ${rot}">
          <div class="cell-icon">?</div>
          <div class="cell-name" style="color:#e67e22;font-weight:700">機會</div>
        </div>`;
        cell.style.background='#fff9e6';
      } else if(s.type==='comm'){
        let rot='';
        if(c===0) rot='rot-cw';if(c===10) rot='rot-ccw';
        cell.innerHTML=`<div class="cell-inner ${rot}">
          <div class="cell-icon">📦</div>
          <div class="cell-name" style="color:#2980b9;font-weight:700">命運</div>
        </div>`;
        cell.style.background='#ebf5fb';
      } else if(s.type==='tax'){
        let rot='';
        if(c===0) rot='rot-cw';if(c===10) rot='rot-ccw';
        const isIncome=s.id===4;
        cell.innerHTML=`<div class="cell-inner ${rot}">
          <div class="cell-icon">${isIncome?'📋':'💎'}</div>
          <div class="cell-name" style="color:#c0392b">${s.name}</div>
          <div class="cell-price">${isIncome?'$200':'$75'}</div>
        </div>`;
        cell.style.background='#fef9f9';
      }

      board.appendChild(cell);
    }
  }
  updateBuildings();
}

function updateBuildings(){
  if(!G) return;
  G.spaces.forEach(s=>{
    if(s.type!=='prop') return;
    const el=document.getElementById(`bld-${s.id}`);
    if(!el) return;
    el.innerHTML='';
    for(let i=0;i<s.buildings;i++){
      const b=document.createElement('div');
      b.className=s.buildings===5?'bld-hotel':'bld-house';
      el.appendChild(b);
      if(s.buildings===5) break;
    }
    // owner dot
    const ci=document.getElementById(`ci-${s.id}`);
    if(ci){
      const old=ci.querySelector('.owner-dot');
      if(old)old.remove();
      if(s.owner!==null){
        const dot=document.createElement('div');
        dot.className='owner-dot';
        dot.style.background=G.players[s.owner].color;
        ci.appendChild(dot);
      }
    }
  });
}

// ╔══════════════════════════════════════════╗
// ║              TOKENS                      ║
// ╚══════════════════════════════════════════╝
function updateTokens(){
  if(!G) return;
  const layer=document.getElementById('token-layer');
  layer.innerHTML='';
  const byPos={};
  G.players.forEach(p=>{
    if(!p.bankrupt){
      if(!byPos[p.position])byPos[p.position]=[];
      byPos[p.position].push(p);
    }
  });
  G.players.forEach(p=>{
    if(p.bankrupt) return;
    const {x,y}=cellCenter(p.position);
    const slot=byPos[p.position].indexOf(p);
    const offsets=[[-4,-4],[4,-4],[-4,4],[4,4]];
    const [ox,oy]=offsets[slot]||[0,0];
    const tok=document.createElement('div');
    tok.className='token';
    tok.style.background=p.color;
    tok.style.left=(x+ox-10)+'px';
    tok.style.top=(y+oy-10)+'px';
    tok.textContent=p.name.charAt(0);
    tok.title=p.name;
    layer.appendChild(tok);
  });
}

function addLog(msg,type=''){
  G.log.unshift({msg,type});
  if(G.log.length>50)G.log.pop();
  const el=document.getElementById('game-log');
  el.innerHTML=G.log.slice(0,30).map(e=>{
    let cls='log-line';
    if(e.type==='good')cls+=' log-good';
    if(e.type==='warn')cls+=' log-warn';
    if(e.type==='gold')cls+=' log-highlight';
    return `<div class="${cls}">${e.msg}</div>`;
  }).join('');
}

// ║              DICE                        ║
// ╚══════════════════════════════════════════╝
function doRoll(){
  if(G.phase!=='roll')return;
  const cur=G.players[G.current];
  if(cur.bankrupt){doEndTurn();return;}

  document.getElementById('btn-roll').disabled=true;
  document.getElementById('die1').classList.add('rolling');
  document.getElementById('die2').classList.add('rolling');

  // Animate dice
  let frames=0;
  const anim=setInterval(()=>{
    document.getElementById('die1').textContent=DIE_FACES[0|Math.random()*6];
    document.getElementById('die2').textContent=DIE_FACES[0|Math.random()*6];
    frames++;
    if(frames>10){
      clearInterval(anim);
      document.getElementById('die1').classList.remove('rolling');
      document.getElementById('die2').classList.remove('rolling');
      const d1=(1+0|Math.random()*6);
      const d2=(1+0|Math.random()*6);
      document.getElementById('die1').textContent=DIE_FACES[d1-1];
      document.getElementById('die2').textContent=DIE_FACES[d2-1];
      G.dice=[d1,d2];
      G.doublesRolled=(d1===d2);
      document.getElementById('dice-total').textContent=`合計：${d1+d2}${G.doublesRolled?' 🎉 雙胞胎！':''}`;
      afterRoll(d1,d2);
    }
  },80);
}

function afterRoll(d1,d2){
  const cur=G.players[G.current];
  const total=d1+d2;

  if(cur.inJail){
    if(G.doublesRolled){
      cur.inJail=false;cur.jailTurns=0;
      addLog(`${cur.name} 擲出雙胞胎，出獄了！`,'good');
    } else {
      cur.jailTurns++;
      if(cur.jailTurns>=3){
        cur.inJail=false;cur.jailTurns=0;
        addLog(`${cur.name} 服滿刑期，繳 $50 出獄。`,'warn');
        cur.money-=50;
      } else {
        addLog(`${cur.name} 在監獄裡（第${cur.jailTurns}回合）。`);
        G.phase='post';renderSidebar();return;
      }
    }
  }

  // Doubles → extra turn
  if(G.doublesRolled){
    cur.doublesCount=(cur.doublesCount||0)+1;
    if(cur.doublesCount>=3){
      addLog(`${cur.name} 連擲三次雙胞胎，進監獄！`,'warn');
      goToJailDirect();return;
    }
  } else {cur.doublesCount=0;}

  movePlayer(cur,total);
}

function movePlayer(player,steps){
  const old=player.position;
  let newPos=(player.position+steps)%40;
  // Pass GO
  if(newPos<old&&!player.inJail||(old+steps>=40)){
    player.money+=200;
    addLog(`${player.name} 經過出發點，領取 $200！`,'good');
  }
  player.position=newPos;
  updateTokens();
  setTimeout(()=>landOn(player),300);
}

function landOn(player){
  const space=G.spaces[player.position];
  addLog(`${player.name} 停在 【${space.name}】`);

  switch(space.type){
    case 'go': G.phase='post';renderSidebar();break;
    case 'jail': G.phase='post';renderSidebar();break;
    case 'free': G.phase='post';renderSidebar();break;
    case 'gotojail': goToJailDirect();break;
    case 'tax':
      const amt=space.id===4?200:75;
      player.money-=amt;
      addLog(`${player.name} 繳稅 $${amt}。`,'warn');
      checkBankrupt(player);
      G.phase='post';renderSidebar();
      break;
    case 'chance':
      drawCard('chance',player);break;
    case 'comm':
      drawCard('comm',player);break;
    case 'prop':
    case 'rr':
    case 'util':
      handlePropertyLand(player,space);break;
    default:
      G.phase='post';renderSidebar();
  }
}

// ╔══════════════════════════════════════════╗
// ║              PROPERTY LOGIC              ║
// ╚══════════════════════════════════════════╝
function handlePropertyLand(player,space){
  if(space.mortgaged){addLog(`${space.name} 已抵押，免收租金。`);G.phase='post';renderSidebar();return;}
  if(space.owner===null){
    if(player.money>=space.price){
      promptBuy(player,space);
    } else {
      addLog(`${player.name} 資金不足，無法購買 ${space.name}。`,'warn');
      G.phase='post';renderSidebar();
    }
  } else if(space.owner===player.id){
    addLog(`${player.name} 停在自己的地產上。`);
    G.phase='post';renderSidebar();
  } else {
    const owner=G.players[space.owner];
    const rent=calcRent(space,G.dice[0]+G.dice[1]);
    addLog(`${player.name} 向 ${owner.name} 支付租金 $${rent}！`,'warn');
    player.money-=rent;
    owner.money+=rent;
    showRentModal(player,owner,space,rent);
    checkBankrupt(player);
    G.phase='post';renderSidebar();
  }
}

function calcRent(space,diceTotal){
  if(space.type==='rr'){
    const ownerRRs=G.spaces.filter(s=>s.type==='rr'&&s.owner===space.owner).length;
    return RR_RENT[ownerRRs-1]||25;
  }
  if(space.type==='util'){
    const ownerUtils=G.spaces.filter(s=>s.type==='util'&&s.owner===space.owner).length;
    return diceTotal*(ownerUtils===2?10:4);
  }
  if(space.type==='prop'){
    if(space.buildings>0) return space.rent[space.buildings];
    // Color monopoly: double base rent
    const grpSpaces=G.spaces.filter(s=>s.group===space.group);
    const hasMonopoly=grpSpaces.every(s=>s.owner===space.owner);
    return hasMonopoly?space.rent[0]*2:space.rent[0];
  }
  return 0;
}

function promptBuy(player,space){
  if(player.isAI){
    if(player.money>=space.price+200){
      doBuySpace(player,space);
    } else {
      addLog(`${player.name}（電腦）決定不購買 ${space.name}。`);
      G.phase='post';renderSidebar();
    }
    return;
  }
  pendingBuy={player,space};
  const g=GROUPS[space.group];
  document.getElementById('buy-band').style.background=g?g.hex:'#888';
  document.getElementById('buy-icon').textContent=space.type==='rr'?'🚄':space.type==='util'?'⚡':'🏠';
  document.getElementById('buy-name').textContent=space.name;
  document.getElementById('buy-sub').textContent=`${player.name}，是否要購買這塊地產？`;
  const rents=space.rent;
  document.getElementById('buy-details').innerHTML=`
    <div class="prop-detail-row"><span class="prop-detail-label">售價</span><span class="prop-detail-val">$${space.price}</span></div>
    ${space.type==='prop'?`
    <div class="prop-detail-row"><span class="prop-detail-label">基本租金</span><span class="prop-detail-val">$${rents[0]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">1棟租金</span><span class="prop-detail-val">$${rents[1]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">旅館租金</span><span class="prop-detail-val">$${rents[5]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">建造費用</span><span class="prop-detail-val">$${g?g.buildCost:0}/棟</span></div>
    `:''}
    <div class="prop-detail-row"><span class="prop-detail-label">你的資金</span><span class="prop-detail-val" style="color:#2ecc71">$${player.money}</span></div>
  `;
  document.getElementById('modal-buy').classList.remove('hidden');
}

function doBuy(){
  if(!pendingBuy) return;
  closeModal('modal-buy');
  doBuySpace(pendingBuy.player,pendingBuy.space);
  pendingBuy=null;
}

function doBuySpace(player,space){
  player.money-=space.price;
  space.owner=player.id;
  addLog(`${player.name} 購買了 ${space.name}（$${space.price}）！`,'gold');
  updateBuildings();
  G.phase='post';renderSidebar();
  // AI: try to build
  if(player.isAI) setTimeout(()=>aiBuild(player),400);
}

// ╔══════════════════════════════════════════╗
// ║              BUILDING                    ║
// ╚══════════════════════════════════════════╝
function canBuild(player,space){
  if(space.type!=='prop'||space.owner!==player.id||space.mortgaged) return false;
  if(space.buildings>=5) return false;
  const grp=GROUPS[space.group];
  if(!grp||grp.buildCost===0) return false;
  // Must own all of group
  const grpSpaces=G.spaces.filter(s=>s.group===space.group);
  if(!grpSpaces.every(s=>s.owner===player.id)) return false;
  // Even build rule (simplified: allow if not lagging by >1)
  const minBld=Math.min(...grpSpaces.map(s=>s.buildings));
  if(space.buildings>minBld) return false;
  if(player.money<grp.buildCost) return false;
  return true;
}

function aiBuild(player){
  G.spaces.forEach(s=>{
    if(canBuild(player,s)&&player.money>s.price+300){
      const grp=GROUPS[s.group];
      player.money-=grp.buildCost;
      s.buildings++;
      addLog(`${player.name}（電腦）在 ${s.name} 建造了${s.buildings===5?'旅館':'房屋'}！`,'gold');
      updateBuildings();renderSidebar();
    }
  });
}

function showPropInfo(id){
  const s=G.spaces[id];
  if(!s) return;
  const g=s.group?GROUPS[s.group]:null;
  document.getElementById('info-band').style.background=g?g.hex:'#888';
  document.getElementById('info-icon').textContent=s.type==='rr'?'🚄':s.type==='util'?'⚡':'🏠';
  document.getElementById('info-name').textContent=s.name;
  const owner=s.owner!==null?G.players[s.owner]:null;
  document.getElementById('info-owner').textContent=owner?`擁有者：${owner.name}`:'尚未購買';
  const rents=s.rent;
  document.getElementById('info-details').innerHTML=`
    <div class="prop-detail-row"><span class="prop-detail-label">售價</span><span class="prop-detail-val">$${s.price}</span></div>
    ${s.type==='prop'?`
    <div class="prop-detail-row"><span class="prop-detail-label">基本租金</span><span class="prop-detail-val">$${rents[0]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">壟斷租金</span><span class="prop-detail-val">$${rents[0]*2}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">1棟</span><span class="prop-detail-val">$${rents[1]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">2棟</span><span class="prop-detail-val">$${rents[2]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">3棟</span><span class="prop-detail-val">$${rents[3]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">4棟</span><span class="prop-detail-val">$${rents[4]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">旅館</span><span class="prop-detail-val">$${rents[5]}</span></div>
    <div class="prop-detail-row"><span class="prop-detail-label">現有建設</span><span class="prop-detail-val">${s.buildings===0?'無':s.buildings===5?'旅館 🏨':s.buildings+'棟房屋 🏠'}</span></div>
    `:''}
    ${s.mortgaged?'<div class="prop-detail-row"><span style="color:#e74c3c">已抵押</span></div>':''}
  `;

  // Build buttons for current player
  const btns=document.getElementById('info-btns');
  btns.innerHTML='';
  const cur=G.players[G.current];
  if(G.phase==='post'&&s.owner===G.current&&!cur.isAI){
    if(canBuild(cur,s)){
      const b=document.createElement('button');
      b.className='btn btn-gold btn-sm';
      const grp=GROUPS[s.group];
      b.textContent=`建造 ($${grp.buildCost})`;
      b.onclick=()=>{doBuildOn(s);closeModal('modal-info');};
      btns.appendChild(b);
    }
    if(s.buildings>0){
      const b=document.createElement('button');
      b.className='btn btn-red btn-sm';
      b.textContent='拆除出售';
      b.onclick=()=>{doSellBuilding(s);closeModal('modal-info');};
      btns.appendChild(b);
    }
  }
  const close=document.createElement('button');
  close.className='btn btn-outline btn-sm';close.textContent='關閉';
  close.onclick=()=>closeModal('modal-info');
  btns.appendChild(close);
  document.getElementById('modal-info').classList.remove('hidden');
}

function doBuildOn(space){
  const cur=G.players[G.current];
  if(!canBuild(cur,space)) return;
  const grp=GROUPS[space.group];
  cur.money-=grp.buildCost;
  space.buildings++;
  addLog(`${cur.name} 在 ${space.name} 建造了${space.buildings===5?'旅館':'房屋'}！`,'gold');
  updateBuildings();renderSidebar();
}

function doSellBuilding(space){
  const cur=G.players[G.current];
  if(space.buildings===0) return;
  const grp=GROUPS[space.group];
  cur.money+=Math.floor(grp.buildCost/2);
  space.buildings--;
  addLog(`${cur.name} 從 ${space.name} 拆除了建築。`);
  updateBuildings();renderSidebar();
}

// ╔══════════════════════════════════════════╗
// ║              CARDS                       ║
// ╚══════════════════════════════════════════╝
function drawCard(type,player){
  const deck=type==='chance'?chanceCards:commCards;
  const card=deck[0];
  deck.push(deck.shift()); // rotate

  document.getElementById('card-header').innerHTML=
    type==='chance'
    ?'<div class="chance-header" style="color:#fff;font-weight:700;font-size:.9rem">🃏 機會卡</div>'
    :'<div class="comm-header" style="color:#fff;font-weight:700;font-size:.9rem">📦 命運卡</div>';
  document.getElementById('card-icon').textContent=type==='chance'?'🃏':'📦';
  document.getElementById('card-title').textContent='';
  document.getElementById('card-body').textContent=card.text;

  addLog(`${player.name} 抽到${type==='chance'?'機會':'命運'}卡：${card.text}`)

  document.getElementById('modal-card').classList.remove('hidden');
  // Execute card effect when player closes modal
  pendingCard={card,player};
}

document.getElementById('modal-card').addEventListener('click',(e)=>{
  if(e.target===document.getElementById('modal-card'))return;
});

// Override close for card modal to apply effect
const origClose=closeModal;
function closeModal(id){
  document.getElementById(id).classList.add('hidden');
  if(id==='modal-card'&&pendingCard){
    const {card,player}=pendingCard;
    pendingCard=null;
    card.fn(player);
  }
}

// Card effects
function gainMoney(player,amt){player.money+=amt;addLog(`${player.name} 獲得 $${amt}。`,'good');G.phase='post';renderSidebar();}
function loseMoney(player,amt){player.money-=amt;addLog(`${player.name} 支付 $${amt}。`,'warn');checkBankrupt(player);G.phase='post';renderSidebar();}
function advanceTo(player,pos,collectGO){
  if(collectGO&&pos<player.position){player.money+=200;addLog(`${player.name} 領取出發點 $200。`,'good');}
  player.position=pos;updateTokens();
  setTimeout(()=>landOn(player),300);
}
function repairTax(player,houseAmt,hotelAmt){
  const houses=G.spaces.filter(s=>s.owner===player.id&&s.buildings>0&&s.buildings<5).reduce((a,s)=>a+s.buildings,0);
  const hotels=G.spaces.filter(s=>s.owner===player.id&&s.buildings===5).length;
  const total=houses*houseAmt+hotels*hotelAmt;
  player.money-=total;
  addLog(`${player.name} 維修費 $${total}（${houses}棟×$${houseAmt} + ${hotels}旅館×$${hotelAmt}）`,'warn');
  checkBankrupt(player);G.phase='post';renderSidebar();
}
function advanceNearestRR(player){
  const rrPos=[5,15,25,35];
  const next=rrPos.find(p=>p>player.position)||rrPos[0];
  advanceTo(player,next,next<player.position);
}
function advanceNearestUtil(player){
  const uPos=[12,28];
  const next=uPos.find(p=>p>player.position)||uPos[0];
  advanceTo(player,next,next<player.position);
}
function collectFromAll(player,amt){
  G.players.forEach(p=>{
    if(p.id!==player.id&&!p.bankrupt){p.money-=amt;player.money+=amt;}
  });
  addLog(`${player.name} 向每位玩家收取 $${amt}。`,'gold');
  G.phase='post';renderSidebar();
}
function goToJail(player){goToJailDirect();}

function goToJailDirect(){
  const cur=G.players[G.current];
  cur.position=10;cur.inJail=true;cur.jailTurns=0;cur.doublesCount=0;
  updateTokens();
  addLog(`${cur.name} 進入監獄！`,'warn');
  G.phase='post';renderSidebar();
}

function doBailJail(){
  const cur=G.players[G.current];
  if(!cur.inJail) return;
  cur.money-=50;cur.inJail=false;cur.jailTurns=0;
  addLog(`${cur.name} 繳保釋金 $50 出獄。`);
  renderSidebar();
}

// ╔══════════════════════════════════════════╗
// ║              BANKRUPTCY                  ║
// ╚══════════════════════════════════════════╝
function checkBankrupt(player){
  if(player.money<0){
    // Simple: auction/sell - just mark bankrupt
    player.bankrupt=true;
    // Release all properties
    G.spaces.forEach(s=>{if(s.owner===player.id){s.owner=null;s.buildings=0;}});
    addLog(`💸 ${player.name} 破產出局！`,'warn');
    updateBuildings();
    checkWinner();
  }
}

function checkWinner(){
  const active=G.players.filter(p=>!p.bankrupt);
  if(active.length===1){
    const w=active[0];
    document.getElementById('winner-icon').textContent='🏆';
    document.getElementById('winner-title').textContent=`${w.name} 獲勝！`;
    document.getElementById('winner-sub').textContent=`恭喜 ${w.name} 成為亞洲大富翁！資產：$${w.money}`;
    document.getElementById('modal-winner').classList.remove('hidden');
  }
}

// ╔══════════════════════════════════════════╗
// ║              TURN FLOW                   ║
// ╚══════════════════════════════════════════╝
function doEndTurn(){
  if(G.phase!=='post') return;
  const cur=G.players[G.current];

  // AI builds before ending if possible
  if(!cur.isAI) aiBuildCheck(cur);

  // If doubles and not in jail: roll again
  if(G.doublesRolled&&!cur.inJail&&cur.doublesCount>0&&cur.doublesCount<3){
    addLog(`${cur.name} 擲出雙胞胎，再擲一次！`);
    G.phase='roll';renderSidebar();
    if(cur.isAI) setTimeout(()=>doRoll(),800);
    return;
  }

  // Next player
  G.doublesRolled=false;
  let next=(G.current+1)%G.players.length;
  let tries=0;
  while(G.players[next].bankrupt&&tries<G.players.length){next=(next+1)%G.players.length;tries++;}
  if(tries>=G.players.length){checkWinner();return;}
  G.current=next;
  G.phase='roll';
  renderSidebar();
  addLog(`─── ${G.players[G.current].name} 的回合 ───`);
  maybeAI();
}

function aiBuildCheck(player){
  // Already handled in aiBuild after buy; here for end-of-turn builds
  G.spaces.forEach(s=>{
    if(canBuild(player,s)&&player.money>s.price+400){
      const grp=GROUPS[s.group];
      player.money-=grp.buildCost;s.buildings++;
      addLog(`${player.name} 在 ${s.name} 建造了${s.buildings===5?'旅館':'房屋'}！`,'gold');
      updateBuildings();renderSidebar();
    }
  });
}

function maybeAI(){
  const cur=G.players[G.current];
  if(cur.isAI&&!cur.bankrupt){
    setTimeout(()=>doRoll(),900);
  }
}

function showRentModal(payer,owner,space,rent){
  document.getElementById('rent-title').textContent=`支付租金`;
  document.getElementById('rent-sub').textContent=`${payer.name} 支付 $${rent} 給 ${owner.name}（${space.name}）。${payer.money<0?'\n⚠️ 資金不足，宣告破產！':''}`;
  document.getElementById('modal-rent').classList.remove('hidden');
  if(G.players[G.current].isAI){
    setTimeout(()=>closeModal('modal-rent'),1200);
  }
}

function closeModal(id){
  document.getElementById(id).classList.add('hidden');
  if(id==='modal-card'&&pendingCard){
    const {card,player}=pendingCard;
    pendingCard=null;
    card.fn(player);
  }
  // After rent modal close, check if AI needs to continue
  if(id==='modal-rent'){
    renderSidebar();
    if(G.phase==='post'&&G.players[G.current].isAI){
      setTimeout(()=>doEndTurn(),600);
    }
  }
  if(id==='modal-buy'&&pendingBuy){
    // Player chose not to buy
    pendingBuy=null;
    G.phase='post';renderSidebar();
    if(G.players[G.current].isAI){setTimeout(()=>doEndTurn(),500);}
  }
}

// Wire up end turn for human post-roll
document.getElementById('btn-endturn').addEventListener('click',()=>{
  doEndTurn();
});

// init player inputs on page load
setPlayerCount(2);

// Quick start for testing: can press Enter to roll
document.addEventListener('keydown',(e)=>{
  if(e.key===' '&&G&&G.phase==='roll'&&!G.players[G.current].isAI){
    e.preventDefault();doRoll();
  }
});
</script>
